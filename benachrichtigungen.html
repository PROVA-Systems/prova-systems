<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Benachrichtigungen · PROVA</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0d11">
  <script src="prova-preise.js"></script>
  <script src="auth-guard.js"></script>
  <script src="theme.js"></script>
  <script src="trial-guard.js"></script>
  <script src="nav.js"></script>
  <link rel="stylesheet" href="prova-design.css">
  <link rel="stylesheet" href="mobile.css">
  <script src="prova-context.js"></script>
  <script src="prova-error-handler.js"></script>

</head>
<body>
<div id="sidebar" class="sidebar"></div>
<div class="main-wrap">

  <!-- Topbar -->
  <div class="topbar" style="position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;background:var(--bg,#0b0d11);border-bottom:1px solid var(--border,rgba(255,255,255,.07));">
    <button id="mobile-menu-btn" onclick="openMobileSidebar()" style="display:none;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px;">☰</button>
    <div style="flex:1;">
      <div class="p-page-title">Benachrichtigungen</div>
      <div class="p-page-sub" id="notif-count-sub">Wird geladen…</div>
    </div>
    <button onclick="alleAlsGelesenMarkieren()" id="btn-alle-gelesen" style="display:none;padding:7px 14px;border-radius:8px;border:1px solid var(--border2,rgba(255,255,255,.12));background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-ui,sans-serif);transition:all .15s;" onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background='transparent'">
      ✓ Alle als gelesen markieren
    </button>
    <button onclick="notifEinstellungen()" style="padding:7px 14px;border-radius:8px;border:1px solid var(--border2,rgba(255,255,255,.12));background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-ui,sans-serif);transition:all .15s;" onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background='transparent'">
      ⚙️ Einstellungen
    </button>
  </div>

  <div class="page-content" style="padding:20px;max-width:800px;margin:0 auto;">

    <!-- Filter-Tabs -->
    <div style="display:flex;gap:4px;margin-bottom:20px;background:var(--surface,#161b2e);border-radius:10px;padding:4px;width:fit-content;">
      <button class="notif-tab active" data-filter="all" onclick="setFilter('all',this)" style="padding:6px 14px;border-radius:7px;border:none;background:var(--surface2,#1e2535);color:var(--text,#eaecf4);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-ui);transition:all .15s;">Alle</button>
      <button class="notif-tab" data-filter="unread" onclick="setFilter('unread',this)" style="padding:6px 14px;border-radius:7px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-ui);transition:all .15s;">Ungelesen <span id="unread-count-badge" style="display:none;margin-left:4px;padding:1px 6px;border-radius:10px;background:rgba(239,68,68,.15);color:#ef4444;font-size:10px;"></span></button>
      <button class="notif-tab" data-filter="fristen" onclick="setFilter('fristen',this)" style="padding:6px 14px;border-radius:7px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-ui);transition:all .15s;">Fristen</button>
      <button class="notif-tab" data-filter="system" onclick="setFilter('system',this)" style="padding:6px 14px;border-radius:7px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-ui);transition:all .15s;">System</button>
    </div>

    <!-- Benachrichtigungen-Liste -->
    <div id="notif-list"></div>

    <!-- Push-Einstellungen Banner -->
    <div id="push-banner" style="display:none;margin-top:24px;padding:16px 20px;background:var(--surface,#161b2e);border:1px solid rgba(79,142,247,.2);border-radius:12px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="font-size:24px;">🔔</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:700;color:var(--text,#eaecf4);margin-bottom:2px;">Push-Benachrichtigungen aktivieren</div>
          <div style="font-size:12px;color:var(--text3);">Erhalten Sie sofortige Benachrichtigungen für Fristenwarnungen und neue Aufträge.</div>
        </div>
        <button onclick="aktivierePush()" style="padding:8px 16px;border-radius:8px;border:none;background:#4f8ef7;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-ui);">Aktivieren</button>
        <button onclick="document.getElementById('push-banner').style.display='none'" style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;line-height:1;">×</button>
      </div>
    </div>

  </div>
</div>

<!-- Einstellungen-Modal -->
<div id="einstellungen-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);">
  <div style="background:var(--surface,#161b2e);border:1px solid var(--border2,rgba(255,255,255,.12));border-radius:16px;padding:24px;max-width:440px;width:100%;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div style="font-size:15px;font-weight:700;color:var(--text);">Benachrichtigungs-Einstellungen</div>
      <button onclick="schliesseEinstellungen()" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;">×</button>
    </div>
    <div id="einstellungen-inhalt"></div>
    <div style="margin-top:20px;display:flex;justify-content:flex-end;">
      <button onclick="speichereEinstellungen()" style="padding:9px 20px;border-radius:8px;border:none;background:#4f8ef7;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-ui);">Speichern</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// PROVA Benachrichtigungen — Logic
// ══════════════════════════════════════════════════════

// Auth-Check
provaAuthGuard();

// ── Benachrichtigungs-Typen ──
var NOTIF_TYPEN = {
  frist_kritisch:  { icon: '🔴', farbe: '#ef4444', label: 'Kritische Frist'  },
  frist_warnung:   { icon: '🟡', farbe: '#f59e0b', label: 'Fristwarnung'     },
  frist_ok:        { icon: '✅', farbe: '#10b981', label: 'Frist OK'         },
  neuer_auftrag:   { icon: '📋', farbe: '#4f8ef7', label: 'Neuer Auftrag'   },
  rechnung_faellig:{ icon: '💶', farbe: '#a78bfa', label: 'Rechnung fällig'  },
  system:          { icon: '⚙️', farbe: '#6b7280', label: 'System'           },
  info:            { icon: '💡', farbe: '#4f8ef7', label: 'Info'             },
};

// ── Einstellungen ──
var EINSTELLUNGEN_DEFAULTS = {
  frist_kritisch:   true,
  frist_warnung:    true,
  frist_ok:         false,
  neuer_auftrag:    true,
  rechnung_faellig: true,
  system:           true,
  push_aktiviert:   false,
  email_digest:     'wöchentlich', // 'täglich' | 'wöchentlich' | 'nie'
};

var einstellungen = JSON.parse(localStorage.getItem('prova_notif_einstellungen') || 'null') || EINSTELLUNGEN_DEFAULTS;

// ── Benachrichtigungen laden ──
var alleNotifs = [];
var currentFilter = 'all';

function ladeNotifications() {
  // Aus localStorage + generierte Frist-Benachrichtigungen
  var gespeichert = [];
  try { gespeichert = JSON.parse(localStorage.getItem('prova_notifikationen') || '[]'); } catch(e) {}

  // Frist-Benachrichtigungen aus Airtable-Cache generieren
  var fristNotifs = generiereFreistNotifs();

  alleNotifs = [...fristNotifs, ...gespeichert].sort(function(a, b) {
    return new Date(b.ts) - new Date(a.ts);
  });

  // Duplikate entfernen (nach ID)
  var seen = new Set();
  alleNotifs = alleNotifs.filter(function(n) {
    if (seen.has(n.id)) return false;
    seen.add(n.id);
    return true;
  });

  render();
  aktualisiereZähler();
  zeigPushBanner();
}

function generiereFreistNotifs() {
  var notifs = [];
  var heute  = new Date();

  try {
    var cache  = JSON.parse(localStorage.getItem('prova_archiv_cache_v2') || '{}');
    var faelle = cache.data || [];

    faelle.forEach(function(r) {
      var f = r.fields || {};
      if (!f.Fristdatum) return;

      var frist = new Date(f.Fristdatum);
      var tage  = Math.ceil((frist - heute) / (1000 * 60 * 60 * 24));
      var az    = f.Aktenzeichen || '—';
      var id    = 'frist_' + r.id;

      var typ, text;
      if (tage < 0) {
        typ  = 'frist_kritisch';
        text = az + ' — Frist seit ' + Math.abs(tage) + ' Tag' + (Math.abs(tage) === 1 ? '' : 'en') + ' überschritten!';
      } else if (tage <= 3) {
        typ  = 'frist_kritisch';
        text = az + ' — Nur noch ' + tage + ' Tag' + (tage === 1 ? '' : 'e') + ' bis zur Frist!';
      } else if (tage <= 7) {
        typ  = 'frist_warnung';
        text = az + ' — Frist in ' + tage + ' Tagen';
      } else {
        return; // Keine Notif für Fristen > 7 Tage
      }

      if (!einstellungen[typ]) return;

      notifs.push({
        id:      id,
        typ:     typ,
        text:    text,
        detail:  f.Schadenart ? f.Schadenart + (f.Adresse ? ' · ' + f.Adresse.split(',')[0] : '') : '',
        ts:      new Date().toISOString(),
        gelesen: localStorage.getItem('prova_notif_gelesen_' + id) === '1',
        link:    'akte.html?id=' + r.id,
      });
    });
  } catch(e) {}

  return notifs;
}

// ── Filter setzen ──
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.notif-tab').forEach(function(t) {
    t.style.background = 'transparent';
    t.style.color = 'var(--text3)';
  });
  btn.style.background = 'var(--surface2,#1e2535)';
  btn.style.color = 'var(--text,#eaecf4)';
  render();
}

// ── Rendern ──
function render() {
  var list = document.getElementById('notif-list');
  var filtered = alleNotifs.filter(function(n) {
    if (currentFilter === 'unread')  return !n.gelesen;
    if (currentFilter === 'fristen') return n.typ.startsWith('frist');
    if (currentFilter === 'system')  return n.typ === 'system' || n.typ === 'info';
    return true;
  });

  if (!filtered.length) {
    list.innerHTML = [
      '<div style="text-align:center;padding:60px 20px;">',
        '<div style="font-size:40px;margin-bottom:12px;opacity:.4;">🔔</div>',
        '<div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;">',
          currentFilter === 'unread' ? 'Keine ungelesenen Nachrichten' : 'Keine Benachrichtigungen',
        '</div>',
        '<div style="font-size:13px;color:var(--text3);">',
          currentFilter === 'unread' ? 'Sie sind auf dem neuesten Stand.' : 'Hier erscheinen Fristenwarnungen, Systemhinweise und mehr.',
        '</div>',
      '</div>'
    ].join('');
    return;
  }

  // Nach Datum gruppieren
  var gruppen = {};
  filtered.forEach(function(n) {
    var d = new Date(n.ts);
    var heute = new Date();
    var gestern = new Date(heute);
    gestern.setDate(gestern.getDate() - 1);

    var key;
    if (d.toDateString() === heute.toDateString())   key = 'Heute';
    else if (d.toDateString() === gestern.toDateString()) key = 'Gestern';
    else key = d.toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });

    if (!gruppen[key]) gruppen[key] = [];
    gruppen[key].push(n);
  });

  list.innerHTML = Object.entries(gruppen).map(function(entry) {
    var gruppenLabel = entry[0];
    var items        = entry[1];
    return [
      '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:16px 0 8px;">' + gruppenLabel + '</div>',
      '<div style="display:flex;flex-direction:column;gap:4px;">',
        items.map(renderNotif).join(''),
      '</div>'
    ].join('');
  }).join('');

  // Alle-Gelesen-Button ein/ausblenden
  var hatUngelesen = alleNotifs.some(function(n){ return !n.gelesen; });
  var btnAlleGelesen = document.getElementById('btn-alle-gelesen');
  if (btnAlleGelesen) btnAlleGelesen.style.display = hatUngelesen ? 'block' : 'none';
}

function renderNotif(n) {
  var typ     = NOTIF_TYPEN[n.typ] || NOTIF_TYPEN.info;
  var ts      = new Date(n.ts).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  var ungelesen = !n.gelesen;

  return [
    '<div onclick="notifKlick(\'' + n.id + '\')" style="',
      'display:flex;align-items:flex-start;gap:12px;',
      'padding:14px 16px;border-radius:10px;cursor:pointer;',
      'background:' + (ungelesen ? 'rgba(79,142,247,.05)' : 'var(--surface,#161b2e)') + ';',
      'border:1px solid ' + (ungelesen ? 'rgba(79,142,247,.12)' : 'var(--border,rgba(255,255,255,.07))') + ';',
      'transition:all .15s;position:relative;',
    '" onmouseover="this.style.background=\'rgba(255,255,255,.04)\'" onmouseout="this.style.background=\'' + (ungelesen ? 'rgba(79,142,247,.05)' : 'var(--surface,#161b2e)') + '\'">',

      // Ungelesen-Punkt
      ungelesen ? '<div style="position:absolute;top:16px;left:8px;width:6px;height:6px;border-radius:50%;background:#4f8ef7;"></div>' : '',

      // Icon
      '<div style="width:36px;height:36px;border-radius:9px;background:rgba(' + hexToRgb(typ.farbe) + ',.12);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;">' + typ.icon + '</div>',

      // Content
      '<div style="flex:1;min-width:0;">',
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:2px;">',
          '<div style="font-size:13px;font-weight:' + (ungelesen ? '600' : '400') + ';color:var(--text,#eaecf4);line-height:1.4;">' + escapeHtml(n.text) + '</div>',
          '<div style="font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0;">' + ts + '</div>',
        '</div>',
        n.detail ? '<div style="font-size:11px;color:var(--text3);">' + escapeHtml(n.detail) + '</div>' : '',
        '<div style="font-size:10px;font-weight:600;color:' + typ.farbe + ';margin-top:4px;text-transform:uppercase;letter-spacing:.05em;">' + typ.label + '</div>',
      '</div>',

      // Pfeil wenn Link
      n.link ? '<div style="color:var(--text3);font-size:14px;flex-shrink:0;align-self:center;">›</div>' : '',

    '</div>'
  ].join('');
}

// ── Notif-Klick ──
function notifKlick(id) {
  var notif = alleNotifs.find(function(n){ return n.id === id; });
  if (!notif) return;

  // Als gelesen markieren
  notif.gelesen = true;
  localStorage.setItem('prova_notif_gelesen_' + id, '1');

  // Navigieren wenn Link vorhanden
  if (notif.link) {
    window.location.href = notif.link;
    return;
  }

  render();
  aktualisiereZähler();
}

// ── Alle als gelesen markieren ──
function alleAlsGelesenMarkieren() {
  alleNotifs.forEach(function(n) {
    n.gelesen = true;
    localStorage.setItem('prova_notif_gelesen_' + n.id, '1');
  });
  render();
  aktualisiereZähler();
  showToast('✓ Alle Benachrichtigungen als gelesen markiert', 'success');
}

// ── Zähler aktualisieren ──
function aktualisiereZähler() {
  var ungelesen = alleNotifs.filter(function(n){ return !n.gelesen; }).length;
  var sub = document.getElementById('notif-count-sub');
  if (sub) sub.textContent = ungelesen > 0 ? ungelesen + ' ungelesen' : 'Alles gelesen ✓';

  var badge = document.getElementById('unread-count-badge');
  if (badge) {
    if (ungelesen > 0) {
      badge.textContent = ungelesen;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }
  }
}

// ── Push-Banner ──
function zeigPushBanner() {
  if ('Notification' in window && Notification.permission === 'default' && !einstellungen.push_aktiviert) {
    document.getElementById('push-banner').style.display = 'block';
  }
}

function aktivierePush() {
  if (!('Notification' in window)) {
    showToast('Push-Benachrichtigungen werden in diesem Browser nicht unterstützt.', 'warning');
    return;
  }
  Notification.requestPermission().then(function(permission) {
    if (permission === 'granted') {
      einstellungen.push_aktiviert = true;
      localStorage.setItem('prova_notif_einstellungen', JSON.stringify(einstellungen));
      document.getElementById('push-banner').style.display = 'none';
      showToast('🔔 Push-Benachrichtigungen aktiviert', 'success');
    }
  });
}

// ── Einstellungen-Modal ──
function notifEinstellungen() {
  var modal   = document.getElementById('einstellungen-modal');
  var inhalt  = document.getElementById('einstellungen-inhalt');

  var items = [
    { key: 'frist_kritisch',   label: 'Kritische Fristen (< 3 Tage)', sub: 'Sofortige Benachrichtigung' },
    { key: 'frist_warnung',    label: 'Fristwarnungen (< 7 Tage)',    sub: 'Erinnerung rechtzeitig' },
    { key: 'frist_ok',         label: 'Fristen im grünen Bereich',    sub: 'Wöchentliche Übersicht' },
    { key: 'neuer_auftrag',    label: 'Neue Aufträge',                 sub: 'Wenn neuer Fall eingegangen' },
    { key: 'rechnung_faellig', label: 'Fällige Rechnungen',           sub: '30/14/7 Tage vor Fälligkeit' },
    { key: 'system',           label: 'System-Updates',               sub: 'Neue Features und Meldungen' },
  ];

  inhalt.innerHTML = [
    '<div style="display:flex;flex-direction:column;gap:12px;">',
      items.map(function(item) {
        var aktiv = einstellungen[item.key] !== false;
        return [
          '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border,rgba(255,255,255,.07));">',
            '<div>',
              '<div style="font-size:13px;font-weight:600;color:var(--text);">' + item.label + '</div>',
              '<div style="font-size:11px;color:var(--text3);margin-top:2px;">' + item.sub + '</div>',
            '</div>',
            '<label style="position:relative;display:inline-block;width:40px;height:22px;">',
              '<input type="checkbox" data-key="' + item.key + '" ' + (aktiv ? 'checked' : '') + ' style="opacity:0;width:0;height:0;" onchange="toggleEinstellung(\''+item.key+'\',this.checked)">',
              '<span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:' + (aktiv ? '#4f8ef7' : 'rgba(255,255,255,.1)') + ';border-radius:11px;transition:.3s;" id="toggle_'+item.key+'"></span>',
              '<span style="position:absolute;content:\'\';height:16px;width:16px;left:' + (aktiv ? '21px' : '3px') + ';bottom:3px;background:white;border-radius:50%;transition:.3s;" id="thumb_'+item.key+'"></span>',
            '</label>',
          '</div>'
        ].join('');
      }).join(''),
      '<div style="margin-top:8px;">',
        '<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;">E-Mail Zusammenfassung</div>',
        '<select id="email-digest-select" style="width:100%;padding:8px 10px;background:var(--surface2,#1e2535);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;">',
          '<option value="täglich" ' + (einstellungen.email_digest === 'täglich' ? 'selected' : '') + '>Täglich</option>',
          '<option value="wöchentlich" ' + (einstellungen.email_digest === 'wöchentlich' ? 'selected' : '') + '>Wöchentlich</option>',
          '<option value="nie" ' + (einstellungen.email_digest === 'nie' ? 'selected' : '') + '>Nie</option>',
        '</select>',
      '</div>',
    '</div>'
  ].join('');

  modal.style.display = 'flex';
}

function toggleEinstellung(key, aktiv) {
  einstellungen[key] = aktiv;
  var toggle = document.getElementById('toggle_' + key);
  var thumb  = document.getElementById('thumb_'  + key);
  if (toggle) toggle.style.background = aktiv ? '#4f8ef7' : 'rgba(255,255,255,.1)';
  if (thumb)  thumb.style.left        = aktiv ? '21px' : '3px';
}

function schliesseEinstellungen() {
  document.getElementById('einstellungen-modal').style.display = 'none';
}

function speichereEinstellungen() {
  var select = document.getElementById('email-digest-select');
  if (select) einstellungen.email_digest = select.value;
  localStorage.setItem('prova_notif_einstellungen', JSON.stringify(einstellungen));
  schliesseEinstellungen();
  showToast('✓ Einstellungen gespeichert', 'success');
  ladeNotifications();
}

// ── Helfer ──
function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return r + ',' + g + ',' + b;
}
function escapeHtml(s) {
  return String(s).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"');
}

// ── Init ──
document.addEventListener('DOMContentLoaded', function() {
  ladeNotifications();
});
</script>

<script src="support-chat.js" defer></script>
<script src="sw-register.js" defer></script>
</body>
</html>

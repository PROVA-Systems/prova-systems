<!DOCTYPE html>
<html lang="de">
<head>
<script>
  window.__PROVA_ENV = 'production';
  window.onerror = function(msg, src, line, col, err) {
    if (!navigator.onLine) return;
    fetch('/.netlify/functions/error-log', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        msg: String(msg).slice(0,500),
        src: src, line: line,
        page: window.location.pathname,
        user: localStorage.getItem('prova_sv_email')||'unbekannt',
        ua: navigator.userAgent.slice(0,100),
        ts: new Date().toISOString()
      })
    }).catch(function(){});
  };
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benachrichtigungen · PROVA</title>
  <link rel="stylesheet" href="prova-nav.css">
  <style>
    :root { --bg:#0d0f14; --bg2:#13161d; --text:#e8eaf0; --text2:#9da3b4; --text3:#6b7280; --accent:#4f8ef7; --border:rgba(255,255,255,0.08); --sans:'Instrument Sans',system-ui,sans-serif; --nav-h:52px; --bot-h:56px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text2); min-height: 100vh; padding-bottom: 0; }
    .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 20px; height: var(--nav-h); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .logo { font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .topnav { display: flex; gap: 4px; }
    .topnav a { padding: 6px 10px; border-radius: 6px; color: var(--text3); font-size: 13px; text-decoration: none; min-height: 44px; display: inline-flex; align-items: center; }
    .topnav a:hover { background: rgba(255,255,255,0.05); color: var(--text2); }
    .paket-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
    .settings-link { color: var(--text3); padding: 6px 8px; font-size: 16px; text-decoration: none; }
    .burger { display: none; background: none; border: none; cursor: pointer; flex-direction: column; gap: 5px; padding: 8px; }
    .burger span { display: block; width: 20px; height: 2px; background: var(--text2); }
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 260px; background: var(--bg2); border-right: 1px solid var(--border); z-index: 201; transform: translateX(-100%); transition: transform 0.25s ease; display: flex; flex-direction: column; }
    .drawer.open { transform: translateX(0); }
    .drawer-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .drawer-close { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; }
    .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: var(--bot-h); background: var(--bg2); border-top: 1px solid var(--border); z-index: 100; justify-content: space-around; align-items: stretch; }
    @media (max-width: 900px) { .topnav { display: none; } .burger { display: flex; } .bottom-nav { display: flex; } body { padding-bottom: var(--bot-h); } }
    .main { max-width: 720px; margin: 0 auto; padding: 28px 20px 48px; }
    .page-title { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .page-sub { font-size: 14px; color: var(--text3); line-height: 1.6; }
  </style>
</head>
<body>
  <script src="prova-account-gate.js"></script>
  <script src="paket-guard.js"></script>
  <div class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="logo">PRO<span>VA</span></a>
      <nav class="topnav">
        <a href="dashboard.html">Zentrale</a>
        <a href="normen.html">Normen</a>
        <a href="textbausteine.html" style="color:var(--accent);">Textbausteine</a>
      </nav>
    </div>
    <div class="topbar-right" style="display:flex;align-items:center;gap:8px;">
      <span class="paket-badge" id="topbarPaket"></span>
      <a href="einstellungen.html" class="settings-link">⚙</a>
      <button type="button" class="burger" onclick="toggleDrawer()" aria-label="Menü"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <a href="dashboard.html" class="logo">PRO<span>VA</span></a>
      <button type="button" class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div id="provaDrawerMount"></div>
  </div>
  <nav class="bottom-nav" id="provaBottomNav"></nav>
  <script>
    function toggleDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('drawerOverlay');d.classList.toggle('open');o.classList.toggle('open');document.body.style.overflow=d.classList.contains('open')?'hidden':'';}
    function closeDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('drawerOverlay');d.classList.remove('open');o.classList.remove('open');document.body.style.overflow='';}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDrawer();});
    (function(){if(!window.PROVA)return;var c=PROVA.paketColor();var s='background:'+c+'18;color:'+c+';border:1px solid '+c+'33';var el=document.getElementById('topbarPaket');if(el){el.textContent=PROVA.paketLabel();el.setAttribute('style',s);}})();
  </script>
  <script src="nav.js" defer></script>
  <main class="main">
    <h1 class="page-title">Benachrichtigungen</h1>
    <p class="page-sub">E-Mail- und In-App-Hinweise — Erweiterung folgt.</p>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PROVA — Ergänzungsgutachten</title>
<script src="prova-preise.js"></script>
<script src="paket-guard.js"></script>
<script src="auth-guard.js"></script>
<script src="prova-auth-api.js"></script>
<script src="prova-sv-airtable.js"></script>
<script src="theme.js"></script>
<script src="prova-layout.config.js"></script>
<script src="prova-api.js"></script>
<script src="nav.js" defer></script>
<script src="global-search.js" defer></script>
<style>
:root{
  --bg:#0b0d11;--bg2:#111318;--bg3:#161a22;
  --surface:#1c2130;--surface2:#232a3a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#eaecf4;--text2:#8b93ab;--text3:#4d5568;
  --accent:#4f8ef7;--accent2:#3a7be0;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;
  --font-ui:'DM Sans',system-ui,sans-serif;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;
  --topbar-h:56px;--sb-w:228px;--sb-w-col:56px;
}
html{font-size:14px;}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.55;}
</style>
<link rel="stylesheet" href="mobile.css">
<link rel="stylesheet" href="prova-design.css">
<style>
@media print{.app-shell>nav,.topbar,.no-print{display:none!important;}.main-wrap{margin:0!important;}}
.doku-wrap{max-width:800px;margin:0 auto;padding:8px 16px 100px;}
.doku-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.doku-header{padding:18px 22px;border-bottom:1px solid var(--border);}
.doku-header-title{font-size:16px;font-weight:700;color:var(--text);}
.doku-header-sub{font-size:12px;color:var(--text3);margin-top:3px;}
.doku-body{padding:22px;}
.doku-field-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;}
.doku-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);font-family:inherit;box-sizing:border-box;}
.doku-input:focus{outline:none;border-color:var(--accent);}
.doku-textarea{min-height:120px;resize:vertical;}
.doku-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.doku-group{margin-bottom:14px;}
.btn-primary{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-md);font-weight:600;cursor:pointer;font-size:13px;}
.btn-ghost{padding:8px 14px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--r-md);font-size:13px;cursor:pointer;}
select.doku-input{cursor:pointer;}
</style>
</head>
<body data-page="ergaenzung">
<div class="app-shell" id="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="sb-overlay" id="sb-overlay" onclick="closeMobileSidebar()"></div>
  <div class="main-wrap" id="main-wrap">
    <header class="topbar">
      <div class="topbar-left">
        <button class="burger" onclick="openMobileSidebar()"><span></span><span></span><span></span></button>
        <div class="breadcrumb"><span>PROVA</span><span style="color:var(--text3)">&#8250;</span><strong>Ergänzungsgutachten</strong></div>
      </div>
      <div class="topbar-right no-print"></div>
    </header>
    <div class="doku-wrap">
      <div style="margin-bottom:24px;">
        <h1 style="font-size:22px;font-weight:800;color:var(--text);margin:0 0 4px;">&#129329; Ergänzungsgutachten</h1>
        <p style="font-size:13px;color:var(--text3);margin:0;">§411 ZPO &middot; Gerichtliches Ergänzungsverfahren</p>
      </div>
      <div class="doku-card">
        <div class="doku-header">
          <div class="doku-header-title">&#128279; Verknüpfung Hauptgutachten</div>
          <div class="doku-header-sub">Wählen Sie das zugehörige Hauptgutachten</div>
        </div>
        <div class="doku-body">
          <div class="doku-group">
            <label class="doku-field-label">Hauptgutachten</label>
            <select class="doku-input" id="eg-hauptgutachten" onchange="ladeHauptgutachten(this.value)">
              <option value="">&#8212; Bitte Hauptgutachten wählen &#8212;</option>
            </select>
          </div>
          <div class="doku-group">
            <label class="doku-field-label">Aktenzeichen Ergänzung</label>
            <input type="text" class="doku-input" id="eg-az" placeholder="PROVA-S-2026-..." readonly style="opacity:.65;">
          </div>
        </div>
      </div>
      <div class="doku-card">
        <div class="doku-header">
          <div class="doku-header-title">&#128196; Ergänzungsinhalt</div>
          <div class="doku-header-sub">Neue Beweisfragen und Anlass der Ergänzung</div>
        </div>
        <div class="doku-body">
          <div class="doku-group">
            <label class="doku-field-label">Beweisfragen des Gerichts / zu klärende Punkte</label>
            <textarea class="doku-input doku-textarea" id="eg-beweisfragen" placeholder="Beweisfragen des Gerichts / zu klärende Punkte..."></textarea>
          </div>
          <div class="doku-group">
            <label class="doku-field-label">Kurzbegründung</label>
            <textarea class="doku-input doku-textarea" id="eg-begruendung" placeholder="Kurzbegründung..." style="min-height:80px;"></textarea>
          </div>
          <div class="doku-group">
            <label class="doku-field-label">Neue Feststellungen / Ergänzende Ausführungen</label>
            <textarea class="doku-input doku-textarea" id="eg-ausfuehrungen" placeholder="Neue Feststellungen und ergänzende Ausführungen..."></textarea>
          </div>
          <div class="doku-group">
            <label class="doku-field-label">Ergebnis / Schlussfolgerung</label>
            <textarea class="doku-input doku-textarea" id="eg-ergebnis" placeholder="Ergebnis und Schlussfolgerung..."></textarea>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:12px;padding-bottom:40px;">
        <button class="btn-primary" onclick="speichereErgaenzung()">&#128190; Ergänzungsfall anlegen</button>
        <button class="btn-ghost" onclick="history.back()">&#8592; Zurück</button>
      </div>

    </div>
  </div>
</div>
<script src="ergaenzung-logic.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Hauptgutachten aus Airtable laden
  var token = localStorage.getItem('prova_airtable_pat') || '';
  if (!token) return;
  
  fetch('/.netlify/functions/airtable', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      action: 'list',
      table: 'SCHADENSFAELLE',
      fields: ['Aktenzeichen','Auftragstyp','Status'],
      filterByFormula: "AND({Auftragstyp}!='Ergaenzung',{Status}!='Abgeschlossen')",
      maxRecords: 50
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    var sel = document.getElementById('hauptgutachten');
    (data.records || []).forEach(function(r) {
      var opt = document.createElement('option');
      opt.value = r.id;
      opt.textContent = r.fields.Aktenzeichen || r.id;
      sel.appendChild(opt);
    });
    // URL-Parameter vorausfüllen
    var az = new URLSearchParams(window.location.search).get('az');
    if (az) {
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].textContent === az) { sel.selectedIndex = i; fuelleAZ(); break; }
      }
    }
  })
  .catch(function(){});
  
  document.getElementById('hauptgutachten').addEventListener('change', fuelleAZ);
});

function fuelleAZ() {
  var sel = document.getElementById('hauptgutachten');
  var txt = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].textContent : '';
  document.getElementById('parent-az').value = txt || '';
}

function speichern() {
  var sel = document.getElementById('hauptgutachten');
  var parentId = sel.value;
  var parentAZ = document.getElementById('parent-az').value.trim();
  var beweisfragen = document.getElementById('beweisfragen').value.trim();
  var anlass = document.getElementById('anlass').value.trim();
  var termin = document.getElementById('termin').value;
  var stunden = document.getElementById('stunden').value;

  if (!parentId) { alert('Bitte Hauptgutachten wählen.'); return; }
  if (!beweisfragen) { alert('Bitte Beweisfragen eintragen.'); return; }

  var svEmail = localStorage.getItem('prova_sv_email') || '';

  fetch('/.netlify/functions/airtable', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      action: 'create',
      table: 'SCHADENSFAELLE',
      fields: {
        Auftragstyp: 'Ergaenzung',
        Parent_AZ: parentAZ,
        Beweisfragen: beweisfragen,
        Anlass_Ergaenzung: anlass,
        Ortstermin: termin || null,
        Geschaetzte_Stunden: parseFloat(stunden) || 2,
        Status: 'Neu',
        sv_email: svEmail
      }
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.id) {
      alert('✅ Ergänzungsfall angelegt: ' + (data.fields && data.fields.Aktenzeichen || data.id));
      window.location.href = 'archiv.html';
    } else {
      alert('Fehler: ' + JSON.stringify(data));
    }
  })
  .catch(function(e){ alert('Fehler: ' + e.message); });
}
</script>
</html>

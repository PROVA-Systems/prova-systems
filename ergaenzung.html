  <main class="main">
    <h1>Ergänzungsgutachten (§411 ZPO)</h1>
    <p class="sub">Hauptgutachten aus Airtable wählen, Ergänzungsfall anlegen (<code>Auftragstyp=Ergaenzung</code>, <code>Parent_AZ</code>, <code>Beweisfragen</code>, <code>Status=Neu</code>). Vorlage: <a href="formulare/vorlage-09-ergaenzungsgutachten.html" style="color:var(--accent)">vorlage-09</a>.</p>
    <div id="ergErr"></div>
    <div class="card">
      <label for="fall_select">Hauptgutachten</label>
      <select id="fall_select" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--text);">
        <option value="">— Fälle werden geladen…</option>
      </select>
      <label for="parent_az" style="margin-top:12px;">Parent-AZ (editierbar)</label>
      <input type="text" id="parent_az" placeholder="PROVA-S-2026-…">
      <label for="beweis" style="margin-top:12px;">Neue Beweisfragen</label>
      <textarea id="beweis" placeholder="Beweisfragen des Gerichts / zu klärende Punkte…"></textarea>
      <label for="anlass" style="margin-top:12px;">Anlass der Ergänzung</label>
      <textarea id="anlass" placeholder="Kurzbegründung…" style="min-height:72px;"></textarea>
      <label for="termin" style="margin-top:12px;">Termin Ergänzungsbegehung</label>
      <input type="date" id="termin">
      <label for="stunden" style="margin-top:12px;">Geschätzte Stunden (Ortstermin)</label>
      <input type="number" id="stunden" min="0" step="0.5" value="2" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--text);">
      <label for="frist_start" style="margin-top:12px;">§411 Frist-Berechnung ab Datum</label>
      <input type="date" id="frist_start" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--text);">
      <div id="fristOut"></div>
      <div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:8px;">
        <button type="button" class="btn" id="btnFrist">§411 Frist (+56 Tage)</button>
        <button type="button" class="btn btn-sec" id="btnRechnung">Eigene Rechnung (Positionen)</button>
        <button type="button" class="btn" id="btnCreate">Ergänzungsfall in Airtable speichern</button>
        <button type="button" class="btn btn-sec" id="btnStart">Ergänzungsgutachten starten</button>
      </div>
      <p class="sub" style="margin-top:12px;" id="lastAzNote"></p>
    </div>
  </main>
  <script src="ergaenzung-logic.js"></script>
  <script>
  (function(){
    var api = window.ErgaenzungAPI;
    var err = document.getElementById('ergErr');
    var sel = document.getElementById('fall_select');
    var lastNewAz = '';
    function showErr(m){ err.style.display='block'; err.textContent=m; }
    function clearErr(){ err.style.display='none'; }
    if(!api){ showErr('ergaenzung-logic.js fehlt'); return; }
    sel.innerHTML = '<option value="">Lade Fälle…</option>';
    api.loadHauptfaelle().then(function(faelle){
      sel.innerHTML = '<option value="">— Bitte Hauptgutachten wählen —</option>';
      faelle.forEach(function(f){
        var o = document.createElement('option');
        o.value = f.aktenzeichen || f.airtable_id;
        o.setAttribute('data-id', f.airtable_id);
        o.textContent = f.label || f.aktenzeichen;
        sel.appendChild(o);
      });
    }).catch(function(e){ showErr(e.message||String(e)); sel.innerHTML='<option value="">Fehler beim Laden</option>'; });
    sel.addEventListener('change', function(){
      var opt = sel.options[sel.selectedIndex];
      var az = opt && opt.value ? opt.value : '';
      document.getElementById('parent_az').value = az;
    });
    try {
      var az0 = localStorage.getItem('prova_letztes_az');
      if (az0) document.getElementById('parent_az').value = az0;
    } catch(e){}
    document.getElementById('btnFrist').addEventListener('click', function(){
      var d = document.getElementById('frist_start').value || new Date().toISOString().slice(0,10);
      var end = api.frist411Plus56(d);
      document.getElementById('fristOut').textContent = 'Fristende (Zustellung + 56 Tage, vereinfacht): ' + end.split('-').reverse().join('.');
    });
    document.getElementById('btnRechnung').addEventListener('click', function(){
      var az = document.getElementById('parent_az').value.trim();
      api.prefillRechnungErgänzung(az, document.getElementById('stunden').value);
      window.location.href = 'rechnungen.html?prefill=ergaenzung';
    });
    document.getElementById('btnCreate').addEventListener('click', function(){
      clearErr();
      var parent_az = document.getElementById('parent_az').value.trim();
      if(!parent_az){ showErr('Bitte Parent-AZ wählen oder eintragen.'); return; }
      var btn = this;
      btn.disabled = true;
      api.createErgaenzungsFall({
        parent_az: parent_az,
        beweisfragen: document.getElementById('beweis').value.trim(),
        anlass: document.getElementById('anlass').value.trim(),
        termin: document.getElementById('termin').value,
        stunden: document.getElementById('stunden').value
      }).then(function(res){
        var f = res.fields || {};
        lastNewAz = String(f.Aktenzeichen || f.Schadensnummer || f.schadensnummer || '').trim() || (res.id || '');
        document.getElementById('lastAzNote').textContent = 'Gespeichert. Neues Aktenzeichen (falls von Airtable gesetzt): ' + (lastNewAz || '— bitte in Airtable prüfen');
        try { localStorage.setItem('prova_letztes_az', lastNewAz || parent_az); } catch(x){}
      }).catch(function(e){ showErr(e.message||String(e)); }).finally(function(){ btn.disabled=false; });
    });
    document.getElementById('btnStart').addEventListener('click', function(){
      var az = lastNewAz || document.getElementById('parent_az').value.trim();
      if(!az){ showErr('Zuerst Fall speichern oder AZ eintragen.'); return; }
      window.location.href = api.appHref() + '?az=' + encodeURIComponent(az);
    });
  })();
  </script>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover">
<title>Cookie-Einstellungen · PROVA</title>
<link rel="stylesheet" href="/style.css">
<script src="/lib/cookie-consent.js"></script>
<style>
.ce-wrap{max-width:760px;margin:0 auto;padding:32px 20px;}
.ce-card{background:#1c2130;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:20px;margin:16px 0;}
.ce-cat-title{font-size:14px;font-weight:700;}
.ce-cat-desc{font-size:12px;color:#8b93ab;margin:4px 0 10px;}
.ce-status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;}
.ce-status.on{background:rgba(16,185,129,.15);color:#10b981;}
.ce-status.off{background:rgba(239,68,68,.15);color:#ef4444;}
.ce-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.ce-actions button{padding:12px 22px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;min-height:44px;}
.ce-btn-primary{background:linear-gradient(135deg,#4f8ef7,#3a7be0);color:#fff;}
.ce-btn-danger{background:#ef4444;color:#fff;}
.ce-btn-ghost{background:#1c2130;color:#eaecf4;border:1px solid rgba(255,255,255,.13);}
.ce-cookies-table{width:100%;font-size:12px;margin-top:8px;}
.ce-cookies-table th,.ce-cookies-table td{padding:6px 8px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05);}
.ce-cookies-table th{color:#8b93ab;font-weight:600;font-size:10px;text-transform:uppercase;}
</style>
</head>
<body style="background:#0b0d11;color:#eaecf4;font-family:'DM Sans',system-ui,sans-serif;">
<main class="ce-wrap">

  <h1 style="margin-bottom:6px;">🍪 Cookie-Einstellungen</h1>
  <p style="color:#8b93ab;font-size:13px;">§ 25 TTDSG · DSGVO Art. 7 · Sie können Ihre Auswahl jederzeit ändern oder widerrufen.</p>

  <div id="ce-content"></div>

  <p style="font-size:12px;color:#8b93ab;margin-top:20px;">
    <a href="/datenschutz.html" style="color:#4f8ef7;">Datenschutz-Erklärung</a> ·
    <a href="/impressum.html" style="color:#4f8ef7;">Impressum</a>
  </p>

</main>

<script>
function render() {
  const c = ProvaCookieConsent.getConsent();
  const has = ProvaCookieConsent.hasConsent();
  const tsLine = c.ts ? '<div style="font-size:11px;color:#4d5568;margin-top:4px;">Letzte Entscheidung: ' + new Date(c.ts).toLocaleString('de-DE') + '</div>' : '';

  document.getElementById('ce-content').innerHTML = ''
    + '<div class="ce-card">'
    + '  <div style="display:flex;justify-content:space-between;align-items:center;">'
    + '    <div>'
    + '      <div class="ce-cat-title">Notwendig</div>'
    + '      <div class="ce-cat-desc">Login-Session (prova_auth_token), Tier-Info (prova_paket), Cookie-Consent.</div>'
    + '    </div>'
    + '    <span class="ce-status on">AKTIV</span>'
    + '  </div>'
    + '  <table class="ce-cookies-table">'
    + '    <tr><th>Cookie</th><th>Anbieter</th><th>Speicherdauer</th></tr>'
    + '    <tr><td>prova_auth_token</td><td>PROVA</td><td>30 Tage</td></tr>'
    + '    <tr><td>prova_sv_email</td><td>PROVA</td><td>30 Tage</td></tr>'
    + '    <tr><td>prova_cookie_consent</td><td>PROVA</td><td>13 Monate</td></tr>'
    + '  </table>'
    + '</div>'
    + '<div class="ce-card">'
    + '  <div style="display:flex;justify-content:space-between;align-items:center;">'
    + '    <div>'
    + '      <div class="ce-cat-title">Analyse</div>'
    + '      <div class="ce-cat-desc">Plausible Analytics — pseudonyme Page-Visits, EU-Hosting, kein Drittland-Transfer.</div>'
    + '    </div>'
    + '    <span class="ce-status ' + (c.analytics ? 'on' : 'off') + '">' + (c.analytics ? 'AKTIV' : 'INAKTIV') + '</span>'
    + '  </div>'
    + '  <table class="ce-cookies-table">'
    + '    <tr><th>Cookie</th><th>Anbieter</th><th>Speicherdauer</th></tr>'
    + '    <tr><td>(keine — Plausible nutzt nur First-Party-Page-Hash)</td><td>Plausible</td><td>—</td></tr>'
    + '  </table>'
    + '</div>'
    + '<div class="ce-card">'
    + '  <div style="display:flex;justify-content:space-between;align-items:center;">'
    + '    <div>'
    + '      <div class="ce-cat-title">Marketing</div>'
    + '      <div class="ce-cat-desc">Stripe Conversion-Tracking. Wird nur bei Trial-Abschluss aktiv.</div>'
    + '    </div>'
    + '    <span class="ce-status ' + (c.marketing ? 'on' : 'off') + '">' + (c.marketing ? 'AKTIV' : 'INAKTIV') + '</span>'
    + '  </div>'
    + '</div>'
    + tsLine
    + '<div class="ce-actions">'
    + '  <button class="ce-btn-primary" onclick="acceptAll()">Alle akzeptieren</button>'
    + '  <button class="ce-btn-ghost" onclick="customize()">Auswahl ändern</button>'
    + (has ? '  <button class="ce-btn-danger" onclick="revoke()">Einwilligung widerrufen</button>' : '')
    + '</div>';
}
window.acceptAll = function () { ProvaCookieConsent.acceptAll(); render(); };
window.revoke = function () { ProvaCookieConsent.revoke(); render(); };
window.customize = function () { ProvaCookieConsent.show(); };
document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>

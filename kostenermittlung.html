<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kostenermittlung · PROVA</title>
<script src="prova-preise.js"></script>
<script src="paket-guard.js"></script>
<script src="auth-guard.js"></script>
<script src="theme.js"></script>
<script src="trial-guard.js"></script>
<script src="nav.js"></script>

<link rel="stylesheet" href="mobile.css">
<style>
  /* ═══ PROVA SIDEBAR SYSTEM ══════════════════════════════════════════════ */
  :root{
    --bg:#0b0d11;--bg2:#111318;--bg3:#161a22;
    --surface:#1c2130;--surface2:#232a3a;
    --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
    --text:#eaecf4;--text2:#8b93ab;--text3:#4d5568;
    --accent:#4f8ef7;--accent2:#3a7be0;
    --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;
    --green:#10b981;--green-bg:rgba(16,185,129,.08);--green-border:rgba(16,185,129,.25);
    --red:#ef4444;--red-bg:rgba(239,68,68,.08);--red-border:rgba(239,68,68,.25);
    --warn:#f59e0b;--warn-bg:rgba(245,158,11,.08);--warn-border:rgba(245,158,11,.25);
    --font-ui:'DM Sans',system-ui,sans-serif;
    --r-sm:6px;--r-md:10px;--r-lg:14px;
    --shadow-sm:0 1px 3px rgba(0,0,0,.25);--shadow-md:0 4px 16px rgba(0,0,0,.35);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:14px;scroll-behavior:smooth;}
  body{font-family:var(--font-ui);background:var(--bg);color:var(--text2);min-height:100vh;overflow-x:hidden;line-height:1.55;}
  a{text-decoration:none;color:inherit;}
  button,input,select,textarea{font-family:inherit;font-size:inherit;}
  *{-webkit-tap-highlight-color:transparent;}
  input,select,textarea{font-size:max(16px,1em);}
  .app-shell{min-height:100vh;}
  /* Sidebar/Overlay Minimal-Fallback (falls nav.js fehlt) */
  /* sidebar via nav.js */
  .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:120;}
  .sb-overlay.open{display:block;}
  @media(max-width:768px){
    .sidebar{position:fixed;top:0;bottom:0;left:0;transform:translateX(-102%);transition:transform .2s ease;z-index:140;box-shadow:0 10px 40px rgba(0,0,0,.4);}
    .sidebar.open{transform:translateX(0);}
  }
  .topbar{height:52px;min-height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;flex-shrink:0;}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .topbar-right{display:flex;align-items:center;gap:6px;}
  .breadcrumb{font-size:13px;color:var(--text3);display:flex;align-items:center;gap:6px;}
  .breadcrumb strong{color:var(--text2);font-weight:600;}
  .topbar-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;transition:all .12s;}
  .topbar-btn:hover{color:var(--text2);background:rgba(255,255,255,.05);}
  .topbar-paket{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;letter-spacing:.04em;}
  .notif-wrap{position:relative;}
  .notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--danger);border-radius:50%;border:1.5px solid var(--bg2);}
  .burger{display:none;flex-direction:column;gap:4.5px;background:none;border:none;cursor:pointer;padding:8px;border-radius:6px;min-height:36px;align-items:center;justify-content:center;}
  .burger span{display:block;width:18px;height:2px;background:var(--text2);border-radius:2px;}
  .burger:hover span{background:var(--text);}
  .page-content{padding:24px 28px 48px;max-width:1360px;width:100%;}
  .support-fab{position:fixed;bottom:24px;right:24px;z-index:400;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 16px rgba(79,142,247,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:transform .15s;border:none;color:#fff;}
  .support-fab:hover{transform:scale(1.08);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
  .modal-overlay.open{display:flex;}
  .modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);max-width:480px;width:100%;padding:26px;max-height:90vh;overflow-y:auto;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .modal-title{font-size:15px;font-weight:700;color:var(--text);}
  .modal-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;border-radius:4px;}
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
  .form-input{width:100%;padding:9px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);color:var(--text);font-size:13px;outline:none;transition:border-color .12s;}
  .form-input:focus{border-color:var(--accent);}
  .form-input::placeholder{color:var(--text3);}
  textarea.form-input{min-height:80px;resize:vertical;}
  @media(max-width:768px){
    .burger{display:flex;}
    .page-content{padding:16px 16px 72px;}
    .topbar{padding:0 16px;}
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .page-content{animation:fadeIn .25s ease;}

/* MAIN LAYOUT */
.main{flex:1;padding:24px 28px 48px;max-width:1360px;width:100%;}

/* HEADER CARD */
.header-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:20px 24px;margin-bottom:22px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.header-meta{display:flex;flex-direction:column;gap:4px;}
.header-title{font-size:20px;font-weight:700;letter-spacing:-0.01em;}
.header-sub{font-size:13px;color:var(--text3);}
.header-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-sa{background:rgba(79,142,247,0.12);color:#93c5fd;border:1px solid rgba(79,142,247,0.2);}
.badge-az{background:rgba(255,255,255,0.05);color:var(--text3);border:1px solid var(--border2);}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
.search-box{flex:1;min-width:160px;position:relative;}
.search-box input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:9px 12px 9px 36px;color:var(--text);font-family:var(--font-ui);font-size:14px;outline:none;transition:border-color .15s;}
.search-box input:focus{border-color:var(--accent);}
.search-box input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;}
.filter-select{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:9px 12px;color:var(--text);font-family:var(--font-ui);font-size:13px;cursor:pointer;outline:none;}
.filter-select:focus{border-color:var(--accent);}
.filter-select option{background:var(--bg2);}

/* TABS */
.tabs-nav{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-btn{padding:9px 18px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:var(--font-ui);border-radius:6px 6px 0 0;white-space:nowrap;}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* AUFMASS */
.aufmass-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.aufmass-raum-header{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.aufmass-raum-name{font-size:13px;font-weight:700;color:var(--text);}
.aufmass-table{width:100%;border-collapse:collapse;font-size:12px;}
.aufmass-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);}
.aufmass-table th:not(:first-child){text-align:right;}
.aufmass-table td{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text2);}
.aufmass-table td:not(:first-child){text-align:right;}
.aufmass-table tr:last-child td{border-bottom:none;}
.aufmass-input{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:4px 7px;color:var(--text);font-size:12px;text-align:right;width:70px;font-family:var(--font-ui);}
.aufmass-input:focus{outline:none;border-color:var(--accent);}
.aufmass-result{font-weight:700;color:var(--green);font-size:12px;}
.aufmass-summe-row{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(79,142,247,.05);border-top:1px solid var(--border);}
.aufmass-uebernehmen{padding:5px 12px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-ui);transition:background .15s;}
.aufmass-uebernehmen:hover{background:var(--accent2);}

/* SUCHERGEBNIS-HIGHLIGHT */
.search-highlight{display:inline-block;background:rgba(79,142,247,.25);border-radius:2px;padding:0 1px;}

/* POSITION QUICK-ADD */
.quick-add-bar{display:flex;gap:8px;margin-bottom:16px;}
.quick-add-bar input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:9px 14px;color:var(--text);font-family:var(--font-ui);font-size:13px;outline:none;}
.quick-add-bar input:focus{border-color:var(--accent);}

/* POSITIONEN TABLE — 7 Spalten Desktop */
.pos-table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:22px;}
.pos-table-header{display:grid;grid-template-columns:1fr 80px 88px 80px 70px 88px 40px;gap:0;background:var(--surface2);border-bottom:1px solid var(--border2);padding:10px 16px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.pos-table-body{display:flex;flex-direction:column;}
.pos-row{display:grid;grid-template-columns:1fr 80px 88px 80px 70px 88px 40px;gap:0;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer;}
.pos-row:last-child{border-bottom:none;}
.pos-row:hover{background:rgba(255,255,255,.03);}
.pos-row.added{background:rgba(16,185,129,.06);border-left:2px solid var(--green);}
.pos-nr{font-size:11px;font-weight:700;color:var(--text3);font-family:monospace;margin-bottom:2px;}
.pos-bez{font-size:13px;color:var(--text);font-weight:500;}
.pos-kat{font-size:11px;color:var(--text3);margin-top:2px;}
.pos-price{font-size:13px;text-align:right;padding-right:4px;}
.pos-price.min{color:var(--text3);}
.pos-price.med{color:var(--text);font-weight:600;}
.pos-price.max{color:var(--text3);}
.pos-einheit{font-size:12px;color:var(--text3);text-align:center;}
.pos-qty-wrap{display:flex;align-items:center;gap:4px;}
.pos-qty{width:75px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;color:var(--text);font-family:var(--font-ui);font-size:13px;text-align:right;outline:none;}
.pos-qty:focus{border-color:var(--accent);}
.pos-add-btn{width:36px;height:36px;border-radius:8px;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface2);color:var(--text3);}
.pos-add-btn:hover{background:var(--green-bg);color:var(--green);}
.pos-add-btn.active{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.no-results{padding:36px;text-align:center;color:var(--text3);font-size:14px;}

/* 2-SPALTEN LAYOUT */
.layout{display:grid;grid-template-columns:1fr 268px;gap:20px;align-items:start;}
.auswahl-card{position:sticky;top:calc(52px + 16px);background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px;}
.auswahl-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.auswahl-leer{font-size:13px;color:var(--text3);font-style:italic;text-align:center;padding:20px 0;}
.auswahl-item{display:flex;flex-direction:column;gap:2px;padding:8px 0;border-bottom:1px solid var(--border);}
.auswahl-item:last-of-type{border-bottom:none;}
.auswahl-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.auswahl-item-bez{font-size:12px;color:var(--text);font-weight:500;flex:1;}
.auswahl-item-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0;line-height:1;flex-shrink:0;}
.auswahl-item-remove:hover{color:var(--red);}
.auswahl-item-detail{font-size:11px;color:var(--text3);}
.auswahl-item-preis{font-size:12px;font-weight:600;color:var(--green);}

/* SUMME */
.summe-box{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px;margin-top:14px;}
.summe-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text3);padding:3px 0;}
.summe-row.total{font-size:15px;font-weight:700;color:var(--text);border-top:1px solid var(--border2);margin-top:6px;padding-top:8px;}
.summe-row.total span:last-child{color:var(--green);}

/* ACTIONS */
.actions-bar{margin-top:18px;display:flex;flex-direction:column;gap:8px;}
.btn-primary{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:var(--font-ui);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-skip{width:100%;padding:10px;background:none;border:1px solid var(--border2);color:var(--text3);border-radius:10px;font-family:var(--font-ui);font-size:13px;cursor:pointer;transition:all .15s;}
.btn-skip:hover{border-color:var(--text3);color:var(--text2);}

/* TOAST */
.toast-c{position:fixed;bottom:24px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none;}
.toast{padding:10px 16px;border-radius:9px;font-size:13px;font-family:var(--font-ui);font-weight:500;animation:toastIn .25s ease;background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.toast-ok{background:var(--green-bg);color:#6ee7b7;border-color:var(--green-border);}
@keyframes toastIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px;}
.empty-state p{font-size:14px;line-height:1.6;}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);}
.pg-btn{background:var(--surface);border:1px solid var(--border2);color:var(--text2);border-radius:7px;padding:5px 12px;font-family:var(--font-ui);font-size:12px;cursor:pointer;}
.pg-btn:hover{border-color:var(--accent);color:var(--accent);}
.pg-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── RESPONSIVE: Halber Laptop (≤1000px) ── */
@media(max-width:1000px){
  .layout{grid-template-columns:1fr;}
  .auswahl-card{position:static;}
  /* Min+Max ausblenden, nur Median zeigen */
  .pos-table-header{grid-template-columns:1fr 80px 70px 80px 40px;}
  .pos-row{grid-template-columns:1fr 80px 70px 80px 40px;}
  .pos-table-header > div:nth-child(2),
  .pos-table-header > div:nth-child(4),
  .pos-row > div:nth-child(2),
  .pos-row > div:nth-child(4){display:none;}
}

/* ── RESPONSIVE: Tablet/Mobil (≤600px) ── */
@media(max-width:600px){
  .main{padding:12px 12px 72px;}
  .header-title{font-size:16px;}
  .pos-table-header{grid-template-columns:1fr 80px 40px;padding:8px 10px;}
  .pos-row{grid-template-columns:1fr 80px 40px;padding:8px 10px;}
  .pos-table-header > div:nth-child(2),
  .pos-table-header > div:nth-child(4),
  .pos-table-header > div:nth-child(5),
  .pos-row > div:nth-child(2),
  .pos-row > div:nth-child(4),
  .pos-row > div:nth-child(5){display:none;}
  .tab-btn{padding:7px 10px;font-size:12px;}
  .header-card{padding:14px 16px;}
}

  /* ── SUPPORT FAB ── */
  .support-fab{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent,#4f8ef7),#3a7be0);border:none;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(79,142,247,.4);z-index:300;transition:all .2s;display:flex;align-items:center;justify-content:center;}
  .support-fab:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(79,142,247,.5);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:var(--surface,#1c2537);border:1px solid var(--border2,rgba(255,255,255,.12));border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border,rgba(255,255,255,.07));}
  .modal-title{font-size:15px;font-weight:700;color:var(--text,#e8eaf0);}
  .modal-close{background:none;border:none;color:var(--text3,#6b7a99);font-size:18px;cursor:pointer;padding:4px;border-radius:4px;}
  .modal-close:hover{color:var(--text,#e8eaf0);}
  .modal-body{padding:20px;}
  .sup-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3,#6b7a99);margin-bottom:5px;}
  .sup-input{width:100%;padding:9px 12px;background:var(--bg3,#161f30);border:1px solid var(--border2,rgba(255,255,255,.12));border-radius:8px;color:var(--text,#e8eaf0);font-size:13px;font-family:inherit;outline:none;margin-bottom:12px;}
  .sup-input:focus{border-color:var(--accent,#4f8ef7);}
  .sup-textarea{resize:vertical;min-height:90px;}
  .sup-err{font-size:12px;color:var(--red,#ef4444);margin-bottom:8px;display:none;}
  .sup-send-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--accent,#4f8ef7),#3a7be0);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
  .sup-send-btn:disabled{opacity:.5;cursor:not-allowed;}
  .sup-ok{display:none;text-align:center;padding:20px 0;}
  .sup-ok-icon{font-size:36px;margin-bottom:8px;}
  .sup-ok-title{font-size:15px;font-weight:700;color:var(--green,#10b981);margin-bottom:4px;}
  .sup-ok-sub{font-size:12px;color:var(--text3,#6b7a99);}
@media(max-width:768px){.bottom-nav{display:flex !important;}}
</style>

<script src="auftragstyp.js"></script>
  <script src="prova-context.js"></script>
  <script src="prova-error-handler.js"></script>
  <script src="kostenermittlung-logic.js" defer></script>
  <script src="global-search.js" defer></script>
  <script src="auto-save.js" defer></script>
  <script src="support-chat.js" defer></script>
  <script src="sw-register.js" defer></script>
</body>
</html>

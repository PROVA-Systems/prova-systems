# ============================================
# PROVA Systems — Netlify Konfiguration
# ============================================

[build]
  publish = "."
  functions = "netlify/functions"

# ---- REDIRECT RULES ----
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app-login.html"
  status = 200

[[redirects]]
  from = "/app/"
  to = "/app-login.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/app-login.html"
  status = 200

[[redirects]]
  from = "/register"
  to = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/onboarding"
  to = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/freigabe"
  to = "/freigabe.html"
  status = 200

[[redirects]]
  from = "/agb"
  to = "/agb.html"
  status = 200

[[redirects]]
  from = "/datenschutz"
  to = "/datenschutz.html"
  status = 200

[[redirects]]
  from = "/impressum"
  to = "/impressum.html"
  status = 200

[[redirects]]
  from = "/avv"
  to = "/avv.html"
  status = 200

# ---- 404 FALLBACK ----
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---- SECURITY HEADERS ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # connect-src erlaubt Make.com eu1 Webhooks + Netlify Functions + Anthropic API + Airtable + Netlify Identity
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://identity.netlify.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' https://hook.eu1.make.com https://api.anthropic.com https://api.airtable.com https://*.netlify.com https://prova-systems.netlify.app https://*.netlify.app https://identity.netlify.com; frame-ancestors 'self';"

# HTML nie gecacht
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

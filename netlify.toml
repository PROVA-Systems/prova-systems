# ══════════════════════════════════════════════════════════════════
# PROVA Systems — netlify.toml v5.4
# ══════════════════════════════════════════════════════════════════

[build]
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[build.processing]
  skip_processing = true

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# ══════════════════════════════════════════════════════════════
# REDIRECTS
# ══════════════════════════════════════════════════════════════

[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200

[[redirects]]
  from   = "/app"
  to     = "/app-login.html"
  status = 200

[[redirects]]
  from   = "/login"
  to     = "/app-login.html"
  status = 301

[[redirects]]
  from   = "/register"
  to     = "/onboarding.html"
  status = 301

[[redirects]]
  from   = "/logout"
  to     = "/app-login.html"
  status = 302

[[redirects]]
  from   = "/dashboard"
  to     = "/dashboard.html"
  status = 301

[[redirects]]
  from   = "/onboarding"
  to     = "/onboarding.html"
  status = 200

[[redirects]]
  from   = "/freigabe"
  to     = "/freigabe.html"
  status = 200

[[redirects]]
  from   = "/einstellungen"
  to     = "/einstellungen-v2.html"
  status = 301

[[redirects]]
  from   = "/benachrichtigungen"
  to     = "/benachrichtigungen-v2.html"
  status = 301

[[redirects]]
  from   = "/ortstermin"
  to     = "/ortstermin-modus.html"
  status = 301

[[redirects]]
  from   = "/agb"
  to     = "/agb.html"
  status = 200

[[redirects]]
  from   = "/datenschutz"
  to     = "/datenschutz.html"
  status = 200

[[redirects]]
  from   = "/impressum"
  to     = "/impressum.html"
  status = 200

[[redirects]]
  from   = "/avv"
  to     = "/avv.html"
  status = 200

# Stripe Webhook Alias
[[redirects]]
  from   = "/webhook/stripe"
  to     = "/.netlify/functions/stripe-webhook"
  status = 200

# 404 Fallback — KEIN SPA-Catchall (würde fehlende Dateien auf index.html leiten)
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# ══════════════════════════════════════════════════════════════
# SECURITY HEADERS
# ══════════════════════════════════════════════════════════════

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "microphone=(self), camera=(self), geolocation=(), payment=(self 'https://js.stripe.com')"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' blob:; worker-src 'self' blob:; frame-src 'self' https://*.stripe.com https://js.stripe.com https://hooks.stripe.com; connect-src 'self' https://*.netlify.app https://prova-systems.netlify.app https://identity.netlify.com https://api.netlify.com https://api.stripe.com https://api.airtable.com https://api.openai.com https://hook.eu1.make.com https://hook.eu2.make.com wss:; frame-ancestors 'self'; object-src 'none'; base-uri 'self';"

# HTML: kein Cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# SW: kein Cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control         = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# JS/CSS: kurzer Cache
[[headers]]
  for = "/sw-register.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# manifest.json
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type  = "application/manifest+json"

# Icons: langer Cache
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Functions: kein Cache
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control    = "no-cache, no-store, must-revalidate"
    X-PROVA-Version  = "5.4"

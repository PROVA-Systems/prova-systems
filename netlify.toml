  from = "/stellungnahme-v3.1.html"
  to = "/stellungnahme.html"
  status = 301

[[redirects]]
  from = "/stellungnahme-v3.1"
  to = "/stellungnahme.html"
  status = 301

# ---- 404 FALLBACK ----
# Netlify Functions explizit ausschließen — sonst werden /.netlify/functions/* auf index.html umgeleitet
[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---- SECURITY HEADERS ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # connect-src erlaubt Make.com eu1 Webhooks + Netlify Functions + Anthropic API + Airtable + Netlify Identity
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://identity.netlify.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' https://hook.eu1.make.com https://api.anthropic.com https://api.airtable.com https://api.stripe.com https://*.netlify.com https://*.netlify.app https://identity.netlify.com https://fonts.googleapis.com https://fonts.gstatic.com; frame-ancestors 'self'; frame-src https://js.stripe.com https://hooks.stripe.com;"

# HTML nie gecacht
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ============================================
# PROVA Systems — Netlify Konfiguration
# ============================================
[build]
  publish = "."
  functions = "netlify/functions"

# ---- NETLIFY IDENTITY TRIGGERS ----
[functions."identity-signup"]
  included_files = []

# ---- REDIRECT RULES ----

[[redirects]]
  from = "/gutachten.html"
  to = "/app.html"
  status = 301

[[redirects]]
  from = "/neuer-fall"
  to = "/app.html"
  status = 200

# Confirmation + Invite Links → app-login.html
[[redirects]]
  from = "/"
  to = "/app-login.html"
  status = 302
  conditions = {Query = {confirmation_token = ":token"}}

[[redirects]]
  from = "/"
  to = "/app-login.html"
  status = 302
  conditions = {Query = {invite_token = ":token"}}

[[redirects]]
  from = "/"
  to = "/app-login.html"
  status = 302
  conditions = {Query = {recovery_token = ":token"}}

# Clean URLs
[[redirects]]
  from = "/app"
  to = "/app-login.html"
  status = 200

[[redirects]]
  from = "/app/"
  to = "/app-login.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/app-login.html"
  status = 200

[[redirects]]
  from = "/register"
  to = "/app-register.html"
  status = 200

[[redirects]]
  from = "/onboarding"
  to = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/freigabe"
  to = "/freigabe.html"
  status = 200

# Legal pages → /legal/ subfolder
[[redirects]]
  from = "/agb"
  to = "/legal/agb.html"
  status = 200

[[redirects]]
  from = "/datenschutz"
  to = "/legal/datenschutz.html"
  status = 200

[[redirects]]
  from = "/impressum"
  to = "/legal/impressum.html"
  status = 200

[[redirects]]
  from = "/avv"
  to = "/legal/avv.html"
  status = 200

# ---- 404 FALLBACK ----
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ---- SECURITY HEADERS ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://identity.netlify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' blob:; worker-src 'self' blob:; connect-src 'self' https://hook.eu1.make.com https://api.openai.com https://api.airtable.com https://*.netlify.com https://*.netlify.app https://prova-systems.netlify.app https://fonts.googleapis.com https://fonts.gstatic.com https://identity.netlify.com; frame-ancestors 'self';"

# HTML nie gecacht
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Core-JS nie gecacht (nav.js, theme.js ändern sich häufig)
[[headers]]
  for = "/nav.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/theme.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/trial-guard.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Service Worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"
    Content-Type = "application/javascript"

# SW-Register
[[headers]]
  for = "/sw-register.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# Icons
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ─── Block C: APP-Subdomain Root → /dashboard (JS-Auth) ───────────
# Marcel-Direktive: Server-Side leitet immer auf /dashboard. Der
# Auth-Check passiert client-seitig in lib/auth-guard.js — eingeloggte
# User landen direkt auf der App-Startseite, nicht-eingeloggte werden
# vom auth-guard auf /login weitergeleitet.
# Vorteil: authed User sehen nicht kurz die Login-URL beim Direktaufruf.

[[redirects]]
  from   = "https://app.prova-systems.de/"
  to     = "/dashboard"
  status = 301
  force  = true

# ─── Block D: Bestand ─────────────────────────────────────────────
# Bestehende Redirects vor APP-LANDING-SPLIT — bleiben unveraendert
# weil sie path-only sind und auf beide Hosts angewendet werden.

# /app als rewrite (legacy — soll auf /dashboard zeigen jetzt)
[[redirects]]
  from   = "/app"
  to     = "/dashboard"
  status = 301
  force  = true

# /register → /onboarding (clean URL)
[[redirects]]
  from   = "/register"
  to     = "/onboarding-supabase.html"
  status = 301

# bescheinigungen.html (Sprint 04 entfernt)
[[redirects]]

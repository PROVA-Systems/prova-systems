# ==================================================================
# PROVA Systems - netlify.toml v6.0 (APP-LANDING-SPLIT Phase 3)
# ==================================================================
# Architektur:
#   prova-systems.de       → LANDING (Marketing + Legal)
#   app.prova-systems.de   → APP     (SaaS, Login-protected)
#   admin.prova-systems.de → ADMIN   (Founder-Cockpit, separat)
#
# Routing-Strategie:
#   - Cross-Domain-Redirects (LANDING → APP) sind in [[redirects]]
#     mit absolute-URL-`from` definiert (host-conditioned).
#   - Path-only Aliases (z.B. /dashboard → /dashboard.html) liegen
#     in _redirects und gelten fuer alle Hosts.
#   - Reihenfolge: Netlify wertet top-down, host-spezifisch zuerst.
# ==================================================================

[build]
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[build.processing]
  skip_processing = true

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# ==================================================================
# REDIRECTS
# ==================================================================

# ─── Block A: Auth/Login-Konsolidierung (alle Hosts) ─────────────
# Alte Login-URLs werden auf /login (App-Subdomain) zusammengefasst.
# Diese Regeln gelten host-unabhaengig — egal woher der Request kommt,
# Endziel ist immer app.prova-systems.de/login.

[[redirects]]
  from   = "/app-login.html"
  to     = "https://app.prova-systems.de/login"
  status = 301
  force  = true

[[redirects]]
  from   = "/auth-supabase.html"
  to     = "https://app.prova-systems.de/login"
  status = 301
  force  = true

# Logout-Redirect → Landing-Startseite (User soll wieder Marketing sehen)
[[redirects]]
  from   = "/logout"
  to     = "https://prova-systems.de/"
  status = 302
  force  = true

# ─── Block B: Cross-Domain LANDING → APP ─────────────────────────
# Wenn ein User direkt eine alte App-URL auf prova-systems.de
# aufruft (Bookmark, Mail-Link, Google-Index), wird er per 301
# auf app.prova-systems.de umgeleitet. Querystring + Splat bleiben
# erhalten.
#
# Pattern: `from = "https://<host>/<path>*"` matcht <path>, <path>.html
# und <path>/sub. `:splat` reicht den Rest weiter.
#
# Doppelt fuer prova-systems.de + www.prova-systems.de — Netlify
# unterscheidet beide Hosts streng.

# /login: prova-systems.de → app.prova-systems.de
[[redirects]]
  from   = "https://prova-systems.de/login"
  to     = "https://app.prova-systems.de/login"
  status = 301
  force  = true
[[redirects]]
  from   = "https://www.prova-systems.de/login"
  to     = "https://app.prova-systems.de/login"
  status = 301
  force  = true

# /register: prova-systems.de → app.prova-systems.de/register
[[redirects]]
  from   = "https://prova-systems.de/register"
  to     = "https://app.prova-systems.de/register"
  status = 301
  force  = true
[[redirects]]
  from   = "https://www.prova-systems.de/register"
  to     = "https://app.prova-systems.de/register"
  status = 301
  force  = true


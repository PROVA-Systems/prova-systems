# ============================================
# PROVA Systems — Netlify Konfiguration
# ============================================

[build]
  command = "node build-compat.js"
  publish = "."
  functions = "netlify/functions"

# ---- UMGEBUNGSVARIABLEN (Dokumentation, keine Secrets hier eintragen) ----
# In Netlify: Site settings → Environment variables setzen.
#
# make-proxy (/.netlify/functions/make-proxy?key=…)
#   MAKE_WEBHOOK_K3  - Brief-Protokoll etc.; nur serverseitig, Aufruf mit Header x-prova-internal
#   MAKE_WEBHOOK_A5  - DSGVO-Loeschung; Aufruf mit Netlify Identity JWT
#   MAKE_WEBHOOK_F1  - Rechnungs-PDF (PDFMonkey); JWT
#   MAKE_WEBHOOK_G3  - Gutachten-Freigabe / PDF / Mail; JWT (freigabe.html)
#   MAKE_WEBHOOK_S1  - Korrekturanfrage (freigabe.html); JWT; Pflicht in Env (keine URL im Frontend)
#   MAKE_WEBHOOK_L8  - Onboarding-Abschluss / Willkommen; JWT
#
#   PROVA_INTERNAL_WRITE_SECRET - muss mit x-prova-internal bei key=k3 uebereinstimmen
#
# Airtable (optional ueberschreiben)
#   PROVA_AUDIT_TRAIL_TABLE oder AIRTABLE_AUDIT_TRAIL_TABLE - AUDIT_TRAIL Table-ID, Default siehe lib/prova-subscription.js
#   AIRTABLE_BRIEFE_TABLE - BRIEFE-Tabelle (smtp-senden), Default siehe lib/prova-subscription.js
#   AIRTABLE_TABLE_SV - SV-Tabelle (Identity/Stripe/Proxy), Default siehe lib/prova-subscription.js
#   AIRTABLE_PAT, AIRTABLE_BASE_ID — wie bereits für andere Functions
#
# Weitere Variablen: siehe jeweilige netlify/functions/*.js (Stripe, SMTP, …).


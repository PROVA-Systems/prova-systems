# ============================================
# PROVA Systems — Netlify Konfiguration
# ============================================

[build]
  publish = "."
  functions = "netlify/functions"

# ---- NETLIFY IDENTITY TRIGGERS ----
[functions."identity-signup"]
  included_files = []

# ---- REDIRECT RULES ----

# Confirmation + Invite Links → app-login.html (nicht index.html!)
[[redirects]]
  from = "/"
  to = "/app-login.html"
  status = 302
  conditions = {Query = {confirmation_token = ":token"}}

[[redirects]]
  from = "/"
  to = "/app-login.html"
  status = 302
  conditions = {Query = {invite_token = ":token"}}

[[redirects]]
  from = "/"
  to = "/app-login.html"
  status = 302
  conditions = {Query = {recovery_token = ":token"}}
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app-login.html"
  status = 200

[[redirects]]
  from = "/app/"
  to = "/app-login.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/app-login.html"
  status = 200

[[redirects]]
  from = "/register"
  to = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/onboarding"
  to = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/freigabe"
  to = "/freigabe.html"
  status = 200

[[redirects]]
  from = "/agb"
  to = "/agb.html"
  status = 200

[[redirects]]
  from = "/datenschutz"
  to = "/datenschutz.html"
  status = 200

[[redirects]]
  from = "/impressum"
  to = "/impressum.html"
  status = 200

[[redirects]]
  from = "/avv"
  to = "/avv.html"
  status = 200

# ---- 404 FALLBACK ----
# KEIN SPA-Catchall — würde fehlende Dateien auf Landingpage weiterleiten
# Netlify zeigt stattdessen eigene 404-Seite
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

# Expliziter 404-Handler
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ---- SECURITY HEADERS ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # connect-src erlaubt Make.com eu1 Webhooks + Netlify Functions + Anthropic API + Airtable + Netlify Identity
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://identity.netlify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' blob:; worker-src 'self' blob:; connect-src 'self' https://hook.eu1.make.com https://api.anthropic.com https://api.airtable.com https://*.netlify.com https://prova-systems.netlify.app https://*.netlify.app https://fonts.googleapis.com https://fonts.gstatic.com; frame-ancestors 'self';"

# HTML nie gecacht
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Service Worker: kein Cache, voller Scope
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# SW-Register + App-JS: kurz gecacht
[[headers]]
  for = "/sw-register.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/javascript"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

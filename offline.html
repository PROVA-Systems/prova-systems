<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — PROVA Systems</title>
<script src="theme.js"></script>
<style>
  body { background: var(--bg,#111827); color: var(--text,#e8eaf0); font-family: -apple-system,sans-serif;
    display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { text-align: center; padding: 40px 24px; max-width: 400px; }
  .icon { font-size: 56px; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
  p { font-size: 14px; color: var(--text3,#6b7a99); margin: 0 0 24px; line-height: 1.6; }
  .btn { display: inline-block; padding: 12px 24px; background: var(--accent,#4f8ef7);
    color: #fff; border-radius: 10px; font-size: 14px; font-weight: 600;
    text-decoration: none; cursor: pointer; border: none; }
  .hint { margin-top: 20px; font-size: 12px; color: var(--text3,#6b7a99); }
  .cached { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .cached a { color: var(--accent,#4f8ef7); font-size: 13px; text-decoration: none; }
</style>
</head>
<body>
<div class="box">

  <button class="btn" onclick="location.reload()">↻ Erneut versuchen</button>
  <div class="hint">Lokal verfügbar (gecacht):</div>
  <div class="cached">
    <a href="dashboard.html">⊞ Zentrale</a>
    <a href="normen.html">📚 Normen-Datenbank</a>
    <a href="textbausteine.html">📝 Textbausteine</a>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baubegleitung · PROVA</title>
<script src="prova-preise.js"></script>
<script src="paket-guard.js"></script>
<script src="auth-guard.js"></script>
<script src="prova-auth-api.js"></script>
<script src="prova-sv-airtable.js"></script>
<script src="theme.js"></script>
<script src="nav.js" defer></script>
<style>
:root{
  --bg:#0b1220;--bg2:#111827;--bg3:#161f30;
  --surface:#1c2537;--surface2:#222d42;--surface3:#2a3550;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--text2:#aab4cb;--text3:#6b7a99;
  --accent:#4f8ef7;--accent2:#3a7be0;
  --green:#10b981;--red:#ef4444;--red-bg:rgba(239,68,68,.08);--red-border:rgba(239,68,68,.25);
  --warn:#f59e0b;--purple:#8b5cf6;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;
  --font-ui:'DM Sans',system-ui,sans-serif;
  --topbar-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;line-height:1.5;}
.app-shell{min-height:100vh;}
.main{display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:var(--topbar-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:10px;padding-right:160px;}
.paket-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;}
.bb-layout{display:flex;gap:0;flex:1;min-height:calc(100vh - var(--topbar-h));}
/* Projektliste links */
.proj-sidebar{width:300px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);}
.proj-sidebar-head{padding:16px;border-bottom:1px solid var(--border);}
.proj-sidebar-head h2{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.proj-count-badge{font-size:11px;background:var(--surface);border:1px solid var(--border);padding:2px 8px;border-radius:10px;color:var(--text3);}
.proj-suche-wrap{position:relative;}
.proj-suche{width:100%;padding:8px 12px 8px 32px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.proj-suche:focus{border-color:var(--accent);}
.proj-suche-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;}
.proj-list{flex:1;overflow-y:auto;padding:8px;}
.proj-item{padding:12px;border-radius:10px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:4px;}
.proj-card{padding:12px;border-radius:10px;cursor:pointer;transition:all .15s;border:1px solid var(--border);margin-bottom:6px;background:var(--surface);display:flex;align-items:center;gap:12px;}
.proj-card:hover{border-color:var(--accent);background:var(--surface2);}
.proj-card.active-proj{border-color:var(--accent);background:rgba(79,142,247,.08);}
.proj-item:hover{background:var(--surface);border-color:var(--border);}
.proj-item.active{background:rgba(79,142,247,.1);border-color:rgba(79,142,247,.3);}
.proj-item-name{font-size:13px;font-weight:600;color:var(--text);}
.proj-item-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.proj-item-meta{display:flex;gap:6px;margin-top:4px;}
.proj-meta-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--text3);}
.btn-neu-proj{width:100%;padding:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;}
/* Detail rechts */
.proj-detail{flex:1;overflow-y:auto;padding:24px;}
.proj-detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--text3);text-align:center;}
.proj-detail-empty .ei{font-size:48px;margin-bottom:12px;opacity:.4;}
/* Projekt-Header */
.pd-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.pd-title{font-size:20px;font-weight:800;color:var(--text);}
.pd-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.pd-actions{display:flex;gap:8px;}
.btn-sm{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .15s;}
.btn-sm:hover{background:var(--surface3);color:var(--text);}
.btn-sm.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-sm.primary:hover{background:var(--accent2);}
/* Begehungs-Liste */
.begehung-list{display:flex;flex-direction:column;gap:12px;}
.begehung-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
.begehung-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.bg-datum{font-size:13px;font-weight:700;color:var(--text);}
.bg-phase{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(79,142,247,.12);color:var(--accent);border:1px solid rgba(79,142,247,.2);}
.bg-dringlichkeit{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
.bg-text{font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-wrap;}
/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;}
.modal-body{padding:20px;}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:14px;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:120px;line-height:1.6;}
.modal-footer{display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--border);}
.btn-save{flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-cancel{padding:10px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;}
.toast{position:fixed;bottom:24px;right:24px;padding:14px 18px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-size:13px;font-weight:500;z-index:9999;transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);}
.toast.show{transform:translateY(0);opacity:1;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
@media(max-width:768px){.proj-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);}.bb-layout{flex-direction:column;}}
</style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main" id="mainContent">

    <div class="topbar">
      <div class="topbar-title">PROVA <span>· Baubegleitung</span></div>
      <div class="topbar-right">
        <span class="paket-badge" id="topbar-paket-badge"></span>
      </div>
    </div>

    <div class="bb-layout" id="bb-layout">
      <!-- Projektliste -->
      <div class="proj-sidebar">
        <div class="proj-sidebar-head">
          <h2>Projekte <span class="proj-count-badge" id="proj-count">0</span></h2>
          <div class="proj-suche-wrap">
            <span class="proj-suche-icon">🔍</span>
            <input type="text" class="proj-suche" id="proj-suche"
                   placeholder="Projekt suchen…" oninput="renderProjektliste()">
          </div>
          <button class="btn-neu-proj" onclick="oeffneNeuProjekt()" style="margin-top:10px;">＋ Neues Projekt</button>
        </div>
        <div class="proj-list" id="proj-list"></div>
      </div>

      <!-- Projektdetail -->
      <div class="proj-detail" id="proj-detail">
        <div class="proj-detail-empty">
          <div class="ei">🏗️</div>
          <div style="font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px;">Kein Projekt ausgewählt</div>
          <div style="font-size:12px;">Wählen Sie ein Projekt aus der Liste oder erstellen Sie ein neues.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Modal: Neues Projekt -->
<div class="modal-overlay" id="modal-projekt">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-projekt-titel">Neues Projekt</span>
      <button class="modal-close" onclick="schliesseProjektModal()">✕</button>
    </div>
    <div class="modal-body">
      <label class="form-label">Projektname *</label>
      <input type="text" class="form-input" id="mp-name" placeholder="z.B. Neubau Musterstraße 5">
      <label class="form-label">Aktenzeichen</label>
      <input type="text" class="form-input" id="mp-az" placeholder="z.B. BB-2026-001">
      <div id="mp-az-edit" style="display:none;">
        <label class="form-label">Aktenzeichen (aktuell)</label>
        <input type="text" class="form-input" id="mp-az-edit-input" readonly style="color:var(--text3);">
      </div>
      <label class="form-label">Adresse</label>
      <input type="text" class="form-input" id="mp-adresse" placeholder="Straße, PLZ Ort">
      <label class="form-label">Auftraggeber</label>
      <input type="text" class="form-input" id="mp-auftraggeber" placeholder="Name des Auftraggebers">
      <label class="form-label">Projekttyp</label>
      <select class="form-select" id="mp-typ">
        <option value="Neubau">Neubau</option>
        <option value="Sanierung">Sanierung</option>
        <option value="Umbau">Umbau</option>
        <option value="Instandhaltung">Instandhaltung</option>
        <option value="Sonstiges">Sonstiges</option>
      </select>
      <label class="form-label">Baubeginn</label>
      <input type="date" class="form-input" id="mp-beginn">
      <label class="form-label">Geplante Abnahme</label>
      <input type="date" class="form-input" id="mp-abnahme">
      <label class="form-label">Notizen</label>
      <textarea class="form-textarea" id="mp-notiz" placeholder="Besonderheiten, Ansprechpartner…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="schliesseProjektModal()">Abbrechen</button>
      <button class="btn-save" onclick="speichereProjekt()">💾 Speichern</button>
    </div>
  </div>
</div>

<!-- Modal: Neue Begehung -->
<div class="modal-overlay" id="modal-begehung">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="bericht-modal-titel">Neue Begehung</span>
      <button class="modal-close" onclick="schliesseBegehungModal()">✕</button>
    </div>
    <div class="modal-body">
      <label class="form-label">Datum *</label>
      <input type="date" class="form-input" id="mb-datum">
      <label class="form-label">Uhrzeit</label>
      <input type="time" class="form-input" id="mb-uhrzeit">
      <label class="form-label">Bauphase</label>
      <select class="form-select" id="mb-phase">
        <option value="">— auswählen —</option>
        <option value="Erdarbeiten">Erdarbeiten</option>
        <option value="Rohbau">Rohbau</option>
        <option value="Dach">Dach</option>
        <option value="Fassade">Fassade</option>
        <option value="Innenausbau">Innenausbau</option>
        <option value="Haustechnik">Haustechnik</option>
        <option value="Abnahme">Abnahme</option>
        <option value="Sonstiges">Sonstiges</option>
      </select>
      <label class="form-label">Dringlichkeit</label>
      <select class="form-select" id="mb-dringlichkeit">
        <option value="Normal">Normal</option>
        <option value="Hinweis">Hinweis</option>
        <option value="Mangel">Mangel</option>
        <option value="Kritisch">Kritisch — sofort beheben</option>
      </select>
      <label class="form-label">Anwesende</label>
      <input type="text" class="form-input" id="mb-anwesend" placeholder="z.B. Bauleiter Müller, AG Meier">
      <label class="form-label">Beobachtungen / Mängel *</label>
      <textarea class="form-textarea" id="bericht-text" rows="8"
                placeholder="Befunde, Feststellungen, Maßnahmen…"></textarea>
      <label class="form-label">Fotos</label>
      <input type="file" class="form-input" id="mb-fotos" accept="image/*" multiple>
      <div style="margin-top:8px;">
        <button type="button" class="btn-sm primary" id="ki-bericht-btn" onclick="kiBegehungAssist()">✨ KI-Formulierungshilfe</button>
        <span id="ki-bericht-status" style="font-size:11px;color:var(--text3);margin-left:8px;"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="schliesseBegehungModal()">Abbrechen</button>
      <button class="btn-save" onclick="speichereBegehung()">💾 Begehung speichern</button>
    </div>
  </div>
</div>

<!-- Support Modal -->
<div class="modal-overlay" id="support-modal">
  <div class="modal-box" style="max-width:480px;">
    <div class="modal-header">
      <span class="modal-title">Support</span>
      <button class="modal-close" onclick="document.getElementById('support-modal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="sup-modal">Wie können wir helfen?</div>
  </div>
</div>

  <script src="sw-register.js" defer></script>
  <script src="auto-save.js" defer></script>
  <script src="global-search.js" defer></script>
  <script src="auftragstyp.js"></script>
  <script src="trial-guard.js"></script>
  <script src="baubegleitung-logic.js" defer></script>
<script src="prova-context.js" defer></script>
<script src="prova-error-handler.js" defer></script>
<script src="support-chat.js" defer></script>
</body>
</html>

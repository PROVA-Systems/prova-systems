<head>
<script>
  window.__PROVA_ENV = 'production';
  window.onerror = function(msg, src, line, col, err) {
    if (!navigator.onLine) return;
    fetch('/.netlify/functions/error-log', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        msg: String(msg).slice(0,500),
        src: src, line: line,
        page: window.location.pathname,
        user: localStorage.getItem('prova_sv_email')||'unbekannt',
        ua: navigator.userAgent.slice(0,100),
        ts: new Date().toISOString()
      })
    }).catch(function(){});
  };
</script>

  <style>
    :root{--bg:#0d0f14;--bg2:#13161d;--text:#e8eaf0;--text2:#9da3b4;--accent:#4f8ef7;--border:rgba(255,255,255,0.1);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Instrument Sans',system-ui,sans-serif;background:var(--bg);color:var(--text2);font-size:14px;line-height:1.55;min-height:100vh;}
    .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .logo{font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:var(--text);text-decoration:none;}
    .logo span{color:var(--accent);}
    .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;}
    .drawer-overlay.open{display:block;}
    .drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);z-index:201;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;}
    .drawer.open{transform:translateX(0);}
    .drawer-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .drawer-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;}
    .topbar-left{display:flex;align-items:center;gap:14px;}
    .topnav a{padding:6px 10px;color:var(--text2);text-decoration:none;font-size:13px;border-radius:6px;}
    .topnav a.active{color:var(--accent);background:rgba(79,142,247,0.12);}
    .burger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:4px;padding:6px;}
    .burger span{display:block;width:20px;height:2px;background:var(--text2);}
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--bg2);border-top:1px solid var(--border);z-index:100;justify-content:space-around;align-items:stretch;}
    .paket-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
    @media(max-width:900px){.topnav{display:none;}.burger{display:flex;}.bottom-nav{display:flex;}body{padding-bottom:56px;}}
    .main{max-width:800px;margin:0 auto;padding:24px 20px 48px;}
    h1{font-family:'Fraunces',serif;color:var(--text);font-size:24px;margin-bottom:8px;}
    .sub{font-size:13px;margin-bottom:20px;}
    label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin:12px 0 6px;}
    input,textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,0.25);color:var(--text);font:inherit;}
    textarea{min-height:120px;}
    .btn{margin-top:12px;margin-right:8px;padding:11px 18px;border-radius:10px;border:none;background:rgba(79,142,247,0.35);color:#fff;font-weight:700;cursor:pointer;font:inherit;}
    .btn-sec{background:rgba(255,255,255,0.08);}
    #printArea{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:22px;margin-top:20px;color:var(--text);}
    #printArea h2{font-size:16px;margin-bottom:12px;}
    .err{display:none;padding:12px;border-radius:10px;background:rgba(239,68,68,0.12);color:#fecaca;margin-bottom:14px;font-size:13px;}
  </style>

<body>

  <script>
  function toggleDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('drawerOverlay');d.classList.toggle('open');o.classList.toggle('open');document.body.style.overflow=d.classList.contains('open')?'hidden':'';}
  function closeDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('drawerOverlay');d.classList.remove('open');o.classList.remove('open');document.body.style.overflow='';}
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDrawer();});
  (function(){if(!window.PROVA)return;var c=PROVA.paketColor();var el=document.getElementById('topbarPaket');if(el){el.textContent=PROVA.paketLabel();el.setAttribute('style','background:'+c+'18;color:'+c+';border:1px solid '+c+'33');}})();
  </script>
  <script src="nav.js" defer></script>

  <main class="main">
    <h1>Widerspruch gegen Gegengutachten</h1>
    <p class="sub">Aktenzeichen aus URL oder letztem Fall. Speichert <code>Widerspruch_Datum</code> und Notiz in Airtable; Versand per E-Mail über <code>brief-senden.js</code>.</p>
    <div class="err" id="err"></div>
    <label for="az">Aktenzeichen</label>
    <input type="text" id="az" placeholder="PROVA-S-2026-…">
    <label for="gg_name">Gegengutachter (Name)</label>
    <input type="text" id="gg_name" placeholder="Name / Büro">
    <label for="gg_datum">Datum Gegengutachten</label>
    <input type="date" id="gg_datum">
    <label for="formal">Formale Einwände</label>
    <textarea id="formal" placeholder="Zustellung, Verfahren, Befangenheit …"></textarea>
    <label for="inhalt">Inhaltliche Einwände</label>
    <textarea id="inhalt" placeholder="Methodik, Feststellungen …"></textarea>
    <label for="empf_mail">E-Mail Empfänger (optional)</label>
    <input type="email" id="empf_mail" placeholder="z. B. Mandant / Gegenseite">
    <button type="button" class="btn" id="btnPatch">In Airtable speichern</button>
    <button type="button" class="btn btn-sec" id="btnBrief">Als Brief senden</button>
    <button type="button" class="btn btn-sec" id="btnPrint">Drucken</button>

    <div id="printArea">
      <h2>Entwurf Schreiben</h2>
      <div id="briefBody"></div>
    </div>
  </main>
  <script>
  (function(){
    var FF = (window.PROVA_AIRTABLE && window.PROVA_AIRTABLE.FELDER_FAELLE) || {};
    var p = new URLSearchParams(location.search);
    var azEl = document.getElementById('az');
    azEl.value = p.get('az') || '';
    if (!azEl.value) try { azEl.value = localStorage.getItem('prova_letztes_az') || ''; } catch(e) {}
    function buildBody(){
      var az = azEl.value.trim();
      var gn = document.getElementById('gg_name').value.trim();
      var gd = document.getElementById('gg_datum').value;
      var f = document.getElementById('formal').value.trim();
      var i = document.getElementById('inhalt').value.trim();
      var sv = '';
      try { sv = localStorage.getItem('prova_sv_name') || ''; } catch(x) {}
      var lines = ['Betreff: Widerspruch / Stellungnahme zum Gegengutachten — AZ ' + az, '', 'Sehr geehrte Damen und Herren,', '', 'bezugnehmend auf das Gegengutachten' + (gn ? ' von ' + gn : '') + (gd ? ' vom ' + gd.split('-').reverse().join('.') : '') + ' zu o. g. Akte erheben wir folgendes:', ''];
      if (f) { lines.push('1. Formale Einwände', f, ''); }
      if (i) { lines.push('2. Inhaltliche Einwände', i, ''); }
      lines.push('Mit freundlichen Grüßen', sv || 'Unterschrift SV');
      return lines.join('\n');
    }
    function syncPreview(){ document.getElementById('briefBody').innerHTML = '<pre style="white-space:pre-wrap;font-family:inherit;font-size:14px;line-height:1.6;">'+buildBody().replace(/</g,'&lt;')+'</pre>'; }
    ['az','gg_name','gg_datum','formal','inhalt'].forEach(function(id){
      document.getElementById(id).addEventListener('input', syncPreview);
    });
    syncPreview();

    document.getElementById('btnPatch').addEventListener('click', function(){
      var err = document.getElementById('err');
      err.style.display = 'none';
      var az = azEl.value.trim();
      if (!az) { err.style.display='block'; err.textContent='Aktenzeichen fehlt.'; return; }
      var gn = document.getElementById('gg_name').value.trim();
      var note = 'Widerspruch gegen Gutachten' + (gn ? ' von ' + gn : '');
      var esc = az.replace(/\\/g,'\\\\').replace(/"/g,'\\"');
      var formula = 'OR({Schadensnummer}="' + esc + '",{' + (FF.aktenzeichen || 'Aktenzeichen') + '}="' + esc + '")';
      var btn = this;
      btn.disabled = true;
      PROVA_AIRTABLE.listRecords(PROVA_AIRTABLE.TABLE_SCHADENSFAELLE, formula, 1).then(function(data){
        var rec = (data.records||[])[0];
        if (!rec) throw new Error('Fall nicht in Airtable gefunden.');
        var old = (rec.fields[FF.notizen || 'Notizen'] || rec.fields.Notiz || rec.fields.Aktennotiz || '').trim();
        var stamp = new Date().toISOString().slice(0,10);
        var block = '[' + stamp + '] ' + note;
        var combined = old ? (block + '\n\n---\n\n' + old) : block;
        var fields = {};
        fields[FF.widerspruchDatum || 'Widerspruch_Datum'] = stamp;
        fields[FF.notizen || 'Notizen'] = combined;
        return PROVA_AIRTABLE.patchRecord(PROVA_AIRTABLE.TABLE_SCHADENSFAELLE, rec.id, fields).catch(function(){
          var fallback = {};
          fallback[FF.notizen || 'Notizen'] = combined;
          return PROVA_AIRTABLE.patchRecord(PROVA_AIRTABLE.TABLE_SCHADENSFAELLE, rec.id, fallback);
        });
      }).then(function(){ alert('Gespeichert.'); }).catch(function(e){
        err.style.display='block'; err.textContent = e.message||String(e);
      }).finally(function(){ btn.disabled=false; });
    });

    document.getElementById('btnBrief').addEventListener('click', async function(){
      var to = document.getElementById('empf_mail').value.trim();
      var az = azEl.value.trim();
      var gn = document.getElementById('gg_name').value.trim();
      if (to && window.provaBriefvorlageNachSmtp) {
        await provaBriefvorlageNachSmtp({
          az: az,
          empfaenger: gn || 'Empfänger',
          to: to,
          betreff: 'Widerspruch Gegengutachten ' + az,
          typ: 'Widerspruch Gegengutachten',
          text_body: buildBody()
        });
        return;
      }
      if (window.provaBriefSenden) {
        provaBriefSenden({ to: to, subject: 'Widerspruch Gegengutachten ' + az, body: buildBody() });
      }
    });
    document.getElementById('btnPrint').addEventListener('click', function(){ window.print(); });
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<script>
  window.__PROVA_ENV = 'production';
  window.onerror = function(msg, src, line, col, err) {
    if (!navigator.onLine) return;
    fetch('/.netlify/functions/error-log', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        msg: String(msg).slice(0,500),
        src: src, line: line,
        page: window.location.pathname,
        user: localStorage.getItem('prova_sv_email')||'unbekannt',
        ua: navigator.userAgent.slice(0,100),
        ts: new Date().toISOString()
      })
    }).catch(function(){});
  };
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="paket-guard.js"></script>
  <script>
    (function () {
      var t = (window.PROVA && PROVA.tier) || 'Solo';
      var q = window.location.search || '';
      var url = t === 'Team' ? 'app-enterprise.html' : 'app-starter.html';
      window.location.replace(url + q);
    })();
  </script>
</head>

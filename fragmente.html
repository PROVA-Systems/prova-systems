<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Befund-Fragmente · PROVA</title>
<!-- MEGA⁷⁴-Phase-2d: Google-Fonts-CDN entfernt (no external CDNs). System-Font-Stack via prova-design.css -->
<script src="/lib/prova-config.js"></script>
<script src="/lib/edge-shim.js"></script>
<script src="prova-fetch-auth.js"></script>
<script>
(function(){
  try {
    var token = localStorage.getItem('prova_auth_token');
    var email = localStorage.getItem('prova_sv_email') || '';
    if (!token || !email) { window.location.replace('/login?next=' + encodeURIComponent(location.pathname + location.search)); return; }
  } catch (e) { window.location.replace('/login'); }
})();
</script>
<script type="module">
  import { runAuthGuard } from '/lib/auth-guard.js';
  runAuthGuard().catch(e => console.error('[auth] guard failed', e));
</script>
<script src="theme.js"></script>
<script src="prova-layout.config.js"></script>
<script src="nav.js" defer></script>
<link rel="stylesheet" href="prova-design.css">
<link rel="stylesheet" href="mobile.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.55; }
.fr-wrap { max-width: 1320px; margin: 0 auto; padding: 24px 20px 120px; }

.fr-hero { background: linear-gradient(135deg, rgba(79,142,247,.08), rgba(139,92,246,.05)); border: 1px solid var(--border2); border-radius: 14px; padding: 22px 26px; margin-bottom: 18px; }
.fr-hero h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.fr-hero .az { font-family: ui-monospace, Consolas, monospace; color: var(--accent); font-weight: 700; }
.fr-hero-stats { display: flex; gap: 18px; margin-top: 12px; flex-wrap: wrap; font-size: 13px; color: var(--text2); }
.fr-hero-stats strong { color: var(--text); font-weight: 700; }

.fr-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; align-items: center; }
.fr-group-toggle { display: inline-flex; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; }
.fr-group-toggle button { padding: 7px 13px; background: transparent; border: none; color: var(--text2); cursor: pointer; font: 600 12px inherit; }
.fr-group-toggle button.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }

.fr-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.fr-chip { padding: 6px 11px; background: var(--surface); border: 1px solid var(--border2); border-radius: 999px; color: var(--text2); font: 600 11px inherit; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
.fr-chip.is-active { background: rgba(79,142,247,.15); border-color: var(--accent); color: var(--text); }
.fr-chip .count { font-size: 10px; opacity: .7; }

.fr-btn-extract { margin-left: auto; padding: 8px 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 8px; font: 700 12px inherit; cursor: pointer; }
.fr-btn-extract:disabled { opacity: .5; cursor: wait; }

.fr-group-section { margin-top: 16px; }
.fr-group-h { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin: 18px 0 10px; display: flex; align-items: center; gap: 8px; }
.fr-group-h .count { background: var(--surface); padding: 2px 8px; border-radius: 999px; font-size: 10px; color: var(--text2); }

.fr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 12px; }
@media (max-width: 700px) { .fr-grid { grid-template-columns: 1fr; } }

.fr-card { background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 14px 16px; transition: all .12s; cursor: pointer; display: flex; flex-direction: column; gap: 8px; }
.fr-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.fr-card.is-gepruft { background: rgba(16,185,129,.04); border-color: rgba(16,185,129,.25); }
.fr-card.is-verworfen { opacity: .55; }

.fr-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.fr-card-quelle { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 5px; font: 700 10px inherit; text-transform: uppercase; letter-spacing: .04em; }
.fr-card-quelle--diktat { background: rgba(139,92,246,.18); color: #c4b5fd; }
.fr-card-quelle--foto { background: rgba(8,145,178,.2); color: #67e8f9; }
.fr-card-quelle--skizze { background: rgba(22,163,74,.2); color: #86efac; }
.fr-card-quelle--notiz { background: rgba(202,138,4,.2); color: #fde047; }
.fr-card-quelle--manuell { background: rgba(100,116,139,.2); color: #cbd5e1; }
.fr-card-quelle--ki { background: rgba(79,142,247,.2); color: #93c5fd; }
.fr-card-status { font-size: 9px; padding: 2px 7px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
.fr-card-status--roh { background: rgba(255,255,255,.06); color: var(--text2); }
.fr-card-status--gepruft { background: rgba(16,185,129,.2); color: #6ee7b7; }
.fr-card-status--verworfen { background: rgba(239,68,68,.18); color: #fca5a5; }

.fr-card-text { font-size: 13px; color: var(--text); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.fr-card-meta { display: flex; flex-wrap: wrap; gap: 5px; font-size: 11px; color: var(--text3); }
.fr-card-meta .tag { background: rgba(255,255,255,.04); padding: 2px 7px; border-radius: 4px; }
.fr-card-meta .raum { color: var(--accent); font-weight: 600; }

.fr-card-actions { display: flex; gap: 4px; margin-top: 6px; padding-top: 8px; border-top: 1px solid var(--border); }
.fr-card-actions button { padding: 4px 8px; background: transparent; border: 1px solid var(--border2); border-radius: 5px; color: var(--text2); font: 600 11px inherit; cursor: pointer; }
.fr-card-actions button:hover { color: var(--text); border-color: var(--accent); }
.fr-card-actions button.is-pressed { background: rgba(16,185,129,.18); color: #6ee7b7; border-color: rgba(16,185,129,.3); }

.fr-empty { padding: 56px 20px; text-align: center; color: var(--text3); grid-column: 1/-1; }
.fr-empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }
.fr-loading { padding: 40px; text-align: center; color: var(--text3); grid-column: 1/-1; }

/* Sticky-Footer */
.fr-footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 20px; background: rgba(11,13,17,.95); border-top: 1px solid var(--border2); backdrop-filter: blur(8px); z-index: 80; display: flex; justify-content: space-between; align-items: center; gap: 14px; }
.fr-footer-info { font-size: 12px; color: var(--text2); }
.fr-footer-info strong { color: var(--text); }
.fr-btn-generate { padding: 11px 22px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 8px; font: 700 13px inherit; cursor: pointer; }
.fr-btn-generate:disabled { opacity: .5; cursor: not-allowed; }
@media (max-width: 600px) { .fr-footer { flex-direction: column; align-items: stretch; padding: 10px 14px; } .fr-btn-generate { width: 100%; } }

/* Edit-Modal */
.fr-modal { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.fr-modal.is-open { display: flex; }
.fr-modal-inner { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; max-width: 560px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; }
.fr-modal-head { padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.fr-modal-head h2 { font-size: 15px; font-weight: 700; }
.fr-modal-close { background: transparent; border: none; color: var(--text2); font-size: 22px; cursor: pointer; }
.fr-modal-body { padding: 16px 22px; overflow-y: auto; flex: 1; }
.fr-modal-foot { padding: 12px 22px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
.fr-field { margin-bottom: 12px; }
.fr-field-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); font-weight: 700; margin-bottom: 5px; }
.fr-field-input, .fr-field-textarea, .fr-field-select { width: 100%; padding: 8px 11px; background: var(--bg); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font: 13px 'DM Sans', sans-serif; font-family: inherit; }
.fr-field-textarea { min-height: 90px; resize: vertical; }
.fr-mbtn { padding: 8px 16px; border-radius: 7px; font: 700 12px inherit; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text2); }
.fr-mbtn:hover { color: var(--text); border-color: var(--accent); }
.fr-mbtn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; }
.fr-mbtn-danger { color: var(--danger); border-color: rgba(239,68,68,.4); }

.fr-toast { position: fixed; bottom: 80px; right: 22px; padding: 11px 18px; background: var(--success); color: #fff; border-radius: 8px; font: 600 13px inherit; z-index: 300; opacity: 0; transition: opacity .25s; pointer-events: none; }
.fr-toast.is-show { opacity: 1; }
.fr-toast.is-error { background: var(--danger); }
</style>
</head>
<body data-page="fragmente">

<div class="app-shell" id="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="sb-overlay" id="sb-overlay" onclick="closeMobileSidebar()"></div>
  <div class="main-wrap" id="main-wrap">

    <main class="fr-wrap">
      <div class="fr-hero">
        <h1>Befund-Fragmente · <span class="az" id="fr-az">—</span></h1>
        <p style="font-size:13px;color:var(--text2);">Atomare Beobachtungen aus Diktat / Foto / Skizze / Notiz. Kuratieren, gruppieren, dann Befund-Entwurf generieren.</p>
        <div class="fr-hero-stats" id="fr-stats">
          <span><strong id="stat-total">—</strong> Fragmente</span>
          <span><strong id="stat-gepruft">—</strong> geprüft</span>
          <span><strong id="stat-verworfen">—</strong> verworfen</span>
          <span><strong id="stat-ki">—</strong> KI-generiert</span>
        </div>
      </div>

      <div class="fr-toolbar">
        <div class="fr-group-toggle">
          <button data-group="quelle" class="active" onclick="setGroup('quelle')">Quelle</button>
          <button data-group="raum" onclick="setGroup('raum')">Raum</button>
          <button data-group="tag" onclick="setGroup('tag')">Tag</button>
          <button data-group="status" onclick="setGroup('status')">Status</button>
          <button data-group="none" onclick="setGroup('none')">Keine</button>
        </div>
        <div class="fr-chips" id="fr-chips"></div>
        <button class="fr-btn-extract" id="fr-btn-extract" onclick="extractFragments()">+ Fragmente aus Assets extrahieren</button>
      </div>

      <div id="fr-content">
        <div class="fr-loading">Lade Fragmente…</div>
      </div>
    </main>

  </div>
</div>

<!-- Edit-Modal -->
<div class="fr-modal" id="fr-modal" onclick="if(event.target===this)closeModal()">
  <div class="fr-modal-inner">
    <div class="fr-modal-head">
      <h2>Fragment bearbeiten</h2>
      <button class="fr-modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="fr-modal-body" id="fr-modal-body"></div>
    <div class="fr-modal-foot">
      <button class="fr-mbtn fr-mbtn-danger" id="fr-btn-delete" onclick="deleteFragment()">Verwerfen</button>
      <button class="fr-mbtn" onclick="closeModal()">Abbrechen</button>
      <button class="fr-mbtn fr-mbtn-primary" onclick="saveFragment()">Speichern</button>
    </div>
  </div>
</div>

<!-- Sticky-Footer -->
<div class="fr-footer">
  <div class="fr-footer-info">
    <strong id="footer-gepruft">0</strong> von <strong id="footer-total">0</strong> Fragmenten geprüft —
    <span style="color:var(--text3);">nur geprüfte fließen in den Befund-Entwurf.</span>
  </div>
  <button class="fr-btn-generate" id="fr-btn-generate" onclick="generateBefund()" disabled>Befund-Entwurf generieren →</button>
</div>

<div class="fr-toast" id="fr-toast">—</div>

<script type="module">
import { supabase } from '/lib/supabase-client.js';
window.__sb = supabase;

const QUELLE_LABELS = { diktat: '🎙 Diktat', foto: '📷 Foto', skizze: '✏ Skizze', notiz: '📝 Notiz', manuell: '✍ Manuell', ki_zusammenführung: '🤖 KI' };
const STATUS_LABELS = { roh: 'roh', gepruft: 'geprüft', verworfen: 'verworfen', zusammengelegt_in: 'zusammengelegt' };

const state = {
  auftragId: null,
  auftragAz: null,
  fragments: [],
  group: 'quelle',
  filter: null,
  editingId: null
};

function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function toast(msg, kind) {
  const t = document.getElementById('fr-toast');
  t.textContent = msg;
  t.className = 'fr-toast is-show' + (kind === 'error' ? ' is-error' : '');
  setTimeout(() => t.classList.remove('is-show'), 2400);
}

async function init() {
  const url = new URL(location.href);
  state.auftragId = url.searchParams.get('auftrag') || url.searchParams.get('auftrag_id') || '';
  if (!state.auftragId) {
    document.getElementById('fr-content').innerHTML = '<div class="fr-empty"><div class="fr-empty-icon">⚠</div><div>Auftrag-ID fehlt. URL: <code>/fragmente?auftrag=UUID</code></div></div>';
    return;
  }
  // Auftrag-AZ + Titel laden für Hero
  try {
    const { data } = await supabase.from('auftraege').select('az, titel').eq('id', state.auftragId).single();
    state.auftragAz = data?.az || state.auftragId.slice(0, 8);
    document.getElementById('fr-az').textContent = state.auftragAz;
  } catch (_) {}
  await loadFragments();
}

async function loadFragments() {
  try {
    const { data, error } = await supabase.from('befund_fragmente')
      .select('id, quelle_typ, quelle_asset_id, quelle_startzeit_ms, text, tags, raumbezug, gutachten_teil, beweisfrage_bezug, status, ki_generiert, ki_protokoll_id, reihenfolge, created_at')
      .eq('auftrag_id', state.auftragId)
      .is('deleted_at', null)
      .order('reihenfolge', { ascending: true, nullsFirst: false })
      .order('created_at', { ascending: true })
      .limit(500);
    if (error) throw error;
    state.fragments = data || [];
    render();
  } catch (e) {
    document.getElementById('fr-content').innerHTML = `<div class="fr-empty"><div class="fr-empty-icon">⚠</div><div>Fehler beim Laden: ${esc(e.message)}</div></div>`;
  }
}

function renderStats() {
  const f = state.fragments;
  const total = f.length;
  const gepruft = f.filter(x => x.status === 'gepruft').length;
  const verworfen = f.filter(x => x.status === 'verworfen').length;
  const ki = f.filter(x => x.ki_generiert).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-gepruft').textContent = gepruft;
  document.getElementById('stat-verworfen').textContent = verworfen;
  document.getElementById('stat-ki').textContent = ki;
  document.getElementById('footer-total').textContent = total;
  document.getElementById('footer-gepruft').textContent = gepruft;
  const btn = document.getElementById('fr-btn-generate');
  btn.disabled = gepruft === 0;
}

function renderChips() {
  let groups = {};
  state.fragments.forEach(f => {
    const key = state.group === 'quelle' ? (f.quelle_typ || 'andere')
            : state.group === 'raum' ? (f.raumbezug || 'kein Raum')
            : state.group === 'status' ? (f.status || 'roh')
            : state.group === 'tag' ? (Array.isArray(f.tags) && f.tags.length ? f.tags[0] : 'ohne Tag')
            : null;
    if (key !== null) groups[key] = (groups[key] || 0) + 1;
  });
  const wrap = document.getElementById('fr-chips');
  if (state.group === 'none' || Object.keys(groups).length === 0) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = `<span class="fr-chip ${state.filter === null ? 'is-active' : ''}" onclick="setFilter(null)">Alle <span class="count">${state.fragments.length}</span></span>`
    + Object.entries(groups).map(([k, n]) => `<span class="fr-chip ${state.filter === k ? 'is-active' : ''}" onclick="setFilter('${esc(k)}')">${esc(k)} <span class="count">${n}</span></span>`).join('');
}

function filterFragments() {
  if (state.group === 'none' || !state.filter) return state.fragments;
  return state.fragments.filter(f => {
    if (state.group === 'quelle') return (f.quelle_typ || 'andere') === state.filter;
    if (state.group === 'raum') return (f.raumbezug || 'kein Raum') === state.filter;
    if (state.group === 'status') return (f.status || 'roh') === state.filter;
    if (state.group === 'tag') return Array.isArray(f.tags) && f.tags.includes(state.filter);
    return true;
  });
}

function render() {
  renderStats();
  renderChips();
  const arr = filterFragments();
  const content = document.getElementById('fr-content');
  if (state.fragments.length === 0) {
    content.innerHTML = `<div class="fr-empty">
      <div class="fr-empty-icon">🧩</div>
      <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;">Noch keine Fragmente</div>
      <div style="font-size:13px;margin-bottom:18px;">Lade Audio-Diktate, Fotos oder Skizzen hoch und klicke „Fragmente extrahieren".</div>
      <button class="fr-btn-extract" onclick="extractFragments()">+ Fragmente extrahieren</button>
    </div>`;
    return;
  }
  if (arr.length === 0) {
    content.innerHTML = '<div class="fr-empty">Keine Treffer für aktuellen Filter.</div>';
    return;
  }
  content.innerHTML = `<div class="fr-grid">${arr.map(renderCard).join('')}</div>`;
  content.querySelectorAll('[data-frag-id]').forEach(c => {
    c.querySelectorAll('[data-action]').forEach(b => {
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = c.dataset.fragId;
        const a = b.dataset.action;
        handleAction(id, a);
      });
    });
    c.addEventListener('click', () => openEditModal(c.dataset.fragId));
  });
}

function renderCard(f) {
  const q = f.quelle_typ || 'manuell';
  const cls = ['fr-card'];
  if (f.status === 'gepruft') cls.push('is-gepruft');
  if (f.status === 'verworfen') cls.push('is-verworfen');
  return `<div class="${cls.join(' ')}" data-frag-id="${esc(f.id)}">
    <div class="fr-card-head">
      <span class="fr-card-quelle fr-card-quelle--${esc(q)}">${esc(QUELLE_LABELS[q] || q)}</span>
      <span class="fr-card-status fr-card-status--${esc(f.status || 'roh')}">${esc(STATUS_LABELS[f.status] || f.status || 'roh')}</span>
    </div>
    <div class="fr-card-text">${esc(f.text || '—')}</div>
    <div class="fr-card-meta">
      ${f.raumbezug ? `<span class="raum">📍 ${esc(f.raumbezug)}</span>` : ''}
      ${Array.isArray(f.tags) ? f.tags.slice(0, 4).map(t => `<span class="tag">#${esc(t)}</span>`).join('') : ''}
    </div>
    <div class="fr-card-actions">
      <button data-action="gepruft" class="${f.status === 'gepruft' ? 'is-pressed' : ''}" title="Als geprüft markieren">✓ Geprüft</button>
      <button data-action="verworfen" class="${f.status === 'verworfen' ? 'is-pressed' : ''}" title="Verwerfen">✗ Verwerfen</button>
      <button data-action="edit" title="Bearbeiten">✏ Edit</button>
    </div>
  </div>`;
}

async function handleAction(id, action) {
  if (action === 'edit') { openEditModal(id); return; }
  const newStatus = action === 'gepruft' ? 'gepruft' : 'verworfen';
  try {
    const { error } = await supabase.from('befund_fragmente').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', id);
    if (error) throw error;
    const f = state.fragments.find(x => x.id === id);
    if (f) f.status = newStatus;
    render();
    toast(`Fragment ${newStatus === 'gepruft' ? 'als geprüft markiert' : 'verworfen'}`);
  } catch (e) { toast('Fehler: ' + e.message, 'error'); }
}

window.setGroup = function(g) {
  state.group = g; state.filter = null;
  document.querySelectorAll('[data-group]').forEach(b => b.classList.toggle('active', b.dataset.group === g));
  render();
};
window.setFilter = function(f) { state.filter = f; render(); };

// ─── Extract via Edge Fn ───
window.extractFragments = async function() {
  const btn = document.getElementById('fr-btn-extract');
  btn.disabled = true; btn.textContent = '⏳ Extrahiere…';
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) throw new Error('Nicht eingeloggt');
    const resp = await fetch(`${window.PROVA_CONFIG.SUPABASE_URL}/functions/v1/asset-to-fragments-v1`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}`, 'apikey': window.PROVA_CONFIG.SUPABASE_ANON_KEY },
      body: JSON.stringify({ auftrag_id: state.auftragId, mode: 'all' })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
    toast(`✨ ${data.fragments_created || 0} neue Fragmente extrahiert`);
    await loadFragments();
  } catch (e) {
    toast('Fehler: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '+ Fragmente aus Assets extrahieren';
  }
};

// ─── Befund-Entwurf generieren ───
window.generateBefund = async function() {
  const btn = document.getElementById('fr-btn-generate');
  btn.disabled = true; btn.textContent = '⏳ Generiere…';
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) throw new Error('Nicht eingeloggt');
    const gepruefteIds = state.fragments.filter(f => f.status === 'gepruft').map(f => f.id);
    if (gepruefteIds.length === 0) throw new Error('Keine geprüften Fragmente');
    const resp = await fetch(`${window.PROVA_CONFIG.SUPABASE_URL}/functions/v1/fragments-to-befund-v1`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}`, 'apikey': window.PROVA_CONFIG.SUPABASE_ANON_KEY },
      body: JSON.stringify({ auftrag_id: state.auftragId, fragment_ids: gepruefteIds })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
    toast('✓ Befund-Entwurf generiert');
    // Weiterleitung zu fachurteil.html
    setTimeout(() => {
      window.location.href = `/fachurteil?az=${encodeURIComponent(state.auftragAz)}&editor=mega69`;
    }, 800);
  } catch (e) {
    toast('Fehler: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = 'Befund-Entwurf generieren →';
  }
};

// ─── Edit-Modal ───
window.openEditModal = function(id) {
  const f = state.fragments.find(x => x.id === id);
  if (!f) return;
  state.editingId = id;
  const body = document.getElementById('fr-modal-body');
  body.innerHTML = `
    <div class="fr-field">
      <div class="fr-field-label">Quelle</div>
      <div style="font-size:13px;color:var(--text);">${esc(QUELLE_LABELS[f.quelle_typ] || f.quelle_typ || '—')} ${f.ki_generiert ? '🤖 KI-generiert' : ''}</div>
    </div>
    <div class="fr-field">
      <div class="fr-field-label">Text *</div>
      <textarea class="fr-field-textarea" id="ed-text">${esc(f.text || '')}</textarea>
    </div>
    <div class="fr-field">
      <div class="fr-field-label">Raumbezug</div>
      <input type="text" class="fr-field-input" id="ed-raum" value="${esc(f.raumbezug || '')}" placeholder="z.B. Bad EG, Keller, Außenwand Nord">
    </div>
    <div class="fr-field">
      <div class="fr-field-label">Tags (Komma-getrennt)</div>
      <input type="text" class="fr-field-input" id="ed-tags" value="${esc(Array.isArray(f.tags) ? f.tags.join(', ') : '')}" placeholder="z.B. feuchtigkeit, schimmel">
    </div>
    <div class="fr-field">
      <div class="fr-field-label">Gutachten-Teil</div>
      <select class="fr-field-select" id="ed-teil">
        <option value="">— wählen —</option>
        <option value="sachverhalt" ${f.gutachten_teil === 'sachverhalt' ? 'selected' : ''}>Sachverhalt</option>
        <option value="befund" ${f.gutachten_teil === 'befund' ? 'selected' : ''}>Befund</option>
        <option value="fachurteil" ${f.gutachten_teil === 'fachurteil' ? 'selected' : ''}>Fachurteil</option>
      </select>
    </div>
    <div class="fr-field">
      <div class="fr-field-label">Status</div>
      <select class="fr-field-select" id="ed-status">
        <option value="roh" ${(f.status || 'roh') === 'roh' ? 'selected' : ''}>Roh</option>
        <option value="gepruft" ${f.status === 'gepruft' ? 'selected' : ''}>Geprüft</option>
        <option value="verworfen" ${f.status === 'verworfen' ? 'selected' : ''}>Verworfen</option>
      </select>
    </div>`;
  document.getElementById('fr-modal').classList.add('is-open');
};
window.closeModal = function() { document.getElementById('fr-modal').classList.remove('is-open'); state.editingId = null; };

window.saveFragment = async function() {
  if (!state.editingId) return;
  const v = id => (document.getElementById(id) || {}).value;
  const text = (v('ed-text') || '').trim();
  if (!text) { toast('Text darf nicht leer sein', 'error'); return; }
  const tagsRaw = (v('ed-tags') || '').trim();
  try {
    const patch = {
      text,
      raumbezug: v('ed-raum') || null,
      tags: tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : null,
      gutachten_teil: v('ed-teil') || null,
      status: v('ed-status') || 'roh',
      updated_at: new Date().toISOString()
    };
    const { error } = await supabase.from('befund_fragmente').update(patch).eq('id', state.editingId);
    if (error) throw error;
    toast('Fragment aktualisiert');
    closeModal();
    await loadFragments();
  } catch (e) { toast('Fehler: ' + e.message, 'error'); }
};

window.deleteFragment = async function() {
  if (!state.editingId) return;
  if (!confirm('Fragment wirklich verwerfen (soft-delete)?')) return;
  try {
    const { error } = await supabase.from('befund_fragmente').update({ deleted_at: new Date().toISOString() }).eq('id', state.editingId);
    if (error) throw error;
    toast('Fragment verworfen');
    closeModal();
    await loadFragments();
  } catch (e) { toast('Fehler: ' + e.message, 'error'); }
};

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

init();
</script>

</body>
</html>

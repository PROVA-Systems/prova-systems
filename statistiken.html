<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistiken · PROVA</title>
<script src="theme.js"></script>
<script src="nav.js"></script>
<style>
:root{--topbar-h:52px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;line-height:1.5;}
.app-shell{min-height:100vh;}
.main{display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:var(--topbar-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-title span{color:var(--text3);font-weight:400;}
.topbar-right{display:flex;align-items:center;gap:10px;padding-right:160px;}
.page{flex:1;padding:24px 28px 48px;}

/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
.kpi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px;}
.kpi-val{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-.03em;line-height:1;}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.kpi-trend{font-size:11px;font-weight:600;margin-top:6px;}
.trend-up{color:var(--green);}
.trend-dn{color:var(--red);}

/* Content Grid */
.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.stat-card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* Bar Chart */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:12px;color:var(--text2);width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.bar-count{font-size:11px;color:var(--text3);width:30px;text-align:right;flex-shrink:0;}

/* Monatschart */
.month-chart{display:flex;align-items:flex-end;gap:6px;height:80px;padding-bottom:4px;}
.mc-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.mc-bar{width:100%;border-radius:4px 4px 0 0;background:rgba(79,142,247,.35);transition:height .5s ease;cursor:default;}
.mc-bar:hover{background:var(--accent);}
.mc-label{font-size:9px;color:var(--text3);}
.mc-val{font-size:10px;color:var(--text2);font-weight:600;}

/* Status Tabelle */
.status-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.status-row:last-child{border-bottom:none;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-name{font-size:12px;color:var(--text2);margin-left:8px;flex:1;}
.status-count{font-size:12px;font-weight:700;color:var(--text);}

/* Filter */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;}
.filter-chip{padding:5px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;}
.filter-chip.active,.filter-chip:hover{background:rgba(79,142,247,.12);border-color:rgba(79,142,247,.3);color:var(--accent);}

/* Loading */
.stat-loading{text-align:center;padding:40px;color:var(--text3);font-size:13px;}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:768px){.content-grid{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:1fr 1fr;}.topbar-right{padding-right:100px;}}
</style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main" id="mainContent">

    <div class="topbar">
      <div class="topbar-title">PROVA <span>· Statistiken</span></div>
      <div class="topbar-right">
        <div class="filter-bar" id="filter-bar">
          <button class="filter-chip active" onclick="setFilter(this,'30')">30 Tage</button>
          <button class="filter-chip" onclick="setFilter(this,'90')">90 Tage</button>
          <button class="filter-chip" onclick="setFilter(this,'365')">12 Monate</button>
          <button class="filter-chip" onclick="setFilter(this,'all')">Gesamt</button>
        </div>
      </div>
    </div>

    <div class="page">

      <!-- KPI-Karten -->
      <div class="kpi-grid" id="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">Gutachten gesamt</div><div class="kpi-val" id="kpi-gesamt">—</div><div class="kpi-sub">in diesem Zeitraum</div></div>
        <div class="kpi-card"><div class="kpi-label">Abgeschlossen</div><div class="kpi-val" id="kpi-done">—</div><div class="kpi-sub" id="kpi-done-sub"></div></div>
        <div class="kpi-card"><div class="kpi-label">Ø Bearbeitungszeit</div><div class="kpi-val" id="kpi-zeit">—</div><div class="kpi-sub">Minuten</div></div>
        <div class="kpi-card"><div class="kpi-label">Fotos analysiert</div><div class="kpi-val" id="kpi-fotos">—</div><div class="kpi-sub">via GPT-4o Vision</div></div>
      </div>

      <!-- Charts -->
      <div class="content-grid">

        <!-- Monats-Verlauf -->
        <div class="stat-card">
          <div class="stat-card-title">📈 Gutachten pro Monat</div>
          <div id="month-chart-wrap"><div class="stat-loading"><div class="spinner"></div>Lade Daten…</div></div>
        </div>

        <!-- Schadensarten -->
        <div class="stat-card">
          <div class="stat-card-title">🏷️ Schadensarten</div>
          <div id="schadenart-chart"><div class="stat-loading"><div class="spinner"></div>Lade Daten…</div></div>
        </div>

        <!-- Status-Verteilung -->
        <div class="stat-card">
          <div class="stat-card-title">📊 Status-Verteilung</div>
          <div id="status-chart"><div class="stat-loading"><div class="spinner"></div>Lade Daten…</div></div>
        </div>

        <!-- Auftraggeber-Typen -->
        <div class="stat-card">
          <div class="stat-card-title">👤 Auftraggeber-Typen</div>
          <div id="auftraggeber-chart"><div class="stat-loading"><div class="spinner"></div>Lade Daten…</div></div>
        </div>

      </div>
    </div>
  </div>
</div>

  <script src="/sw-register.js" defer></script>
  <script src="global-search.js" defer></script>
  <script src="auftragstyp.js"></script>
  <script src="trial-guard.js"></script>
  <script src="statistiken-logic.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<!--
  PROVA Systems — Integrations-Template
  
  Dieses File zeigt die KORREKTE Reihenfolge aller Scripts
  in jeder PROVA-Seite. Einfach als Basis für neue Seiten nutzen.
  
  SKRIPT-LADEREIHENFOLGE (kritisch!):
  1. prova-preise.js    → Preise (wird von trial-guard genutzt)
  2. auth-guard-v2.js   → Auth (synchron, kein defer!)
  3. theme.js           → Dark/Light Mode
  4. trial-guard.js     → Trial/Paket-Badges
  5. nav.js             → Sidebar + ⌘K + Helfer-Funktionen
  6. prova-design.css   → Design System
  7. mobile.css         → Responsive
  8. prova-context.js   → Zentrales Context-Modul (PROVA.ctx)
  9. prova-error-handler.js → Fehlerbehandlung
  10. [page]-logic.js   → Seitenspezifische Logik (defer)
  11. support-chat.js   → Support-Widget (defer, letztes)
-->
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Seitentitel · PROVA</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0d11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- 1. Preise (muss VOR trial-guard stehen) -->
  <script src="prova-preise.js"></script>

  <!-- 2. Auth Guard (synchron — kein defer!) -->
  <script src="auth-guard-v2.js"></script>

  <!-- 3. Theme (synchron — verhindert FOUC) -->
  <script src="theme.js"></script>

  <!-- 4. Trial Guard (synchron — muss Badges early rendern) -->
  <script src="trial-guard.js"></script>

  <!-- 5. Navigation + ⌘K + Toast + Helfer -->
  <script src="nav.js"></script>

  <!-- 6-7. CSS (nach nav.js, das CSS injiziert) -->
  <link rel="stylesheet" href="prova-design.css">
  <link rel="stylesheet" href="mobile.css">

  <!-- 8. Zentrales Context-Modul -->
  <script src="prova-context.js"></script>

  <!-- 9. Error Handler -->
  <script src="prova-error-handler.js"></script>

  <!-- Seitenspezifisches CSS (falls vorhanden) -->
  <!-- <link rel="stylesheet" href="meine-seite.css"> -->

</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       SIDEBAR (nav.js füllt dies automatisch)
  ═══════════════════════════════════════════════════ -->
  <div id="sidebar" class="sidebar"></div>

  <!-- ═══════════════════════════════════════════════════
       HAUPT-LAYOUT
  ═══════════════════════════════════════════════════ -->
  <div class="main-wrap">

    <!-- Topbar -->
    <div class="topbar" style="
      position:sticky;top:0;z-index:100;
      display:flex;align-items:center;gap:12px;
      padding:0 20px;height:56px;
      background:var(--bg,#0b0d11);
      border-bottom:1px solid var(--border,rgba(255,255,255,.07));
    ">
      <!-- Mobile Hamburger -->
      <button id="mobile-menu-btn" onclick="openMobileSidebar()" style="
        display:none;background:none;border:none;color:var(--text3);
        font-size:20px;cursor:pointer;padding:4px;
      ">☰</button>

      <!-- Seitentitel -->
      <div style="flex:1;">
        <div id="page-title" class="p-page-title">Seitentitel</div>
        <div id="page-sub" class="p-page-sub">Untertitel</div>
      </div>

      <!-- Topbar-Aktionen (rechts) -->
      <div style="display:flex;align-items:center;gap:8px;">
        <!-- Paket-Badge (wird von logic.js gesteuert) -->
        <div id="topbar-paket-badge" style="display:none;"></div>

        <!-- Beispiel-Button -->
        <!-- <button class="p-btn p-btn-primary">+ Neu</button> -->
      </div>
    </div>

    <!-- ─── Seiteninhalt ─── -->
    <div class="page-content" style="padding:20px;max-width:1280px;margin:0 auto;">

      <!-- Beispiel: Leerer State -->
      <div id="content-area">
        <!-- Wird von logic.js gefüllt -->
        <!-- Während Laden: ProvaError.showLoading('content-area') -->
        <!-- Bei Fehler:    ProvaError.show('content-area', {...}) -->
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       SCRIPTS (defer = non-blocking, nach DOM)
  ═══════════════════════════════════════════════════ -->

  <!-- 10. Seitenspezifische Logik -->
  <!-- <script src="meine-seite-logic.js" defer></script> -->

  <!-- 11. Support-Chat (immer letztes, defer) -->
  <script src="support-chat.js" defer></script>

  <!-- 12. Service Worker registrieren -->
  <script src="sw-register.js" defer></script>

  <!-- ─── Inline-Init (minimales Beispiel) ─── -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // 1. Auth prüfen
      PROVA.guard();

      // 2. Seitentitel setzen
      PROVA.setPageTitle('Meine Seite', 'Untertitel hier');

      // 3. Context-Daten nutzen
      var ctx = PROVA.ctx;
      console.log('Paket:', ctx.paket, '| Email:', ctx.email);

      // 4. Daten laden mit Fehlerbehandlung
      ladeInhalte();
    });

    async function ladeInhalte() {
      var container = document.getElementById('content-area');

      // Loading State anzeigen
      ProvaError.showLoading(container, 4);

      try {
        // Airtable-Daten mit User-Filter (sicher: nur eigene Daten)
        var filter = PROVA.getSVFilter(); // "{SV_Email}="user@example.de""
        var records = await PROVA.atFetch(PROVA.AT.FAELLE, filter, {
          maxRecords: 50,
          sort: 'Timestamp',
          sortDir: 'desc'
        });

        if (!records.length) {
          container.innerHTML = window.emptyState(
            '📋',
            'Noch keine Einträge',
            'Legen Sie Ihren ersten Eintrag an.',
            '+ Neuer Eintrag',
            'app.html'
          );
          return;
        }

        // Daten rendern
        container.innerHTML = records.map(function (r) {
          return '<div class="p-card p-card-clickable" onclick="window.location.href=\'akte.html?id=' + r.id + '\'">' +
            '<div class="p-card-title">' + (r.fields.Aktenzeichen || '—') + '</div>' +
            '<div class="p-card-sub">' + (r.fields.Schadenart || '') + '</div>' +
            '</div>';
        }).join('');

      } catch (e) {
        // Fehler-State mit Retry-Button
        ProvaError.show(container, {
          type:    e.type || 'unknown',
          onRetry: ladeInhalte
        });
      }
    }
  </script>

</body>
</html>

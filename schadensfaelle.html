<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover">
<title>Schadensfälle · PROVA</title>
<script src="prova-preise.js"></script>
<script src="paket-guard.js"></script>
<script src="/lib/prova-config.js"></script>
<script src="/lib/prova-legacy-bridge.js"></script>
<script src="/lib/edge-shim.js"></script>
<script src="prova-fetch-auth.js"></script>
<script src="prova-notifications.js" defer></script>
<script>
(function(){
  try {
    var token = localStorage.getItem('prova_auth_token');
    var email = localStorage.getItem('prova_sv_email') || '';
    if (!token || !email || email.indexOf('@') === -1) {
      window.location.replace('/login?next=' + encodeURIComponent(location.pathname + location.search));
      return;
    }
  } catch (e) { window.location.replace('/login'); }
})();
</script>
<script type="module">
  import { runAuthGuard } from '/lib/auth-guard.js';
  runAuthGuard().catch(e => console.error('[auth] guard failed', e));
</script>
<script src="theme.js"></script>
<script src="prova-layout.config.js"></script>
<script src="nav.js" defer></script>
<link rel="stylesheet" href="mobile.css">
<link rel="stylesheet" href="prova-design.css">
<link rel="stylesheet" href="/lib/empty-states.css">
<script src="/lib/empty-states.js" defer></script>
<style>
:root {
  --bg:#0b0d11; --bg2:#111318; --bg3:#161a22;
  --surface:#1c2130; --surface2:#232a3a;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.11);
  --text:#eaecf4; --text2:#8b93ab; --text3:#4d5568;
  --accent:#4f8ef7; --accent2:#3a7be0;
  --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --purple:#8b5cf6;
  --r-sm:6px; --r-md:10px; --r-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.55;}

.sf-wrap { max-width: 1280px; margin: 0 auto; padding: 16px 20px 100px; }
.sf-toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px; margin-bottom: 18px; }
.sf-title { font-size: 22px; font-weight: 700; }
.sf-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.btn { padding: 10px 16px; border-radius: var(--r-md); font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; min-height: 40px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface); color: var(--text); }

.sf-filters { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px; margin-bottom: 16px; }
.sf-filter-group { display: flex; flex-direction: column; gap: 4px; }
.sf-filter-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
.sf-input, .sf-select {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--r-sm); padding: 9px 12px; font-size: 13px;
  font-family: inherit; min-height: 40px;
}
.sf-input:focus, .sf-select:focus { outline: none; border-color: var(--accent); }

.sf-table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
.sf-table thead th {
  text-align: left; padding: 12px 14px; font-size: 11px; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; background: var(--bg3);
  border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
}
.sf-table thead th:hover { background: var(--surface2); color: var(--text); }
.sf-table thead th.sorted::after { content: " ↓"; color: var(--accent); }
.sf-table thead th.sorted-asc::after { content: " ↑"; color: var(--accent); }
.sf-table tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.sf-table tbody tr:hover { background: var(--bg3); }
.sf-table td { padding: 12px 14px; font-size: 13px; color: var(--text2); }
.sf-table td.az { font-family: ui-monospace, monospace; color: var(--text); font-weight: 600; }
.sf-table td.title { color: var(--text); }

.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.badge-phase { background: rgba(79,142,247,.12); color: #93c5fd; }
.badge-status { background: rgba(255,255,255,.06); color: var(--text2); }
.badge-status.aktiv { background: rgba(16,185,129,.12); color: #34d399; }
.badge-status.abgeschlossen { background: rgba(139,92,246,.12); color: #a78bfa; }
.badge-frist-warn { background: rgba(245,158,11,.12); color: #fbbf24; }
.badge-frist-overdue { background: rgba(239,68,68,.12); color: #f87171; }

.empty-state { padding: 56px 24px; text-align: center; color: var(--text3); }
.empty-state .icon { font-size: 42px; margin-bottom: 12px; }
.empty-state .title { font-size: 16px; color: var(--text); font-weight: 700; margin-bottom: 6px; }
.empty-state .desc { font-size: 13px; max-width: 380px; margin: 0 auto 18px; }
.empty-state .demo-hint { margin-top: 12px; font-size: 12px; }

.loading { padding: 40px; text-align: center; color: var(--text3); font-size: 13px; }
.error-box { padding: 16px; background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); color: #f87171; border-radius: var(--r-md); margin-bottom: 16px; }

.sf-meta { font-size: 12px; color: var(--text3); margin-top: 10px; }

@media (max-width: 768px) {
  .sf-filters { grid-template-columns: 1fr; }
  .sf-table thead { display: none; }
  .sf-table tbody tr { display: block; padding: 12px; border-bottom: 1px solid var(--border); }
  .sf-table tbody td { display: block; padding: 4px 0; border: none; }
  .sf-table tbody td.az { font-size: 14px; }
}
</style>
</head>
<body data-page="schadensfaelle">
<div class="app-shell" id="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="sb-overlay" id="sb-overlay" onclick="closeMobileSidebar()"></div>
  <div class="main-wrap" id="main-wrap">
    <header class="topbar">
      <div class="topbar-left">
        <button class="burger" onclick="openMobileSidebar()"><span></span><span></span><span></span></button>
        <div class="breadcrumb"><span>PROVA</span><span style="color:var(--text3)">›</span><strong>Schadensfälle</strong></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="window.location.href='neuer-fall.html'">+ Neuer Fall</button>
      </div>
    </header>
    <div class="page-content">
      <div class="sf-wrap">
        <div class="sf-toolbar">
          <div class="sf-title">📋 Schadensfälle <span style="color:var(--text3);font-weight:400;font-size:14px;margin-left:8px;" id="sf-count"></span></div>
          <div class="sf-actions">
            <button class="btn btn-ghost" onclick="window.location.href='archiv.html'">📦 Archiv</button>
          </div>
        </div>

        <!-- MEGA³⁴ A2: Universal-Filter-Bar mit Datum-Range + Bulk-Actions -->
        <div class="sf-filters filter-bar" id="sf-filter-bar">
          <div class="sf-filter-group">
            <label class="sf-filter-label">Suche</label>
            <input type="text" id="sf-search" class="sf-input" placeholder="Aktenzeichen, Auftraggeber, Kurzbezeichnung…" oninput="window.SF.applyFilters()" />
          </div>
          <div class="sf-filter-group">
            <label class="sf-filter-label">Auftragstyp</label>
            <select id="sf-typ" class="sf-select" onchange="window.SF.applyFilters()">
              <option value="">Alle</option>
              <option value="schadensgutachten">Schadensgutachten</option>
              <option value="wertgutachten">Wertgutachten</option>
              <option value="beratung">Beratung</option>
              <option value="baubegleitung">Baubegleitung</option>
              <option value="beweissicherung">Beweissicherung</option>
              <option value="gegengutachten">Gegengutachten</option>
              <option value="ergaenzungsgutachten">Ergänzungsgutachten</option>
              <option value="gerichtsgutachten">Gerichtsgutachten</option>
              <option value="stellungnahme">Stellungnahme</option>
              <option value="kurzstellungnahme">Gutachterliche Stellungnahme</option>
            </select>
          </div>
          <div class="sf-filter-group">
            <label class="sf-filter-label">Phase</label>
            <select id="sf-phase" class="sf-select" onchange="window.SF.applyFilters()">
              <option value="">Alle</option>
              <option value="auftragsannahme">Auftragsannahme</option>
              <option value="ortstermin">Ortstermin</option>
              <option value="bearbeitung">Bearbeitung</option>
              <option value="freigabe">Freigabe</option>
              <option value="abgeschlossen">Abgeschlossen</option>
            </select>
          </div>
          <div class="sf-filter-group">
            <label class="sf-filter-label">Status</label>
            <select id="sf-status" class="sf-select" onchange="window.SF.applyFilters()">
              <option value="">Alle</option>
              <option value="aktiv">Aktiv</option>
              <option value="in_arbeit">In Arbeit</option>
              <option value="wartend">Wartend</option>
              <option value="abgeschlossen">Abgeschlossen</option>
              <option value="storniert">Storniert</option>
            </select>
          </div>
          <div class="sf-filter-group">
            <label class="sf-filter-label">Datum von</label>
            <input type="date" id="sf-date-from" class="sf-input" onchange="window.SF.applyFilters()">
          </div>
          <div class="sf-filter-group">
            <label class="sf-filter-label">Datum bis</label>
            <input type="date" id="sf-date-to" class="sf-input" onchange="window.SF.applyFilters()">
          </div>
        </div>

        <!-- MEGA³⁴ A2: Bulk-Actions-Bar -->
        <div class="sf-bulk-bar" id="sf-bulk-bar" style="display:none;margin-bottom:14px;padding:10px 14px;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);border-radius:8px;">
          <span id="sf-bulk-count" style="font-size:13px;font-weight:600;"></span>
          <span style="margin-left:auto;display:inline-flex;gap:8px;">
            <button class="btn btn-ghost" onclick="window.SF.bulkComplete()">✓ Als abgeschlossen markieren</button>
            <button class="btn btn-ghost" onclick="window.SF.exportCSV()">⬇ CSV-Export</button>
            <button class="btn btn-ghost" onclick="window.SF.bulkClear()">✕ Auswahl aufheben</button>
          </span>
        </div>

        <div id="sf-content">
          <div class="loading">Lade Schadensfälle…</div>
        </div>

        <!-- MEGA³⁴ A2: Pagination -->
        <div class="sf-pagination paginate" id="sf-pagination" style="display:flex;justify-content:center;gap:8px;margin-top:16px;flex-wrap:wrap;">
          <button class="btn btn-ghost" id="sf-page-prev" onclick="window.SF.page(-1)">← Zurück</button>
          <span id="sf-page-info" style="padding:10px 14px;font-size:13px;">Seite 1 von 1</span>
          <button class="btn btn-ghost" id="sf-page-next" onclick="window.SF.page(1)">Weiter →</button>
        </div>

        <div class="sf-meta" id="sf-meta"></div>
      </div>
    </div>
  </div>
</div>

<!-- MEGA³⁶ W3.5: Mobile-FAB für Konsistenz mit dashboard.html W3.2 -->
<style>
  .new-case-fab{display:none;position:fixed;right:18px;bottom:88px;z-index:380;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent,#4f8ef7),var(--accent2,#3a7be0));border:none;color:#fff;font-size:28px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(79,142,247,.45);transition:transform .15s,box-shadow .15s;align-items:center;justify-content:center;line-height:1;font-family:inherit;}
  .new-case-fab:active{transform:scale(.94);}
  .new-case-fab:focus-visible{outline:3px solid #fff;outline-offset:2px;}
  @media (max-width:768px){
    .new-case-fab{display:flex;}
  }
</style>
<button class="new-case-fab" id="sf-new-case-fab" aria-label="Neuen Fall anlegen" onclick="window.location.href='neuer-fall.html'">+</button>

<script src="schadensfaelle-logic.js"></script>
<script src="sw-register.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Textbausteine · PROVA</title>
<script src="theme.js"></script>
<script src="nav.js"></script>
<style>
/* ── TOKENS (identisch mit normen.html + positionen.html) ── */
:root{
  --bg:#0b1220;--bg2:#111827;--bg3:#161f30;
  --surface:#1c2537;--surface2:#222d42;--surface3:#2a3550;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--text2:#aab4cb;--text3:#6b7a99;
  --accent:#4f8ef7;--accent2:#3a7be0;
  --green:#10b981;--green-bg:rgba(16,185,129,.08);--green-border:rgba(16,185,129,.25);
  --red:#ef4444;--red-bg:rgba(239,68,68,.08);--red-border:rgba(239,68,68,.25);
  --warn:#f59e0b;--purple:#8b5cf6;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;
  --font-ui:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --topbar-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;line-height:1.5;}

/* ── LAYOUT (wie normen + positionen) ── */
.app-shell{display:flex;width:100%;min-height:100vh;overflow:hidden;}
/* sidebar via nav.js */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}

.topbar{height:var(--topbar-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);}
.topbar-title span{color:var(--text3);font-weight:400;}
.topbar-right{display:flex;align-items:center;gap:10px;padding-right:160px;}
.paket-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;}
.page{flex:1;padding:24px 24px 40px;}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.page-header-left{}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.02em;color:var(--text);margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text3);}
.page-sub strong{color:var(--accent);}

/* ── SUCHBAR (identisch normen.html) ── */
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-input-wrap{position:relative;flex:1;min-width:220px;}
.search-input-wrap .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;}
.search-input{width:100%;padding:10px 12px 10px 36px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);color:var(--text);font-size:13px;font-family:var(--font-ui);outline:none;transition:border-color 0.15s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text3);}

/* ── CHIP FILTER (identisch normen.html) ── */
.chip-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.stat-chip{padding:4px 12px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px;}
.stat-chip:hover,.stat-chip.active{background:rgba(79,142,247,0.12);border-color:rgba(79,142,247,0.3);color:var(--accent);}
.chip-count{font-weight:700;color:var(--text);background:rgba(255,255,255,.07);padding:1px 6px;border-radius:10px;font-size:10px;}

/* ── BAUSTEINE GRID (identisch normen-grid) ── */
.baustein-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px;align-items:start;}

/* ── BAUSTEIN CARD (wie normen-card) ── */
.baustein-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;transition:all 0.18s;position:relative;}
.baustein-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.bc-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.bc-kat-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;margin-top:2px;}
.bc-titel{font-size:13px;font-weight:700;color:var(--text);line-height:1.35;flex:1;}
.bc-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.2);flex-shrink:0;}
.bc-preview{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:10px;padding:10px 12px;background:rgba(79,142,247,.04);border:1px solid rgba(79,142,247,.08);border-radius:8px;max-height:80px;overflow:hidden;position:relative;}
.bc-preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,var(--surface));}
.baustein-card:hover .bc-preview::after{background:linear-gradient(transparent,var(--surface2));}
.bc-placeholder{background:rgba(79,142,247,.15);color:var(--accent);padding:1px 4px;border-radius:3px;font-family:var(--mono);font-size:11px;}
.bc-actions{display:flex;gap:6px;margin-top:4px;}
.btn-einfuegen{flex:1;padding:7px 12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:var(--font-ui);}
.btn-einfuegen:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(79,142,247,.35);}
.btn-kopieren{padding:7px 12px;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s;font-family:var(--font-ui);}
.btn-kopieren:hover{background:var(--surface2);color:var(--text);}
.btn-edit{padding:7px 10px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:11px;cursor:pointer;transition:all .15s;font-family:var(--font-ui);}
.btn-edit:hover{border-color:var(--border2);color:var(--text2);}
.bc-notiz{font-size:10px;color:var(--text3);margin-top:6px;font-style:italic;}
.bc-uses{position:absolute;top:12px;right:12px;font-size:10px;color:var(--text3);}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.empty-sub{font-size:12px;}
.btn-new-inline{margin-top:16px;padding:10px 20px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-ui);}

/* ── NEW BUTTON ── */
.btn-new{padding:9px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r-md);color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--font-ui);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-new:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(79,142,247,.4);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 18px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-size:13px;font-weight:500;z-index:9999;transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);min-width:260px;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.toast.show{transform:translateY(0);opacity:1;}

/* ── MODAL (Editor) ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;}
.modal-body{padding:20px;}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:14px;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:100px;line-height:1.6;}
.form-hint{font-size:11px;color:var(--text3);margin-top:-10px;margin-bottom:14px;}
.modal-footer{display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--border);}
.btn-save{flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-cancel{padding:10px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;}
.btn-delete{padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:8px;color:var(--red);font-size:13px;cursor:pointer;font-family:inherit;}

/* ── SUPPORT FAB ── */
.support-fab{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(79,142,247,.4);z-index:300;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.support-fab:hover{transform:scale(1.08);}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}

@media(max-width:768px){
  .baustein-grid{grid-template-columns:1fr;}
  .page-header{flex-direction:column;}
  .topbar-right{padding-right:100px;}
}
</style>

  <script src="/sw-register.js" defer></script>
  <script src="auftragstyp.js"></script>
  <script src="trial-guard.js"></script>
  <script src="textbausteine-logic.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover">
<title>Fälle · PROVA</title>
<script src="prova-preise.js"></script>
<script src="auth-guard.js"></script>
<script src="theme.js"></script>
<script src="trial-guard.js"></script>
<script src="nav.js"></script>

<style>
/* ═══ PROVA SIDEBAR SYSTEM ═══════════════════════════════════════════════ */
:root{
  --bg:#0b0d11;--bg2:#111318;--bg3:#161a22;
  --surface:#1c2130;--surface2:#232a3a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#eaecf4;--text2:#8b93ab;--text3:#4d5568;
  --accent:#4f8ef7;--accent2:#3a7be0;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;
  --font-ui:'DM Sans',system-ui,sans-serif;
  --font-mono:ui-monospace,Consolas,monospace;
  --r-sm:6px;--r-md:10px;--r-lg:14px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.25);--shadow-md:0 4px 16px rgba(0,0,0,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;scroll-behavior:smooth;}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text2);min-height:100vh;overflow-x:hidden;line-height:1.55;}
a{text-decoration:none;color:inherit;}
button,input,select,textarea{font-family:inherit;font-size:inherit;}
*{-webkit-tap-highlight-color:transparent;}
input,select,textarea{font-size:max(16px,1em);}

/* SIDEBAR */
.app-shell{display:flex;min-height:100vh;}

/* TOPBAR */
.topbar{height:52px;min-height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-right{display:flex;align-items:center;gap:6px;}
.breadcrumb{font-size:13px;color:var(--text3);display:flex;align-items:center;gap:6px;}
.breadcrumb strong{color:var(--text2);font-weight:600;}
.topbar-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;transition:all .12s;}
.topbar-btn:hover{color:var(--text2);background:rgba(255,255,255,.05);}
.topbar-paket{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;letter-spacing:.04em;}
.burger{display:none;flex-direction:column;gap:4.5px;background:none;border:none;cursor:pointer;padding:8px;border-radius:6px;min-height:36px;align-items:center;justify-content:center;}
.burger span{display:block;width:18px;height:2px;background:var(--text2);border-radius:2px;}

/* PAGE */
.page-content{padding:24px 28px 48px;max-width:1400px;width:100%;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.toolbar-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.toolbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.page-title{font-size:20px;font-weight:800;letter-spacing:-.025em;color:var(--text);white-space:nowrap;}
.count-badge{font-size:12px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--text3);}
.search-input{padding:8px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);color:var(--text);font-size:13px;outline:none;transition:border-color .15s;width:220px;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text3);}
.filter-select{padding:8px 10px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);color:var(--text2);font-size:13px;outline:none;cursor:pointer;appearance:none;}
.filter-select option{background:var(--bg2);}
.view-toggle{display:flex;background:var(--surface);border-radius:var(--r-md);padding:3px;gap:2px;}
.view-btn{padding:5px 10px;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;transition:all .12s;}
.view-btn.active{background:var(--surface2);color:var(--text2);}
.btn-new{display:flex;align-items:center;gap:7px;padding:8px 16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r-md);color:#fff;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-new:hover{opacity:.9;transform:translateY(-1px);}

/* ══ KANBAN ══ */
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;}
.kanban-col{background:var(--bg3);border-radius:var(--r-lg);overflow:hidden;min-height:200px;}
.kanban-col-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);}
.col-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.col-dot{width:8px;height:8px;border-radius:50%;}
.col-count{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--surface2);color:var(--text3);}
.kanban-cards{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:60px;}

/* Fall-Karte */
.fall-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 14px;cursor:pointer;transition:all .15s;position:relative;}
.fall-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.fall-card:hover .card-actions{opacity:1;}
.fall-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.fall-az{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--accent);}
.fall-schadenart{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;}
.fall-card-body{margin-bottom:8px;}
.fall-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3;}
.fall-meta{font-size:11px;color:var(--text3);display:flex;flex-direction:column;gap:2px;}
.fall-card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.fall-date{font-size:10px;color:var(--text3);}
.fall-frist{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;}
.fall-frist.rot{background:rgba(239,68,68,.12);color:var(--danger);}
.fall-frist.warn{background:rgba(245,158,11,.12);color:var(--warning);}
.fall-frist.ok{background:rgba(16,185,129,.12);color:var(--success);}
.card-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .15s;}
.card-action-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border2);background:var(--bg2);color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .12s;}
.card-action-btn:hover{color:var(--text2);border-color:var(--accent);}
.kanban-empty{padding:20px;text-align:center;color:var(--text3);font-size:12px;}

/* ══ LISTE ══ */
.list-view{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.list-header{display:grid;grid-template-columns:140px 1fr 180px 100px 130px 80px;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg3);}
.list-th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);}
.list-row{display:grid;grid-template-columns:140px 1fr 180px 100px 130px 80px;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;align-items:center;}
.list-row:hover{background:rgba(255,255,255,.025);}
.list-row:last-child{border-bottom:none;}
.list-az{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--accent);}
.list-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-meta{font-size:11px;color:var(--text3);}
.list-addr{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-date{font-size:12px;color:var(--text3);}
.status-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;}
.list-actions{display:flex;gap:4px;justify-content:flex-end;}
.list-action-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .12s;}
.list-action-btn:hover{color:var(--accent);border-color:var(--accent);}
.list-empty{padding:48px;text-align:center;color:var(--text3);}
.list-empty-icon{font-size:32px;margin-bottom:12px;opacity:.4;}

/* Schadenart-Farben */
.sa-schimmel{background:rgba(139,92,246,.12);color:#a78bfa;}
.sa-wasser{background:rgba(59,130,246,.12);color:#60a5fa;}
.sa-brand{background:rgba(239,68,68,.12);color:#f87171;}
.sa-sturm{background:rgba(245,158,11,.12);color:#fbbf24;}
.sa-baum{background:rgba(16,185,129,.12);color:#6ee7b7;}
.sa-sonstig{background:rgba(255,255,255,.06);color:var(--text3);}

/* Status-Farben */
.st-bearb{background:rgba(79,142,247,.1);color:var(--accent);border:1px solid rgba(79,142,247,.2);}
.st-entwurf{background:rgba(245,158,11,.1);color:var(--warning);border:1px solid rgba(245,158,11,.2);}
.st-freig{background:rgba(16,185,129,.1);color:var(--success);border:1px solid rgba(16,185,129,.2);}
.st-export{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.2);}
.st-archiv{background:rgba(255,255,255,.04);color:var(--text3);border:1px solid var(--border);}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* Support FAB */
.support-fab{position:fixed;bottom:24px;right:24px;z-index:400;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 16px rgba(79,142,247,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:transform .15s;border:none;color:#fff;}
.support-fab:hover{transform:scale(1.08);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);max-width:480px;width:100%;padding:26px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:15px;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;border-radius:4px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.form-input{width:100%;padding:9px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);color:var(--text);font-size:13px;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text3);}
textarea.form-input{min-height:80px;resize:vertical;}

/* Responsive */
@media(max-width:1200px){.kanban-board{grid-template-columns:repeat(2,1fr);}}
@media(max-width:900px){
  .list-header{grid-template-columns:120px 1fr 90px 80px;}
  .list-row{grid-template-columns:120px 1fr 90px 80px;}
  .list-addr,.list-date{display:none;}
}
@media(max-width:768px){
  .burger{display:flex;}
  .page-content{padding:16px 16px 72px;}
  .topbar{padding:0 16px;}
  .kanban-board{grid-template-columns:1fr;}
  .search-input{width:150px;}
}
@media(max-width:600px){
  .page-content{padding:12px 12px 72px;}
  .list-header{grid-template-columns:100px 1fr 80px;}
  .list-row{grid-template-columns:100px 1fr 80px;}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.page-content{animation:fadeIn .22s ease;}

  /* ── SUPPORT FAB ── */
  .support-fab{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent,#4f8ef7),#3a7be0);border:none;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(79,142,247,.4);z-index:300;transition:all .2s;display:flex;align-items:center;justify-content:center;}
  .support-fab:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(79,142,247,.5);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:var(--surface,#1c2537);border:1px solid var(--border2,rgba(255,255,255,.12));border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border,rgba(255,255,255,.07));}
  .modal-title{font-size:15px;font-weight:700;color:var(--text,#e8eaf0);}
  .modal-close{background:none;border:none;color:var(--text3,#6b7a99);font-size:18px;cursor:pointer;padding:4px;border-radius:4px;}
  .modal-close:hover{color:var(--text,#e8eaf0);}
  .modal-body{padding:20px;}
  .sup-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3,#6b7a99);margin-bottom:5px;}
  .sup-input{width:100%;padding:9px 12px;background:var(--bg3,#161f30);border:1px solid var(--border2,rgba(255,255,255,.12));border-radius:8px;color:var(--text,#e8eaf0);font-size:13px;font-family:inherit;outline:none;margin-bottom:12px;}
  .sup-input:focus{border-color:var(--accent,#4f8ef7);}
  .sup-textarea{resize:vertical;min-height:90px;}
  .sup-err{font-size:12px;color:var(--red,#ef4444);margin-bottom:8px;display:none;}
  .sup-send-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--accent,#4f8ef7),#3a7be0);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
  .sup-send-btn:disabled{opacity:.5;cursor:not-allowed;}
  .sup-ok{display:none;text-align:center;padding:20px 0;}
  .sup-ok-icon{font-size:36px;margin-bottom:8px;}
  .sup-ok-title{font-size:15px;font-weight:700;color:var(--green,#10b981);margin-bottom:4px;}
  .sup-ok-sub{font-size:12px;color:var(--text3,#6b7a99);}
@media(max-width:768px){.bottom-nav{display:flex !important;}}

/* ════════════════════════════════════════════════════════
   KEYBOARD NAVIGATION — Linear Style
   ════════════════════════════════════════════════════════ */
.fall-card.kb-selected,
.list-row.kb-selected {
  border-color: var(--accent, #4f8ef7) !important;
  background: rgba(79,142,247,.07) !important;
  outline: none;
}
.fall-card:focus,
.list-row:focus { outline: none; }

/* Keyboard-Shortcut-Hint (erscheint nach erster Pfeiltasten-Nutzung) */
.kb-hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(11,13,17,.9);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px;
  padding: 8px 16px;
  font-size: 11px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 500;
  backdrop-filter: blur(8px);
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  white-space: nowrap;
}
.kb-hint.show { opacity: 1; }
.kb-hint kbd {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: monospace;
  font-size: 10px;
  color: var(--text2);
}

/* ════════════════════════════════════════════════════════
   SWIPE ACTIONS MOBILE — iOS-Mail / Todoist Style
   ════════════════════════════════════════════════════════ */
@media (max-width: 768px) {

  /* Wrapper für Swipe-Container */
  .swipe-wrap {
    position: relative;
    overflow: hidden;
    border-radius: var(--r-md);
    margin-bottom: 8px;
  }

  /* Hintergrund-Actions (sichtbar beim Swipen) */
  .swipe-actions-left,
  .swipe-actions-right {
    position: absolute;
    top: 0; bottom: 0;
    display: flex;
    align-items: center;
    min-width: 80px;
    z-index: 0;
  }
  .swipe-actions-left {
    left: 0;
    background: linear-gradient(135deg, #10b981, #059669);
    border-radius: var(--r-md) 0 0 var(--r-md);
    padding: 0 16px;
    flex-direction: column;
    gap: 3px;
    justify-content: center;
  }
  .swipe-actions-right {
    right: 0;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    border-radius: 0 var(--r-md) var(--r-md) 0;
    padding: 0 16px;
    flex-direction: column;
    gap: 3px;
    justify-content: center;
    align-items: flex-end;
  }
  .swipe-action-icon { font-size: 20px; }
  .swipe-action-label {
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,.9);
    white-space: nowrap;
  }

  /* Card liegt über den Actions */
  .swipe-card {
    position: relative;
    z-index: 1;
    transform: translateX(0);
    transition: transform .08s ease;
    will-change: transform;
    touch-action: pan-y;
    background: var(--surface);
    border-radius: var(--r-md);
  }
  .swipe-card.snap-back {
    transition: transform .25s cubic-bezier(.25,.46,.45,.94);
  }
  .swipe-card.snap-open-right {
    transition: transform .2s cubic-bezier(.25,.46,.45,.94);
    transform: translateX(80px);
  }
  .swipe-card.snap-open-left {
    transition: transform .2s cubic-bezier(.25,.46,.45,.94);
    transform: translateX(-80px);
  }

  /* Visuelles Feedback: Grün-Schimmer bei Diktat-Threshold */
  .swipe-card.swipe-confirm-right::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(16,185,129,.12);
    border-radius: inherit;
    pointer-events: none;
  }
  .swipe-card.swipe-confirm-left::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(99,102,241,.12);
    border-radius: inherit;
    pointer-events: none;
  }
}
</style>

<body>
<div class="app-shell">

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar"></nav>
<div class="sb-overlay" id="sb-overlay" onclick="closeMobileSidebar()"></div>

<!-- MAIN -->
<div class="main-wrap" id="main-wrap">

  <header class="topbar">
    <div class="topbar-left">
      <button class="burger" onclick="openMobileSidebar()"><span></span><span></span><span></span></button>
      <div class="breadcrumb"><span>PROVA</span><span style="color:var(--text3)">›</span><strong>Fälle</strong></div>
    </div>
    <div class="topbar-right">
      <span class="topbar-paket" id="topbar-paket-badge"></span>
      <a href="einstellungen.html"><button class="topbar-btn">⚙</button></a>
    </div>
  </header>

  <main class="page-content">

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="page-title">Fälle</span>
        <span class="count-badge" id="count-badge">—</span>
        <input class="search-input" id="suche" type="search" placeholder="Suche…" oninput="filterUndRender()">
        <select class="filter-select" id="f-schadenart" onchange="filterUndRender()">
          <option value="">Alle Schadenarten</option>
          <option value="Schimmelbefall">Schimmelbefall</option>
          <option value="Wasserschaden">Wasserschaden</option>
          <option value="Brandschaden">Brandschaden</option>
          <option value="Sturmschaden">Sturmschaden</option>
          <option value="Baumängel">Baumängel</option>
          <option value="Elementarschaden">Elementarschaden</option>
        </select>
        <select class="filter-select" id="f-zeitraum" onchange="filterUndRender()">
          <option value="">Alle Zeiträume</option>
          <option value="30">Letzte 30 Tage</option>
          <option value="90">Letzte 90 Tage</option>
          <option value="jahr">Dieses Jahr</option>
        </select>
      </div>

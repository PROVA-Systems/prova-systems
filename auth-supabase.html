<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVA Systems — Anmelden</title>
<meta name="description" content="PROVA — KI-natives B2B-SaaS für ö.b.u.v. Bauschaden-Sachverständige.">
<!--
  Sprint K-1.4 B12 — Production-ready Login-Page für Supabase-Auth.
  Parallel zu app-login.html (Netlify Identity bleibt bis K-1.5 Cutover aktiv).

  Cutover (K-1.5):
    - app-login.html → app-login.html.bak
    - auth-supabase.html → app-login.html (Rename)
    ODER: Netlify _redirects auf /app-login → /auth-supabase
-->
<style>
  :root {
    --navy:        #1B3F6B;
    --navy-dark:   #0D2544;
    --accent:      #4A90D9;
    --accent-light:#EFF6FF;
    --success:     #10B981;
    --error:       #EF4444;
    --gray-100:    #F3F4F6;
    --gray-200:    #E5E7EB;
    --gray-400:    #9CA3AF;
    --gray-500:    #6B7280;
    --gray-700:    #374151;
    --gray-900:    #111827;
    --white:       #FFFFFF;
    --radius:      12px;
    --shadow:      0 20px 60px rgba(0,0,0,.12);
    color-scheme: light;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--navy-dark); color: var(--gray-900);
    min-height: 100vh; padding: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(74,144,217,.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(27,63,107,.4) 0%, transparent 60%);
  }
  .card {
    background: var(--white); border-radius: var(--radius);
    padding: 2.5rem; width: 100%; max-width: 440px;
    box-shadow: var(--shadow); position: relative; z-index: 1;
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
  .brand-logo {
    width: 40px; height: 40px; background: var(--navy); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-weight: 700; font-size: 14px;
  }
  .brand-name { font-weight: 700; font-size: 18px; color: var(--navy); letter-spacing: -.01em; }
  .brand-tag { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
  h1 { font-size: 22px; font-weight: 700; color: var(--navy); margin: 0 0 4px; }
  .subtitle { color: var(--gray-500); font-size: 13px; margin: 0 0 1.5rem; }
  .badge {
    display: none;  /* badge weg in production-version */
    font-size: 11px; padding: 2px 8px;
    background: #fef3c7; color: #92400e; border-radius: 4px;
    margin-left: 6px;
  }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid #e5e5e7; margin-bottom: 20px; }
  .tab {
    flex: 1; padding: 8px 12px; background: none; border: 0;
    border-bottom: 2px solid transparent;
    cursor: pointer; font-size: 13px; color: #666;
  }
  .tab.active { color: #111; border-bottom-color: #111; font-weight: 500; }
  form { display: none; flex-direction: column; gap: 12px; }
  form.active { display: flex; }
  label { font-size: 12px; color: #444; font-weight: 500; }
  input[type=email], input[type=password], input[type=text] {
    padding: 10px 12px; border: 1px solid #d1d1d6; border-radius: 6px;
    font-size: 14px; font-family: inherit;
  }
  input:focus { outline: 2px solid #007aff; outline-offset: -1px; }
  button[type=submit] {
    margin-top: 8px; padding: 10px 16px; background: #111; color: #fff;
    border: 0; border-radius: 6px; font-size: 14px; font-weight: 500;
    cursor: pointer;
  }
  button[type=submit]:disabled { opacity: 0.5; cursor: not-allowed; }
  button[type=submit]:hover:not(:disabled) { background: #333; }
  .msg {
    margin-top: 12px; padding: 10px 12px; border-radius: 6px;
    font-size: 13px; display: none;
  }
  .msg.error   { display: block; background: #fee; color: #c00; border: 1px solid #fcc; }
  .msg.success { display: block; background: #efe; color: #060; border: 1px solid #cfc; }
  .msg.info    { display: block; background: #eef; color: #006; border: 1px solid #ccf; }
  .footer-note { margin-top: 16px; font-size: 11px; color: #888; text-align: center; }
  .footer-note a { color: #007aff; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-logo">PV</div>
    <div>
      <div class="brand-name">PROVA Systems</div>
      <div class="brand-tag">Bauschaden-SVs · KI-nativ · DSGVO-clean</div>
    </div>
  </div>
  <h1>Willkommen zurück</h1>
  <p class="subtitle">Melde dich mit deinem Account an oder registriere dich.</p>

  <div class="tabs">
    <button class="tab active" data-tab="login" type="button">Anmelden</button>
    <button class="tab" data-tab="signup" type="button">Registrieren</button>
    <button class="tab" data-tab="reset" type="button">Passwort?</button>
  </div>

  <!-- LOGIN -->
  <form id="login-form" class="active" autocomplete="on">
    <label for="login-email">Email</label>
    <input id="login-email" name="email" type="email" required autocomplete="username" placeholder="marcel.schreiber@prova-systems.de">
    <label for="login-password">Passwort</label>
    <input id="login-password" name="password" type="password" required autocomplete="current-password">
    <button type="submit">Einloggen</button>
  </form>

  <!-- SIGN-UP -->
  <form id="signup-form" autocomplete="on">
    <label for="signup-name">Name</label>
    <input id="signup-name" name="name" type="text" required autocomplete="name">
    <label for="signup-email">Email</label>
    <input id="signup-email" name="email" type="email" required autocomplete="email">
    <label for="signup-password">Passwort (min. 8 Zeichen)</label>
    <input id="signup-password" name="password" type="password" required autocomplete="new-password" minlength="8">
    <button type="submit">Account anlegen</button>
  </form>

  <!-- RESET -->
  <form id="reset-form" autocomplete="on">
    <label for="reset-email">Email</label>
    <input id="reset-email" name="email" type="email" required autocomplete="email">
    <button type="submit">Reset-Link senden</button>
  </form>

  <div id="msg" class="msg" role="status" aria-live="polite"></div>

  <div class="footer-note">
    Klassischer Login (Netlify Identity, parallel bis Cutover): <a href="/app-login.html">/app-login.html</a><br>
    <span style="font-size:10px; color: var(--gray-400);">© PROVA Systems · <a href="/datenschutz.html" style="color:var(--gray-400)">Datenschutz</a> · <a href="/impressum.html" style="color:var(--gray-400)">Impressum</a></span>
  </div>
</div>

<!-- Reihenfolge wichtig: Config muss VOR den ESM-Modulen geladen sein -->
<script src="/lib/prova-config.js"></script>
<script type="module" src="/auth-supabase-logic.js"></script>
</body>
</html>

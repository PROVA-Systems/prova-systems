<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefe · PROVA</title>

<!-- K-UI/Item 3: Briefe-Page (11 Korrespondenz-Templates K-01..K-09) -->
<script src="/lib/prova-config.js"></script>
<script src="prova-notifications.js" defer></script>
<script src="prova-sanitize.js"></script>
<script src="theme.js"></script>
<script src="prova-layout.config.js"></script>
<link rel="stylesheet" href="mobile.css">
<link rel="stylesheet" href="prova-design.css">
<link rel="stylesheet" href="page-template.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="nav.js" defer></script>

<style>
:root {
  --primary: #1a3a6b;
  --accent: #3b82f6;
  --muted: #64748b;
  --bg: #0b0d11; --bg2: #111318; --bg3: #161a22;
  --surface: #1c2130; --surface2: #232a3a;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.11);
  --text: #eaecf4; --text2: #8b93ab; --text3: #4d5568;
  --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.55;
}
input, select, textarea { font-size: max(16px, 1em); }
.app-shell { display: flex; min-height: 100vh; }

.briefe-grid {
  display: grid; grid-template-columns: 320px 1fr; gap: 14px;
  align-items: start;
}
@media (max-width: 900px) { .briefe-grid { grid-template-columns: 1fr; } }

/* ── Brief-Cards ── */
.brief-cards { display: flex; flex-direction: column; gap: 6px; }
.brief-card-group {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text3); margin: 8px 4px 4px;
}
.brief-card {
  display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: all .14s;
  text-align: left;
}
.brief-card:hover { background: var(--surface2); border-color: var(--accent); }
.brief-card.active { border-color: var(--accent); background: rgba(59,130,246,0.08); }
.brief-card .icon {
  font-size: 18px; line-height: 1; flex-shrink: 0;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  background: var(--bg3); border-radius: 6px;
}
.brief-card-text { flex: 1; min-width: 0; }
.brief-card-title { font-size: 13px; font-weight: 600; color: var(--text); }
.brief-card-key { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }

/* ── Form-Panel ── */
.form-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 18px;
}
.form-panel-empty {
  padding: 60px 20px; text-align: center; color: var(--text3);
}
.form-panel-empty .icon { font-size: 36px; margin-bottom: 8px; }
.form-section { margin-bottom: 14px; }
.form-section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text2); margin-bottom: 8px;
  border-bottom: 1px solid var(--border); padding-bottom: 4px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid.single { grid-template-columns: 1fr; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
.form-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text3); margin-bottom: 5px; display: block;
}
.form-label .req { color: var(--danger); }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 11px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 7px;
  color: var(--text); font-family: inherit; outline: none; transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 70px; font-family: inherit; }
.form-hint { font-size: 11px; color: var(--text3); margin-top: 3px; }

.btn-primary {
  padding: 11px 22px; background: var(--accent); color: #fff; border: 0;
  border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
}
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary {
  padding: 9px 16px; background: rgba(255,255,255,0.06); color: var(--text);
  border: 1px solid var(--border2); border-radius: 7px;
  font-size: 13px; font-weight: 500; cursor: pointer;
}

.form-actions {
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border);
}

.toast {
  position: fixed; bottom: 20px; right: 20px; padding: 12px 18px;
  border-radius: 8px; font-size: 13px; font-weight: 500;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3); z-index: 9999;
  display: none; max-width: 400px;
}
.toast.success { background: var(--success); color: #fff; }
.toast.error { background: var(--danger); color: #fff; }
.toast.info { background: var(--accent); color: #fff; }

.result-card {
  padding: 14px; background: rgba(16,185,129,0.08);
  border: 1px solid var(--success); border-radius: 8px;
  margin-bottom: 14px;
}
.result-card a {
  color: var(--success); font-weight: 600; text-decoration: none;
  font-size: 13px;
}
.result-card a:hover { text-decoration: underline; }
</style>
</head>
<body data-page="briefe">
<div class="app-shell" id="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="sb-overlay" id="sb-overlay" onclick="closeMobileSidebar()"></div>
  <div class="main-wrap" id="main-wrap">

    <header class="topbar">
      <div class="topbar-left">
        <button class="burger" onclick="openMobileSidebar()"><span></span><span></span><span></span></button>
        <div class="page-breadcrumb"><span>PROVA</span><span class="page-breadcrumb-sep">›</span><strong>Briefe</strong></div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-hero">
        <h1 class="page-title">Briefe</h1>
        <p class="page-subtitle">9 Standard-Korrespondenz-Vorlagen mit deinem Briefkopf, Stempel und Unterschrift. PDF wird in der Akte gespeichert.</p>
      </div>

      <div class="briefe-grid">
        <!-- LEFT: Brief-Cards -->
        <div class="brief-cards" id="brief-cards"></div>

        <!-- RIGHT: Form-Panel -->
        <div class="form-panel" id="form-panel">
          <div class="form-panel-empty">
            <div class="icon">✉️</div>
            <div style="font-weight:600; margin-bottom:4px; color:var(--text2);">Brief auswählen</div>
            <div style="font-size:12px;">Wähle links eine Vorlage, fülle die Felder rechts aus und generiere das PDF.</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="/briefe-logic.js"></script>
</body>
</html>

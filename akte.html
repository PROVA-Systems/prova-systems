<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PROVA Akte</title>
<link rel="stylesheet" href="prova-nav.css">
<style>
body{margin:0;background:#0d0f14;color:#cbd5e1;font-family:system-ui} .main{max-width:1050px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0} .tab{border:1px solid #2b3342;background:#111827;color:#d1d5db;padding:8px 12px;border-radius:999px;cursor:pointer}
.tab.on{background:#1d4ed8;border-color:#3b82f6;color:#fff} .card{background:#111827;border:1px solid #2b3342;border-radius:12px;padding:14px;margin-bottom:10px}
input,textarea,select{width:100%;padding:9px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#fff}
table{width:100%;border-collapse:collapse} th,td{padding:8px;border-bottom:1px solid #2b3342;text-align:left}
.btn{padding:8px 12px;border-radius:8px;border:1px solid #475569;background:#1f2937;color:#fff;cursor:pointer}
</style>
</head>
<body>
<script src="prova-account-gate.js"></script>
<script src="paket-guard.js"></script>
<script src="prova-auth-api.js"></script>
<script src="prova-airtable-api.js"></script>
<script src="nav.js" defer></script>
<div id="provaDrawerMount"></div><nav id="provaBottomNav"></nav>
<main class="main">
  <h1>Akte</h1>
  <label>Aktenzeichen</label>
  <input id="az" placeholder="PROVA-2026-001">
  <div class="tabs">
    <button class="tab on" data-tab="ue">📋 Überblick</button>
    <button class="tab" data-tab="gu">📄 Gutachten</button>
    <button class="tab" data-tab="re">💶 Rechnung</button>
    <button class="tab" data-tab="te">📅 Termine</button>
    <button class="tab" data-tab="ko">📧 Kommunikation</button>
    <button class="tab" data-tab="un">🗂️ Unterlagen</button>
    <button class="tab" data-tab="no">📝 Notizen</button>
  </div>
  <section class="card" id="p-ue"></section>
  <section class="card" id="p-gu" style="display:none"></section>
  <section class="card" id="p-re" style="display:none"></section>
  <section class="card" id="p-te" style="display:none"></section>
  <section class="card" id="p-ko" style="display:none"></section>
  <section class="card" id="p-un" style="display:none"></section>
  <section class="card" id="p-no" style="display:none">
    <textarea id="fallNotiz" rows="7" placeholder="Interne Notiz..."></textarea>
    <button class="btn" id="saveNotiz">Notiz speichern</button>
  </section>
</main>
<script>
(function(){
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function sv(){return (window.PROVA_AIRTABLE&&PROVA_AIRTABLE.getSvEmail&&PROVA_AIRTABLE.getSvEmail())||(localStorage.getItem('prova_sv_email')||'').trim().toLowerCase();}
  function q(id){return document.getElementById(id);}
  function formula(az){return 'AND({AZ}="'+String(az).replace(/"/g,'\\"')+'",{sv_email}="'+String(sv()).replace(/"/g,'\\"')+'")';}
  var az = new URLSearchParams(location.search).get('az') || localStorage.getItem('prova_letztes_az') || '';
  q('az').value = az;
  q('az').addEventListener('change', function(){localStorage.setItem('prova_letztes_az', q('az').value.trim()); loadAll();});
  document.querySelectorAll('.tab').forEach(function(b){b.onclick=function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});b.classList.add('on');['ue','gu','re','te','ko','un','no'].forEach(function(k){q('p-'+k).style.display=k===b.dataset.tab?'block':'none';});};});

  async function loadFall(){
    var a=q('az').value.trim(); if(!a||!window.PROVA_AIRTABLE)return;
    var path='/v0/'+PROVA_AIRTABLE.BASE+'/'+PROVA_AIRTABLE.TABLE_FAELLE+'?maxRecords=1&filterByFormula='+encodeURIComponent(formula(a));
    var r=await PROVA_AIRTABLE.fetchJson('GET',path); var f=((r.records||[])[0]||{}).fields||{};
    q('p-ue').innerHTML='<b>Status:</b> '+esc(f.Status||'—')+'<br><b>Auftraggeber:</b> '+esc(f.Auftraggeber_Name||f.Auftraggeber||'—')+'<br><b>Objekt:</b> '+esc(f.Objekt_Adresse||'—');
    q('p-gu').innerHTML='<a href="stellungnahme.html?az='+encodeURIComponent(a)+'">Zu Stellungnahme</a><br><a href="freigabe.html?az='+encodeURIComponent(a)+'">Zur Freigabe</a><br><b>Freigabe-Status:</b> '+esc(f.Status||'—')+(f.PDF_URL?'<br><a target="_blank" href="'+esc(f.PDF_URL)+'">PDF öffnen</a>':'');
    q('p-un').innerHTML='<button class="btn" onclick="location.href=\'nachforderung-unterlagen.html?az='+encodeURIComponent(a)+'\'">Unterlagen anfordern</button><div style="margin-top:8px">Tracking: angefordert/erhalten in Notizen dokumentieren.</div>';
    q('fallNotiz').value = f.Notizen || '';
  }
  async function loadRechnungen(){
    var a=q('az').value.trim(); if(!a||!window.PROVA_AIRTABLE)return;
    var p='/v0/'+PROVA_AIRTABLE.BASE+'/'+PROVA_AIRTABLE.TABLE_RECHNUNGEN+'?maxRecords=50&filterByFormula='+encodeURIComponent(formula(a));
    var r=await PROVA_AIRTABLE.fetchJson('GET',p); var rows=(r.records||[]).map(function(x){return x.fields||{}});
    q('p-re').innerHTML='<a href="rechnungen.html?az='+encodeURIComponent(a)+'">Rechnung erstellen</a><table><thead><tr><th>Nr.</th><th>Status</th><th>Betrag</th></tr></thead><tbody>'+(rows.map(function(f){return '<tr><td>'+esc(f.Rechnungsnummer||f.rechnungsnummer||'—')+'</td><td>'+esc(f.Status||'—')+'</td><td>'+esc(f.Brutto||f.Betrag||'—')+'</td></tr>';}).join('')||'<tr><td colspan="3">Keine Rechnungen</td></tr>')+'</tbody></table>';
  }
  async function loadTermine(){
    var a=q('az').value.trim(); if(!a||!window.PROVA_AIRTABLE)return;
    var p='/v0/'+PROVA_AIRTABLE.BASE+'/'+PROVA_AIRTABLE.TABLE_TERMINE+'?maxRecords=50&filterByFormula='+encodeURIComponent(formula(a));
    var r=await PROVA_AIRTABLE.fetchJson('GET',p); var rows=(r.records||[]).map(function(x){return x.fields||{}});
    q('p-te').innerHTML='<button class="btn" onclick="location.href=\'termine.html?az='+encodeURIComponent(a)+'\'">Termin hinzufügen</button><table><thead><tr><th>Datum</th><th>Typ</th><th>Ort</th></tr></thead><tbody>'+(rows.map(function(f){return '<tr><td>'+esc(f.Datum||'—')+' '+esc(f.Uhrzeit||'')+'</td><td>'+esc(f.Typ||'—')+'</td><td>'+esc(f.Ort||'—')+'</td></tr>';}).join('')||'<tr><td colspan="3">Keine Termine</td></tr>')+'</tbody></table>';
  }
  async function loadKomm(){
    var a=q('az').value.trim(); if(!a||!window.PROVA_AIRTABLE)return;
    var p='/v0/'+PROVA_AIRTABLE.BASE+'/'+PROVA_AIRTABLE.TABLE_BRIEFE+'?maxRecords=50&filterByFormula='+encodeURIComponent(formula(a));
    var r=await PROVA_AIRTABLE.fetchJson('GET',p); var rows=(r.records||[]).map(function(x){return x.fields||{}});
    q('p-ko').innerHTML='<button class="btn" onclick="location.href=\'briefvorlagen.html?az='+encodeURIComponent(a)+'\'">Brief schreiben</button><table><thead><tr><th>Datum</th><th>Typ</th><th>Empfänger</th><th>Status</th></tr></thead><tbody>'+(rows.map(function(f){return '<tr><td>'+esc(f.Gesendet_Am||'—')+'</td><td>'+esc(f.Typ||'—')+'</td><td>'+esc(f.Empfaenger||'—')+'</td><td>'+esc(f.Status||'—')+'</td></tr>';}).join('')||'<tr><td colspan="4">Keine Einträge</td></tr>')+'</tbody></table>';
  }
  q('saveNotiz').onclick=async function(){
    var a=q('az').value.trim(); if(!a||!window.PROVA_AIRTABLE) return;
    var gp='/v0/'+PROVA_AIRTABLE.BASE+'/'+PROVA_AIRTABLE.TABLE_FAELLE+'?maxRecords=1&filterByFormula='+encodeURIComponent(formula(a));
    var g=await PROVA_AIRTABLE.fetchJson('GET',gp); var rec=(g.records||[])[0]; if(!rec) return alert('Fall nicht gefunden');
    await PROVA_AIRTABLE.fetchJson('PATCH','/v0/'+PROVA_AIRTABLE.BASE+'/'+PROVA_AIRTABLE.TABLE_FAELLE+'/'+rec.id,{fields:{Notizen:q('fallNotiz').value}});
    alert('Notiz gespeichert');
  };
  async function loadAll(){await loadFall();await loadRechnungen();await loadTermine();await loadKomm();}
  loadAll();
})();
</script>
</body>
</html>

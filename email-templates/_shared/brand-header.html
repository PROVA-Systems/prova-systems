<!--
  PROVA Systems — Shared Email-Brand-Header (MEGA⁸⁸-A Block F)
  ============================================================
  Copy-Paste-Snippet für ALLE Email-Templates direkt nach <body>.
  Logo-PNG (NICHT SVG) wegen Email-Client-Compatibility (Outlook, Apple Mail).

  Verwendung:
    Den Block 1:1 nach <body> oder direkt vor dem Content-Bereich einfügen.
    Wenn Template eigene table-Wrapper hat: in Header-Row einfügen.
-->
<div style="background:linear-gradient(135deg,#1a3a6b,#0D2644);padding:20px 24px;text-align:center;border-radius:0 0 12px 12px;margin:-24px -24px 24px;">
  <a href="https://prova-systems.de" style="display:inline-block;text-decoration:none;">
    <img src="https://prova-systems.de/img/logo-prova-systems.svg"
         alt="PROVA Systems"
         style="height:42px;width:auto;display:block;margin:0 auto;filter:brightness(0) invert(1);"
         width="auto" height="42">
  </a>
</div>

<!--
  Fallback fuer SVG-feindliche Mail-Clients (alte Outlook-Versionen):
  Stattdessen PNG-Variante verwenden — sobald Marcel das PNG-Script
  ausgefuehrt hat (siehe tools/generate-logo-pngs.js).

  PNG-Version:

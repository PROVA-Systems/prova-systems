<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PROVA">
  <meta name="theme-color" content="#111827">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PROVA — Zur Freigabe</title>
  <script src="prova-preise.js"></script>
  <script src="paket-guard.js"></script>
  <script src="prova-fetch-auth.js"></script>
<script src="auth-guard.js"></script>
<script src="prova-notifications.js" defer></script>
  <script src="prova-auth-api.js"></script>
  <script src="prova-sv-airtable.js"></script>
  <script src="theme.js"></script>
  <script src="prova-layout.config.js"></script>
  <script src="prova-api.js"></script>
  <script src="nav.js" defer></script>
  <script src="trial-guard.js" defer></script>
  <style>
:root{
  --bg:#0b0d11;--bg2:#111318;--bg3:#161a22;
  --surface:#1c2130;--surface2:#232a3a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#eaecf4;--text2:#8b93ab;--text3:#4d5568;
  --accent:#4f8ef7;--accent2:#3a7be0;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;
  --font-ui:'DM Sans',system-ui,sans-serif;
  --font-mono:ui-monospace,Consolas,monospace;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;
  --topbar-h:56px;--sb-w:228px;--sb-w-col:56px;
}
html{font-size:14px;}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.55;}
</style>
<link rel="stylesheet" href="prova-design.css">
  <link rel="stylesheet" href="mobile.css">
</head>
<body data-page="freigabe-queue">
<div class="app-shell" id="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="sb-overlay" id="sb-overlay" onclick="closeMobileSidebar()"></div>
  <div class="main-wrap" id="main-wrap">

    <header class="topbar">
      <div class="topbar-left">
        <button class="burger" onclick="openMobileSidebar()"><span></span><span></span><span></span></button>
        <div class="breadcrumb">
          <span>PROVA</span>
          <span style="color:var(--text3)">›</span>
          <strong>Zur Freigabe</strong>
        </div>
      </div>
    </header>

    <div class="page-content">
      <div style="max-width:860px;margin:0 auto;">

        <div style="margin-bottom:24px;">
          <h1 style="font-size:22px;font-weight:700;color:var(--text);margin:0 0 6px;">
            ✅ Zur Freigabe
          </h1>
          <p style="font-size:13px;color:var(--text3);margin:0;">
            Gutachten die fertig geschrieben sind und auf Ihre Freigabe + PDF-Versand warten.
          </p>
        </div>

        <div id="fq-loading" style="text-align:center;padding:64px;color:var(--text3);font-size:13px;">
          <div style="font-size:32px;margin-bottom:12px;">⏳</div>
          Fälle werden geladen…
        </div>

        <div id="fq-empty" style="display:none;text-align:center;padding:64px 24px;">
          <div style="font-size:48px;margin-bottom:16px;">✅</div>
          <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;">Alles erledigt</div>
          <div style="font-size:13px;color:var(--text3);">
            Keine Gutachten warten auf Freigabe.<br>
            Neue Fälle starten Sie über <a href="vor-ort.html" style="color:var(--accent);">+ Neuer Fall</a>.
          </div>
        </div>

        <div id="fq-liste"></div>

      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var AT_BASE   = 'appJ7bLlAHZoxENWE';
  var AT_FAELLE = 'tblSxV8bsXwd1pwa0';

  function zeigeLoading(ja) {
    document.getElementById('fq-loading').style.display = ja ? 'block' : 'none';
  }
  function zeigeEmpty(ja) {
    document.getElementById('fq-empty').style.display = ja ? 'block' : 'none';
  }

  function renderFall(f) {
    var az       = f.Aktenzeichen || f.Schadensnummer || '—';
    var sa       = f.Schadensart  || '—';
    var adr      = f.Adresse_Schadensort || '—';
    var erstellt = f.erstellt_am  ? new Date(f.erstellt_am).toLocaleDateString('de-DE') : '—';
    var ag       = f.Auftraggeber_Name || '—';

    var card = document.createElement('div');
    card.style.cssText = [
      'background:var(--surface);border:1px solid var(--border);border-radius:14px',
      'padding:18px 20px;margin-bottom:12px;display:flex;align-items:center',
      'justify-content:space-between;gap:16px;transition:border-color .15s'
    ].join(';');
    card.onmouseover = function() { this.style.borderColor = 'var(--accent)'; };
    card.onmouseout  = function() { this.style.borderColor = 'var(--border)'; };

    card.innerHTML =
      '<div style="flex:1;min-width:0;">' +
        '<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;">' +
          '<span style="background:rgba(79,142,247,.12);color:var(--accent);padding:2px 8px;border-radius:6px;font-size:12px;margin-right:8px;">' + az + '</span>' +
          sa +
        '</div>' +
        '<div style="font-size:12px;color:var(--text3);">' +
          '\u{1F464} ' + ag + ' &nbsp;·&nbsp; \u{1F4CD} ' + adr + ' &nbsp;·&nbsp; \u{1F4C5} ' + erstellt +
        '</div>' +
      '</div>' +
      '<a href="freigabe.html?az=' + encodeURIComponent(az) + '" ' +
        'style="background:var(--accent);color:#fff;padding:9px 18px;border-radius:10px;' +
        'font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;">' +
        '\u2705 Jetzt freigeben \u2192' +
      '</a>';

    return card;
  }

  async function ladeFaelle() {
    var svEmail = localStorage.getItem('prova_sv_email') || '';
    if (!svEmail) { zeigeLoading(false); zeigeEmpty(true); return; }

    try {
      var headers = { 'Content-Type': 'application/json' };
      if (window.provaAuthHeaders) Object.assign(headers, window.provaAuthHeaders());

      var fields = ['Aktenzeichen','Schadensart','Auftraggeber_Name','Adresse_Schadensort','erstellt_am','sv_email','Status','Phase'];
      // Phase kann Zahl oder Text sein — beide versuchen
      var filterText = encodeURIComponent('AND({Phase}="5",{sv_email}="' + svEmail + '")');
      var filterNum  = encodeURIComponent('AND({Phase}=5,{sv_email}="' + svEmail + '")');
      // Nutze Nummer-Filter (häufiger korrekt in Airtable)
      var filter = filterNum;
      var path = '/v0/' + AT_BASE + '/' + AT_FAELLE +
                 '?filterByFormula=' + filter +
                 '&sort[0][field]=erstellt_am&sort[0][direction]=desc&maxRecords=50' +
                 fields.map(function(f){ return '&fields[]=' + encodeURIComponent(f); }).join('');

      var res  = await provaFetch('/.netlify/functions/airtable', {
        method: 'POST', headers: headers,
        body: JSON.stringify({ method: 'GET', path: path })
      });
      var data = await res.json();
      var records = data.records || [];

      zeigeLoading(false);

      if (records.length === 0) { zeigeEmpty(true); return; }

      var liste = document.getElementById('fq-liste');
      records.forEach(function(rec) {
        liste.appendChild(renderFall(rec.fields || {}));
      });

    } catch(e) {
      zeigeLoading(false);
      document.getElementById('fq-liste').innerHTML =
        '<div style="color:#ef4444;padding:24px;text-align:center;">Fehler beim Laden — bitte Seite neu laden.</div>';
    }
  }

  document.addEventListener('DOMContentLoaded', ladeFaelle);
})();
</script>
<script src="sw-register.js" defer></script>
</body>
</html>

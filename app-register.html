<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Registrieren · PROVA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d11;--bg2:#111318;--surface:#1c2130;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#eaecf4;--text2:#8b93ab;--text3:#4d5568;
  --accent:#4f8ef7;--accent2:#3a7be0;
  --success:#10b981;--danger:#ef4444;
  --font-ui:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(79,142,247,0.06) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 20%,rgba(167,139,250,0.04) 0%,transparent 50%);}
.card{width:100%;max-width:440px;}
.logo{font-weight:800;font-size:26px;color:var(--text);text-align:center;margin-bottom:6px;letter-spacing:-0.02em;}
.logo span{color:var(--accent);}
.subtitle{font-size:12px;color:var(--text3);text-align:center;letter-spacing:.08em;text-transform:uppercase;margin-bottom:32px;}
.form-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:28px;}
.form-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.form-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.form-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:var(--font-ui);outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text3);}
.btn{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:var(--font-ui);transition:all .2s;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,142,247,.4);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{font-size:12px;color:var(--danger);margin-bottom:12px;padding:8px 12px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:6px;display:none;}
.trial-badge{text-align:center;margin-top:16px;padding:10px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:8px;font-size:12px;color:var(--success);}
.login-link{text-align:center;margin-top:16px;font-size:13px;color:var(--text3);}
.login-link a{color:var(--accent);text-decoration:none;}
.login-link a:hover{text-decoration:underline;}
.pw-strength{height:3px;border-radius:2px;margin-top:6px;transition:all .3s;}
.features{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}
.feat{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);}
.feat-icon{color:var(--success);}
@media(max-width:480px){.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">PRO<span>VA</span></div>
  <div class="subtitle">14 Tage kostenlos testen</div>
  <div class="form-box">
    <div class="form-title">Konto erstellen</div>
    <div class="form-sub">Sofort loslegen — keine Kreditkarte nötig.</div>
    <div class="err" id="err"></div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Vorname *</label>
        <input class="form-input" id="r-vorname" type="text" placeholder="Max" autocomplete="given-name">
      </div>
      <div class="form-group">
        <label class="form-label">Nachname *</label>
        <input class="form-input" id="r-nachname" type="text" placeholder="Müller" autocomplete="family-name">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">E-Mail *</label>
      <input class="form-input" id="r-email" type="email" placeholder="max@sachverstaendiger.de" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Passwort *</label>
      <input class="form-input" id="r-passwort" type="password" placeholder="Mindestens 8 Zeichen" autocomplete="new-password" oninput="checkPwStrength()">
      <div class="pw-strength" id="pw-strength"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Passwort bestätigen *</label>
      <input class="form-input" id="r-passwort2" type="password" placeholder="Passwort wiederholen" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')register()">
    </div>

    <button class="btn" id="btn-reg" onclick="register()">Kostenlos registrieren</button>

    <div class="trial-badge">
      ✅ 14 Tage kostenlos · Solo-Paket · 30 Gutachten/Monat · Alle Werkzeuge
    </div>

    <div class="features">
      <div class="feat"><span class="feat-icon">✓</span> KI-Gutachten</div>
      <div class="feat"><span class="feat-icon">✓</span> Sprach-Diktat</div>
      <div class="feat"><span class="feat-icon">✓</span> Normen-Bibliothek</div>
      <div class="feat"><span class="feat-icon">✓</span> JVEG-Rechner</div>
      <div class="feat"><span class="feat-icon">✓</span> PDF-Export</div>
      <div class="feat"><span class="feat-icon">✓</span> §407a-Compliance</div>
    </div>
  </div>
  <div class="login-link">Bereits registriert? <a href="app-login.html">Zum Login</a></div>
</div>

<script>
function checkPwStrength() {
  var pw = document.getElementById('r-passwort').value;
  var bar = document.getElementById('pw-strength');
  if (!pw) { bar.style.width = '0'; return; }
  var score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  var colors = ['#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'];
  var widths = ['20%','40%','60%','80%','100%'];
  bar.style.width = widths[Math.min(score,4)];
  bar.style.background = colors[Math.min(score,4)];
}

async function register() {
  var vorname = document.getElementById('r-vorname').value.trim();
  var nachname = document.getElementById('r-nachname').value.trim();
  var email = document.getElementById('r-email').value.trim();
  var pw = document.getElementById('r-passwort').value;
  var pw2 = document.getElementById('r-passwort2').value;
  var err = document.getElementById('err');
  var btn = document.getElementById('btn-reg');

  // Validierung
  if (!vorname || !nachname) { showErr('Bitte Vor- und Nachname eingeben.'); return; }
  if (!email || !email.includes('@')) { showErr('Bitte gültige E-Mail eingeben.'); return; }
  if (pw.length < 8) { showErr('Passwort muss mindestens 8 Zeichen lang sein.'); return; }
  if (pw !== pw2) { showErr('Passwörter stimmen nicht überein.'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ Wird erstellt…';
  err.style.display = 'none';

  try {
    // Netlify Identity: Benutzer anlegen
    var res = await fetch('/.netlify/identity/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: email,
        password: pw,
        data: {
          full_name: vorname + ' ' + nachname,
          vorname: vorname,
          nachname: nachname,
          paket: 'Solo',
          trial_start: new Date().toISOString(),
          trial_end: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString()
        }
      })
    });

    if (!res.ok) {
      var errData = await res.json().catch(function() { return {}; });
      if (errData.msg && errData.msg.includes('already')) {
        showErr('Diese E-Mail ist bereits registriert. → Zum Login');
      } else {
        showErr(errData.msg || errData.error_description || 'Registrierung fehlgeschlagen.');
      }
      btn.disabled = false;
      btn.textContent = 'Kostenlos registrieren';
      return;
    }

    var userData = await res.json();

    // Direkt einloggen
    var loginRes = await fetch('/.netlify/identity/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'grant_type=password&username=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(pw)
    });

    if (loginRes.ok) {
      var token = await loginRes.json();
      // Session setzen
      localStorage.setItem('prova_user', JSON.stringify({
        email: email,
        name: vorname + ' ' + nachname,
        vorname: vorname,
        nachname: nachname,
        token: token.access_token
      }));
      localStorage.setItem('prova_sv_email', email);
      localStorage.setItem('prova_sv_name', vorname + ' ' + nachname);
      localStorage.setItem('prova_paket', 'Solo');
      localStorage.setItem('prova_trial_start', new Date().toISOString());

      // Weiterleiten zum Dashboard
      window.location.href = 'dashboard.html';
    } else {
      // Registrierung ok, Login fehlgeschlagen → zum Login schicken
      showErr('Konto erstellt! Bitte loggen Sie sich ein.');
      setTimeout(function() { window.location.href = 'app-login.html'; }, 2000);
    }

  } catch (e) {
    showErr('Verbindungsfehler: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Kostenlos registrieren';
  }
}

function showErr(msg) {
  var el = document.getElementById('err');
  el.innerHTML = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>

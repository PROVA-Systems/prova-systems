<!DOCTYPE html>
<html lang="de">
<head>
<script>
  window.__PROVA_ENV = 'production';
  window.onerror = function(msg, src, line, col, err) {
    if (!navigator.onLine) return;
    fetch('/.netlify/functions/error-log', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        msg: String(msg).slice(0,500),
        src: src, line: line,
        page: window.location.pathname,
        user: localStorage.getItem('prova_sv_email')||'unbekannt',
        ua: navigator.userAgent.slice(0,100),
        ts: new Date().toISOString()
      })
    }).catch(function(){});
  };
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>PROVA — Ortstermin · Foto-KI</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0d0f14;--bg2:#13161d;--text:#e8eaf0;--text2:#9da3b4;--accent:#4f8ef7;--border:rgba(255,255,255,0.08);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text2);min-height:100vh;font-size:14px;}
    .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:var(--text);text-decoration:none;}
    .logo span{color:var(--accent);}
    .topnav a{padding:6px 10px;color:var(--text2);font-size:13px;text-decoration:none;}
    .main{max-width:720px;margin:0 auto;padding:20px;}
    h1{font-family:'Fraunces',serif;color:var(--text);font-size:22px;margin-bottom:8px;}
    .sub{font-size:13px;margin-bottom:16px;line-height:1.5;}
    .card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
    input[type="file"]{margin-bottom:10px;}
    .btn{padding:10px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:rgba(79,142,247,0.25);color:#fff;font-weight:700;cursor:pointer;}
    .btn:disabled{opacity:0.5;}
    .out{font-size:13px;line-height:1.5;background:rgba(0,0,0,0.2);padding:12px;border-radius:8px;margin-top:10px;white-space:pre-wrap;}
    .liste{margin-top:12px;}
    .liste div{border-bottom:1px solid var(--border);padding:10px 0;font-size:13px;}
    canvas{border:1px dashed var(--border);border-radius:8px;max-width:100%;touch-action:none;background:#1a1e28;}
    .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;}.drawer-overlay.open{display:block;}
    .drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);z-index:201;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;}
    .drawer.open{transform:translateX(0);}.drawer-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .drawer-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;}
    .topbar-left{display:flex;align-items:center;gap:14px;}
    .burger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:4px;padding:6px;}
    .burger span{display:block;width:20px;height:2px;background:var(--text2);}
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--bg2);border-top:1px solid var(--border);z-index:100;justify-content:space-around;align-items:stretch;}
    .paket-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
    @media(max-width:900px){.topnav{display:none;}.burger{display:flex;}.bottom-nav{display:flex;}body{padding-bottom:56px;}}
  </style>
  <link rel="stylesheet" href="prova-nav.css">
</head>
<body>
  <script src="prova-account-gate.js"></script>
  <script src="paket-guard.js"></script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>if (typeof netlifyIdentity !== 'undefined') netlifyIdentity.init();</script>
  <script src="prova-auth-api.js"></script>
  <div class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="logo">PRO<span>VA</span></a>
      <nav class="topnav">
        <a href="dashboard.html">Zentrale</a>
        <a href="ortstermin-modus.html" style="color:var(--accent);">Ortstermin</a>
        <a href="archiv.html">Fälle</a>
      </nav>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="paket-badge" id="topbarPaket"></span>
      <a href="einstellungen.html" style="color:var(--text2);text-decoration:none;padding:6px;">⚙</a>
      <button type="button" class="burger" onclick="toggleDrawer()" aria-label="Menü"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <a href="dashboard.html" class="logo">PRO<span>VA</span></a>
      <button type="button" class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div id="provaDrawerMount"></div>
  </div>
  <nav class="bottom-nav" id="provaBottomNav"></nav>
  <script>
  function toggleDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('drawerOverlay');d.classList.toggle('open');o.classList.toggle('open');document.body.style.overflow=d.classList.contains('open')?'hidden':'';}
  function closeDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('drawerOverlay');d.classList.remove('open');o.classList.remove('open');document.body.style.overflow='';}
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDrawer();});
  (function(){if(!window.PROVA)return;var c=PROVA.paketColor();var el=document.getElementById('topbarPaket');if(el){el.textContent=PROVA.paketLabel();el.setAttribute('style','background:'+c+'18;color:'+c+';border:1px solid '+c+'33');}})();
  </script>
  <script src="nav.js" defer></script>
  <main class="main">
    <h1>Ortstermin · Foto-KI</h1>
    <p class="sub">Foto wählen → KI-Beschriftung (gpt-4o) über Netlify-Function. Offline: Fotos sammeln; Analyse bei Netz.</p>
    <div class="card">
      <input type="file" id="foto" accept="image/*" capture="environment">
      <button type="button" class="btn" id="btnAnalyse" disabled>KI-Analyse</button>
      <div id="preview" style="margin-top:10px;max-height:220px;overflow:hidden;border-radius:8px;"></div>
      <div class="out" id="kiOut" style="display:none;"></div>
    </div>
    <div class="card">
      <strong style="color:var(--text);">Skizze (Finger / Maus)</strong>
      <p class="sub" style="margin:8px 0;">Kurze Lage-Skizze; zusätzlich zu Fotos.</p>
      <canvas id="skizze" width="320" height="200"></canvas>
      <button type="button" class="btn" id="btnClear" style="margin-top:8px;">Skizze leeren</button>
    </div>
    <div class="card">
      <strong style="color:var(--text);">Gesammelte Hinweise</strong>
      <div class="liste" id="liste"></div>
    </div>
  </main>
  <script>
  (function(){
    var fileInput = document.getElementById('foto');
    var btn = document.getElementById('btnAnalyse');
    var preview = document.getElementById('preview');
    var kiOut = document.getElementById('kiOut');
    var liste = document.getElementById('liste');
    var lastB64 = '';
    var lastMime = 'image/jpeg';

    fileInput.addEventListener('change', function(){
      try {
        if (!localStorage.getItem('prova_hint_foto_cloud')) {
          alert('Hinweis: Fotos werden verschlüsselt in der Cloud gespeichert. Nur Sie haben Zugriff.');
          localStorage.setItem('prova_hint_foto_cloud', '1');
        }
      } catch (eHint) {}
      var f = fileInput.files && fileInput.files[0];
      btn.disabled = !f;
      preview.innerHTML = '';
      lastB64 = '';
      if (!f) return;
      lastMime = f.type || 'image/jpeg';
      var r = new FileReader();
      r.onload = function(){
        var u8 = new Uint8Array(r.result);
        var bin = '';
        for (var i = 0; i < u8.length; i++) bin += String.fromCharCode(u8[i]);
        lastB64 = btoa(bin);
        preview.innerHTML = '<img src="data:' + lastMime + ';base64,' + lastB64 + '" style="max-width:100%;height:auto;border-radius:8px;" alt="">';
      };
      r.readAsArrayBuffer(f);
    });
    btn.addEventListener('click', function(){
      if (window.PROVA && !PROVA.canUse('ki_foto_analyse')) { PROVA.requirePaket('ki_foto_analyse'); return; }
      if (!lastB64) return;
      kiOut.style.display = 'block';
      kiOut.textContent = 'Analyse läuft…';
      provaFetchKiProxy({ action: 'foto_analyse', imageBase64: lastB64, mimeType: lastMime }).then(function(r){ return r.json(); }).then(function(data){
        if (data.error) { kiOut.textContent = 'Fehler: ' + data.error; return; }
        var t = [
          data.beschreibung || '',
          data.schadenart ? 'Schadenart: ' + data.schadenart : '',
          data.messwert_hinweis ? 'Messung: ' + data.messwert_hinweis : '',
          data.normen_hinweis ? 'Norm: ' + data.normen_hinweis : ''
        ].filter(Boolean).join('\n');
        kiOut.textContent = t || JSON.stringify(data);
        var row = document.createElement('div');
        row.textContent = new Date().toLocaleString('de-DE') + ' — ' + (data.beschreibung || '').slice(0, 200);
        liste.insertBefore(row, liste.firstChild);
      }).catch(function(e){
        kiOut.textContent = 'Netzwerk: ' + (e.message || e);
      });
    });

    var cv = document.getElementById('skizze');
    var ctx = cv.getContext('2d');
    ctx.strokeStyle = '#4f8ef7';
    ctx.lineWidth = 2;
    var draw = false;
    function pos(e) {
      var r = cv.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
      var y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      var sx = cv.width / r.width;
      var sy = cv.height / r.height;
      return { x: x * sx, y: y * sy };
    }
    cv.addEventListener('mousedown', function(e){ draw = true; var p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    cv.addEventListener('mousemove', function(e){ if (!draw) return; var p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    window.addEventListener('mouseup', function(){ draw = false; });
    cv.addEventListener('touchstart', function(e){ e.preventDefault(); draw = true; var p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    cv.addEventListener('touchmove', function(e){ e.preventDefault(); if (!draw) return; var p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    cv.addEventListener('touchend', function(){ draw = false; });
    document.getElementById('btnClear').addEventListener('click', function(){
      ctx.fillStyle = '#1a1e28';
      ctx.fillRect(0, 0, cv.width, cv.height);
    });
    ctx.fillStyle = '#1a1e28';
    ctx.fillRect(0, 0, cv.width, cv.height);
  })();
  </script>
</body>
</html>

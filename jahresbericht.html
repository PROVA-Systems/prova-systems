<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROVA — Jahresbericht</title>
  <style>
  :root{
    --bg:#0d0f14;--bg2:#13161d;--bg3:#181b24;
    --surface:#1e2330;--surface2:#242838;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
    --text:#e8eaf0;--text2:#9da3b4;--text3:#6b7280;
    --accent:#4f8ef7;--accent2:#3a7be0;
    --green:#10B981;--green-bg:rgba(16,185,129,0.08);
    --warn:#f59e0b;--purple:#a78bfa;--red:#ef4444;
    --sans:'Instrument Sans',system-ui,sans-serif;
    --display:'Montserrat',sans-serif;
    --radius:10px;--nav-h:52px;--bot-h:60px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:14px;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
  a{text-decoration:none;color:inherit;}
  input,select{font-size:max(16px,1em);}

  /* NAV */
  .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .logo{font-family:var(--display);font-weight:700;font-size:18px;color:var(--text);}
  .logo span{color:var(--accent);}
  .topnav{display:flex;gap:2px;}
  .topnav a{padding:6px 11px;border-radius:6px;color:var(--text3);font-size:13px;font-weight:500;transition:all .15s;min-height:44px;display:inline-flex;align-items:center;white-space:nowrap;}
  .topnav a:hover{color:var(--text2);background:rgba(255,255,255,.04);}
  .settings-link{font-size:16px;color:var(--text3);padding:6px 8px;border-radius:6px;min-height:44px;display:inline-flex;align-items:center;}
  .paket-badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.04em;}
  .burger{display:none;flex-direction:column;gap:4px;background:none;border:none;cursor:pointer;padding:8px;}
  .burger span{width:20px;height:2px;background:var(--text2);border-radius:2px;display:block;}
  .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;}
  .drawer-overlay.open{display:block;}
  .drawer{position:fixed;top:0;right:-280px;width:280px;height:100%;background:var(--bg2);border-left:1px solid var(--border);z-index:300;transition:right .25s;display:flex;flex-direction:column;}
  .drawer.open{right:0;}
  .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
  .drawer-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;}
  .drawer-nav{display:flex;flex-direction:column;padding:12px;flex:1;overflow-y:auto;}
  .drawer-nav a{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:8px;color:var(--text2);font-size:13px;transition:all .12s;}
  .drawer-nav a:hover{color:var(--text);background:rgba(255,255,255,.04);}
  .drawer-footer{padding:12px 18px;border-top:1px solid var(--border);}
  .dnav-icon{font-size:15px;width:20px;text-align:center;}
  .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bot-h);background:var(--bg2);border-top:1px solid var(--border);z-index:100;align-items:stretch;}
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--text3);font-size:10px;font-weight:500;padding:6px 4px;}
  .bn-item.active{color:var(--accent);}
  .bn-icon{font-size:18px;}

  /* MAIN */
  .main{margin:0 auto;padding:24px 20px;}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
  .page-title{font-family:var(--display);font-size:1.4rem;font-weight:800;}
  .page-sub{font-size:0.78rem;color:var(--text3);margin-top:4px;}

  /* YEAR SELECTOR */
  .year-bar{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
  .year-btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-family:var(--sans);transition:all .15s;}
  .year-btn.active{background:rgba(79,142,247,.15);border-color:rgba(79,142,247,.4);color:var(--accent);}
  .btn-export{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:#fff;font-family:var(--sans);}

  /* KPI GRID */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:22px;}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;}
  .kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px;}
  .kpi-val{font-family:var(--display);font-size:1.8rem;font-weight:800;color:var(--text);line-height:1;}
  .kpi-sub{font-size:11px;color:var(--text3);margin-top:5px;}
  .kpi-delta{font-size:11px;font-weight:700;margin-top:4px;}
  .kpi-delta.pos{color:var(--green);}
  .kpi-delta.neg{color:var(--red);}

  /* CARDS */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;}
  .card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);}
  .card-body{padding:16px;}

  /* CHARTS (pure CSS + divs) */
  .bar-chart{display:flex;flex-direction:column;gap:8px;}
  .bar-row{display:flex;align-items:center;gap:10px;font-size:12px;}
  .bar-label{width:90px;color:var(--text2);flex-shrink:0;text-align:right;font-size:11px;}
  .bar-track{flex:1;height:20px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;transition:width .6s ease;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;min-width:24px;}
  .bar-val{width:44px;text-align:right;color:var(--text3);font-size:11px;font-weight:600;}

  /* MONATSCHART */
  .monat-chart{display:flex;align-items:flex-end;gap:6px;height:100px;padding:0 4px;}
  .monat-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .monat-bar{width:100%;border-radius:3px 3px 0 0;background:var(--accent);opacity:.7;transition:height .5s ease;}
  .monat-bar:hover{opacity:1;}
  .monat-label{font-size:9px;color:var(--text3);}
  .monat-val{font-size:9px;color:var(--text2);font-weight:600;}

  /* TABELLE */
  .data-table{width:100%;border-collapse:collapse;font-size:12px;}
  .data-table th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);}
  .data-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text2);}
  .data-table tr:last-child td{border-bottom:none;}
  .data-table tr:hover td{background:rgba(255,255,255,.02);}
  .tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}

  /* LOADING */
  .spinner{width:32px;height:32px;border:3px solid rgba(79,142,247,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-msg{text-align:center;color:var(--text3);font-size:13px;margin-top:8px;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;z-index:600;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;background:var(--bg2);border:1px solid rgba(16,185,129,.4);color:var(--green);transition:all .3s;opacity:0;transform:translateY(8px);}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.err{border-color:rgba(239,68,68,.4);color:var(--red);}

  @media(max-width:900px){.topnav a{font-size:0;}.topnav a::after{content:attr(data-short);font-size:12px;font-family:var(--sans);font-weight:500;}.paket-badge{display:none;}}
  @media(max-width:600px){.topnav{display:none;}.settings-link{display:none;}.burger{display:flex;}.bottom-nav{display:flex;}body{padding-bottom:var(--bot-h);}.topbar{padding:0 14px;height:48px;}.main{padding:14px 12px;}.kpi-grid{grid-template-columns:repeat(2,1fr);}#charts-row,#status-row{grid-template-columns:1fr!important;}}
  ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

  @media print{
    .topbar,.burger,.bottom-nav,.year-bar .btn-export,.drawer,.drawer-overlay{display:none!important;}
    body{background:#fff!important;color:#000!important;}
    .card,.kpi-card{background:#fff!important;border-color:#e5e7eb!important;}
    .kpi-val,.card-title,.kpi-label{color:#000!important;}
    .data-table td,.data-table th{color:#333!important;}
  }
  
/* ── LAYOUT FIX ── */
.app-shell{display:flex;width:100%;min-height:100vh;overflow:hidden;}
.main-wrap,.main{flex:1;min-width:0;overflow-x:hidden;}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // PDF-Export Button
  var btn = document.createElement('button');
  btn.className = 'btn-pdf-export no-print';
  btn.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:100;display:flex;align-items:center;gap:8px;padding:12px 20px;background:linear-gradient(135deg,#1a3a5c,#2563eb);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(26,58,92,.4);font-family:inherit;';
  btn.innerHTML = '📄 Als PDF exportieren';
  btn.onclick = function() {
    btn.style.display = 'none';
    document.title = 'PROVA Jahresbericht ' + new Date().getFullYear();
    window.print();
    setTimeout(function(){ btn.style.display = ''; }, 1000);
  };
  document.body.appendChild(btn);
});
</script>

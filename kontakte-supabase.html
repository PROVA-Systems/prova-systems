<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakte · PROVA</title>

<!-- K-UI/Item 2: Kontakte-Page (Pattern A, ESM, Supabase) -->
<script src="/lib/prova-config.js"></script>
<script src="prova-notifications.js" defer></script>
<script src="prova-sanitize.js"></script>
<script src="theme.js"></script>
<script src="prova-layout.config.js"></script>
<link rel="stylesheet" href="mobile.css">
<link rel="stylesheet" href="prova-design.css">
<link rel="stylesheet" href="page-template.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="nav.js" defer></script>

<style>
:root {
  --primary: #1a3a6b;
  --accent: #3b82f6;
  --muted: #64748b;
  --bg: #0b0d11; --bg2: #111318; --bg3: #161a22;
  --surface: #1c2130; --surface2: #232a3a;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.11);
  --text: #eaecf4; --text2: #8b93ab; --text3: #4d5568;
  --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.55;
}
input, select, textarea { font-size: max(16px, 1em); }
.app-shell { display: flex; min-height: 100vh; }

/* ── Toolbar (Suche + Filter + Neu) ── */
.kontakte-toolbar {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  padding: 12px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 14px;
}
.kontakte-search {
  flex: 1; min-width: 240px; padding: 9px 12px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text); font-family: inherit; outline: none; transition: border-color .15s;
}
.kontakte-search:focus { border-color: var(--accent); }
.kontakte-filter {
  padding: 9px 12px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text); font-family: inherit; outline: none;
}
.btn-primary {
  padding: 9px 16px; background: var(--accent); color: #fff; border: 0;
  border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
  white-space: nowrap;
}
.btn-secondary {
  padding: 9px 16px; background: rgba(255,255,255,0.06); color: var(--text);
  border: 1px solid var(--border2); border-radius: 8px; font-size: 13px;
  font-weight: 500; cursor: pointer;
}
.btn-danger {
  padding: 9px 16px; background: var(--danger); color: #fff; border: 0;
  border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
}

/* ── Liste ── */
.kontakt-row {
  display: grid; grid-template-columns: 110px 1fr 1fr auto;
  gap: 12px; align-items: center;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .12s;
}
.kontakt-row:hover { background: rgba(255,255,255,0.03); }
.kontakt-row:last-child { border-bottom: 0; }
.typ-badge {
  display: inline-block; padding: 2px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
  background: rgba(59,130,246,0.12); color: var(--accent);
  font-family: 'Inter', sans-serif;
}
.typ-badge.gericht { background: rgba(167,139,250,0.12); color: #a78bfa; }
.typ-badge.firma   { background: rgba(245,158,11,0.12); color: var(--warning); }
.typ-badge.behoerde{ background: rgba(16,185,129,0.12); color: var(--success); }
.kontakt-name { font-weight: 600; color: var(--text); font-size: 14px; }
.kontakt-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.kontakt-info { font-size: 12px; color: var(--text2); }
.kontakt-info a { color: var(--text2); text-decoration: none; }
.kontakt-info a:hover { color: var(--accent); }
.kontakt-actions { display: flex; gap: 6px; }
.kontakt-actions .btn-icon {
  padding: 5px 9px; background: transparent; border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text2); font-size: 11px; cursor: pointer;
}
.kontakt-actions .btn-icon:hover { color: var(--accent); border-color: var(--accent); }

.empty-state {
  padding: 40px 20px; text-align: center; color: var(--text3);
}
.empty-state .icon { font-size: 32px; margin-bottom: 8px; }

/* ── Modal (Detail/Create/Edit) ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9000;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-backdrop.visible { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px;
  width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto;
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
.modal-close {
  background: transparent; border: 0; color: var(--text2); font-size: 22px;
  cursor: pointer; line-height: 1; padding: 0 4px;
}
.modal-body { padding: 18px; }
.modal-footer {
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  padding: 14px 18px; border-top: 1px solid var(--border);
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-grid.single { grid-template-columns: 1fr; }
@media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
.form-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text3); margin-bottom: 5px; display: block;
}
.form-input, .form-select {
  width: 100%; padding: 9px 12px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 7px;
  color: var(--text); font-family: inherit; outline: none;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }

.toast {
  position: fixed; bottom: 20px; right: 20px; padding: 12px 18px;
  border-radius: 8px; font-size: 13px; font-weight: 500;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3); z-index: 9999;
  display: none;
}
.toast.success { background: var(--success); color: #fff; }
.toast.error { background: var(--danger); color: #fff; }
.toast.info { background: var(--accent); color: #fff; }

@media (max-width: 768px) {
  .kontakt-row { grid-template-columns: 1fr; }
  .kontakt-actions { justify-content: flex-end; }
}
</style>
</head>
<body data-page="kontakte-supabase">
<div class="app-shell" id="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="sb-overlay" id="sb-overlay" onclick="closeMobileSidebar()"></div>
  <div class="main-wrap" id="main-wrap">

    <header class="topbar">
      <div class="topbar-left">
        <button class="burger" onclick="openMobileSidebar()"><span></span><span></span><span></span></button>
        <div class="page-breadcrumb"><span>PROVA</span><span class="page-breadcrumb-sep">›</span><strong>Kontakte</strong></div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-hero">
        <h1 class="page-title">Kontakte</h1>
        <p class="page-subtitle">Personen, Firmen, Gerichte und Behörden — wiederverwendbar als Empfänger oder Auftraggeber.</p>
      </div>

      <div class="kontakte-toolbar">
        <input type="search" class="kontakte-search" id="search" placeholder="Suchen (Name, E-Mail, Ort, Firma)…" autocomplete="off">
        <select class="kontakte-filter" id="filter-typ">
          <option value="">Alle Typen</option>
          <option value="privat">Privatperson</option>
          <option value="firma">Firma</option>
          <option value="anwalt">Anwalt</option>
          <option value="versicherung">Versicherung</option>
          <option value="gericht">Gericht</option>
          <option value="behoerde">Behörde</option>
          <option value="handwerker">Handwerker</option>
          <option value="sv_kollege">SV-Kollege</option>
        </select>
        <button class="btn-primary" id="btn-new" type="button">+ Neuer Kontakt</button>
      </div>

      <div class="page-card">
        <div id="kontakte-list">
          <div class="empty-state"><div class="icon">⏳</div><div>Lade Kontakte …</div></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- ─── Modal: Create / Edit ─────────────────────────────────── -->
<div class="modal-backdrop" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Neuer Kontakt</div>
      <button class="modal-close" id="modal-cancel" type="button" aria-label="Schliessen">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div>
          <label class="form-label" for="k-typ">Typ</label>
          <select class="form-select" id="k-typ">
            <option value="privat">Privatperson</option>
            <option value="firma">Firma / Bauunternehmen</option>
            <option value="anwalt">Anwalt</option>
            <option value="versicherung">Versicherung</option>
            <option value="gericht">Gericht</option>
            <option value="behoerde">Behörde</option>
            <option value="handwerker">Handwerker</option>
            <option value="sv_kollege">SV-Kollege</option>
            <option value="sonstiges">Sonstiges</option>
          </select>
        </div>
        <div>
          <label class="form-label" for="k-anrede">Anrede</label>
          <select class="form-select" id="k-anrede">
            <option value="">—</option>
            <option value="Herr">Herr</option>
            <option value="Frau">Frau</option>
            <option value="Familie">Familie</option>
          </select>
        </div>
      </div>

      <!-- Person-Felder (bei Privat/Anwalt-Ansprechpartner immer; bei Firma/Behörde optional als Ansprechpartner) -->
      <div class="form-grid" data-section="person">
        <div><label class="form-label" for="k-titel">Titel</label><input type="text" id="k-titel" class="form-input" placeholder="Dr."></div>
        <div><label class="form-label" for="k-vorname">Vorname</label><input type="text" id="k-vorname" class="form-input"></div>
      </div>
      <div class="form-grid" data-section="person">
        <div><label class="form-label" for="k-nachname">Nachname</label><input type="text" id="k-nachname" class="form-input"></div>
        <div></div>
      </div>

      <!-- Firma/Kanzlei-Felder (bei firma/anwalt/versicherung/gericht/behoerde/handwerker/sv_kollege Pflicht).
           Bei typ=anwalt switcht das Label dynamisch zu "Kanzlei" (Marcel-Korrektur:
           kanzlei ≡ firma fuer Anwaelte, kein zusaetzliches Feld noetig). -->
      <div class="form-grid" data-section="firma" style="display:none;">
        <div>
          <label class="form-label" for="k-firma" id="k-firma-label">Firma / Institution <span style="color:var(--danger);">*</span></label>
          <input type="text" id="k-firma" class="form-input" placeholder="z. B. Müller GmbH">
        </div>
        <div><label class="form-label" for="k-abteilung">Abteilung</label><input type="text" id="k-abteilung" class="form-input" placeholder="z. B. Schadenregulierung"></div>
      </div>

      <!-- HINWEIS: vorgangsspezifische Felder (Schaden-Nr / Vers-Nr / Behoerden-Az)
           gehoeren NICHT in den Stammdaten-Kontakt — kommen in Sprint 06b
           als Conditional-Form im Auftrags-Wizard. -->
      <div data-section="vorgangshinweis" style="display:none; padding:8px 12px; background:rgba(59,130,246,0.06); border-left:2px solid var(--accent); border-radius:4px; font-size:11px; color:var(--text2); margin:0 0 8px 0;">
        💡 <strong>Schadennummer / Aktenzeichen</strong> sind Auftrags-Daten — gibst du beim Anlegen des Auftrags ein, nicht hier im Adressbuch.
      </div>

      <!-- Adresse (DIN 5008) -->
      <div class="form-grid" style="grid-template-columns: 7fr 2fr 1fr;">
        <div><label class="form-label" for="k-strasse">Straße</label><input type="text" id="k-strasse" class="form-input" placeholder="Musterstraße"></div>
        <div><label class="form-label" for="k-hausnr">Nr.</label><input type="text" id="k-hausnr" class="form-input" placeholder="12a"></div>
        <div><label class="form-label" for="k-zusatz">Zusatz</label><input type="text" id="k-zusatz" class="form-input" placeholder="2. OG"></div>
      </div>
      <div class="form-grid">
        <div class="form-grid" style="margin:0; grid-template-columns: 90px 1fr;">
          <div><label class="form-label" for="k-plz">PLZ</label><input type="text" id="k-plz" class="form-input" maxlength="10"></div>
          <div><label class="form-label" for="k-ort">Ort</label><input type="text" id="k-ort" class="form-input"></div>
        </div>
        <div><label class="form-label" for="k-land">Land</label><input type="text" id="k-land" class="form-input" value="DE" maxlength="2" style="text-transform:uppercase;"></div>
      </div>

      <!-- Kommunikation -->
      <div class="form-grid">
        <div><label class="form-label" for="k-email">E-Mail</label><input type="email" id="k-email" class="form-input"></div>
        <div><label class="form-label" for="k-telefon">Telefon</label><input type="tel" id="k-telefon" class="form-input"></div>
      </div>
      <div class="form-grid">
        <div><label class="form-label" for="k-mobil">Mobil</label><input type="tel" id="k-mobil" class="form-input"></div>
        <div><label class="form-label" for="k-tags">Tags (kommagetrennt)</label><input type="text" id="k-tags" class="form-input" placeholder="z. B. Auftraggeber, VIP"></div>
      </div>

      <!-- Mehr-Felder-Toggle -->
      <button type="button" id="toggle-mehr-felder" class="btn-secondary" style="width:100%; margin-top:6px;">
        <span id="toggle-mehr-felder-icon">▾</span> Weitere Felder (Email-2, Fax, Website, Steuer, Bank, Notizen)
      </button>

      <div id="mehr-felder" style="display:none; margin-top:12px;">
        <div class="form-grid">
          <div><label class="form-label" for="k-email-2">E-Mail (zweite)</label><input type="email" id="k-email-2" class="form-input"></div>
          <div><label class="form-label" for="k-fax">Fax</label><input type="tel" id="k-fax" class="form-input"></div>
        </div>
        <div class="form-grid single">
          <div><label class="form-label" for="k-website">Website</label><input type="url" id="k-website" class="form-input" placeholder="https://"></div>
        </div>

        <!-- Steuer + Bank: nur bei Firma/Bauunternehmen relevant, aber nicht enforced -->
        <div class="form-grid">
          <div><label class="form-label" for="k-ust-id">USt-IdNr.</label><input type="text" id="k-ust-id" class="form-input" placeholder="DE123456789"></div>
          <div><label class="form-label" for="k-steuernummer">Steuernummer</label><input type="text" id="k-steuernummer" class="form-input"></div>
        </div>
        <div class="form-grid">
          <div><label class="form-label" for="k-iban">IBAN</label><input type="text" id="k-iban" class="form-input" style="font-family:'JetBrains Mono', monospace;"></div>
          <div><label class="form-label" for="k-bic">BIC</label><input type="text" id="k-bic" class="form-input" style="font-family:'JetBrains Mono', monospace;"></div>
        </div>

        <div class="form-grid single">
          <div><label class="form-label" for="k-notizen">Notizen</label><textarea id="k-notizen" class="form-input" rows="3" style="resize:vertical;"></textarea></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btn-delete" type="button" style="visibility:hidden;">Löschen</button>
      <div style="display:flex; gap:8px;">
        <button class="btn-secondary" id="modal-cancel-2" type="button">Abbrechen</button>
        <button class="btn-primary" id="btn-save" type="button">Speichern</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="/kontakte-supabase-logic.js"></script>
</body>
</html>

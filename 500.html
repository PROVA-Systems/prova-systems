<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PROVA — Server-Fehler</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b1220;color:#e8eaf0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Instrument Sans',system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;}
.wrap{max-width:480px;width:100%;}
.logo{font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:40px;opacity:.7;}
.logo span{color:#4f8ef7;}
.code{font-size:72px;font-weight:800;color:#ef4444;line-height:1;letter-spacing:-.04em;}
.msg{font-size:18px;color:#e8eaf0;margin:12px 0 6px;font-weight:600;}
.sub{font-size:13px;color:#6b7a99;margin-bottom:8px;line-height:1.6;}
.id-box{
  display:inline-block;margin:12px 0 28px;padding:6px 14px;
  background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:8px;
  font-size:12px;color:#ef4444;font-family:monospace;
}
.btn{
  display:inline-block;padding:13px 28px;background:linear-gradient(135deg,#4f8ef7,#3a7be0);
  border-radius:10px;color:#fff;font-size:15px;font-weight:700;
  text-decoration:none;transition:all .2s;margin-bottom:24px;cursor:pointer;border:none;font-family:inherit;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,142,247,.4);}
.btn-secondary{background:transparent;border:1px solid rgba(255,255,255,.15);color:#aab4cb;margin-left:10px;}
.support{
  margin-top:4px;padding:12px 18px;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);border-radius:10px;
  font-size:12px;color:#6b7a99;line-height:1.6;
}
.support a{color:#4f8ef7;text-decoration:none;}
.support a:hover{text-decoration:underline;}
.actions{margin-bottom:32px;}
.status-link{display:inline-block;margin-top:14px;font-size:12px;color:#6b7a99;}
.status-link a{color:#4f8ef7;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">PRO<span>VA</span></div>
  <div class="code">500</div>
  <p class="msg">Server-Fehler.</p>
  <p class="sub">Etwas ist schiefgelaufen. Wir wurden automatisch benachrichtigt und arbeiten an einer Loesung.</p>
  <div class="id-box" id="errId">Fehler-ID: lädt…</div>

  <div class="actions">
    <button class="btn" onclick="window.location.reload()">↻ Erneut versuchen</button>
    <a href="/dashboard.html" class="btn btn-secondary">Zur Zentrale</a>
  </div>

  <div class="support">
    Fehler hartnäckig? →
    <a href="mailto:kontakt@prova-systems.de">kontakt@prova-systems.de</a><br>
    Bitte die Fehler-ID oben mitsenden.
  </div>

  <div class="status-link">
    System-Status: <a href="/status.html" target="_blank">status.prova-systems.de</a>
  </div>
</div>

<script>
// Generiere zeitstempelbasierte Fehler-ID (User-Reference + Sentry-Korrelation)
(function() {
  var id = 'err-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
  var box = document.getElementById('errId');
  if (box) box.textContent = 'Fehler-ID: ' + id;

  // Falls Sentry verfuegbar: Tag setzen damit Marcel im Cockpit korrelieren kann
  try {
    if (window.Sentry && window.Sentry.captureMessage) {
      window.Sentry.captureMessage('500-Page rendered (id: ' + id + ')', 'warning');
    }
  } catch (e) {}
})();
</script>
</body>
</html>

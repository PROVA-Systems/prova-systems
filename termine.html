<!doctype html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PROVA Termine</title><link rel="stylesheet" href="prova-nav.css">
<style>body{margin:0;background:#0d0f14;color:#cbd5e1;font-family:system-ui}.main{max-width:980px;margin:0 auto;padding:16px}.card{background:#111827;border:1px solid #2b3342;border-radius:12px;padding:12px;margin-bottom:10px}input,select,textarea{width:100%;padding:9px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#fff}.row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn{padding:8px 12px;border-radius:8px;background:#1d4ed8;border:none;color:#fff;cursor:pointer}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #2b3342;text-align:left}@media(max-width:800px){.row{grid-template-columns:1fr}}</style></head>
<body>
<script src="prova-account-gate.js"></script><script src="paket-guard.js"></script><script src="prova-auth-api.js"></script><script src="prova-airtable-api.js"></script><script src="push-notify.js"></script><script src="nav.js" defer></script>
<div id="provaDrawerMount"></div><nav id="provaBottomNav"></nav>
<main class="main">
  <h1>Termine</h1>
  <div class="card">
    <div class="row">
      <div><label>Titel</label><input id="tTitel"></div>
      <div><label>Typ</label><select id="tTyp"><option>Ortstermin</option><option>Gerichtstermin</option><option>Telefonat</option><option>Besprechung</option><option>Abgabefrist</option><option>Sonstiges</option></select></div>
      <div><label>Datum</label><input type="date" id="tDatum"></div>
    </div>
    <div class="row" style="margin-top:8px">
      <div><label>Uhrzeit</label><input type="time" id="tZeit"></div>
      <div><label>Aktenzeichen</label><input id="tAz"></div>
      <div><label>Ort</label><input id="tOrt"></div>
    </div>
    <button class="btn" id="saveT" style="margin-top:10px">Termin speichern</button>
  </div>
  <div class="card"><table><thead><tr><th>Datum</th><th>Typ</th><th>AZ</th><th>Ort</th></tr></thead><tbody id="tb"></tbody></table></div>
</main>
<script>
(function(){
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
  function sv(){return (window.PROVA_AIRTABLE&&PROVA_AIRTABLE.getSvEmail&&PROVA_AIRTABLE.getSvEmail())||(localStorage.getItem('prova_sv_email')||'').trim().toLowerCase()}
  function q(id){return document.getElementById(id)}
  var azQ=new URLSearchParams(location.search).get('az')||localStorage.getItem('prova_letztes_az')||''; q('tAz').value=azQ; q('tDatum').value=new Date().toISOString().slice(0,10);
  async function load(){
    if(!window.PROVA_AIRTABLE) return;
    var mail=sv(); if(!mail) return;
    var p='/v0/'+PROVA_AIRTABLE.BASE+'/'+PROVA_AIRTABLE.TABLE_TERMINE+'?maxRecords=200&sort[0][field]=Datum&sort[0][direction]=asc&filterByFormula='+encodeURIComponent('{sv_email}="'+mail.replace(/"/g,'\\"')+'"');
    var r=await PROVA_AIRTABLE.fetchJson('GET',p); var rows=(r.records||[]).map(function(x){return x.fields||{}});
    q('tb').innerHTML=rows.map(function(f){
      var extra = (f.Typ==='Gerichtstermin'&&f.AZ)?' <a href="gericht-auftrag.html?az='+encodeURIComponent(f.AZ)+'">Gericht</a>':'';
      return '<tr><td>'+esc(f.Datum)+' '+esc(f.Uhrzeit||'')+'</td><td>'+esc(f.Typ)+extra+'</td><td>'+esc(f.AZ||'')+'</td><td>'+esc(f.Ort||'')+'</td></tr>';
    }).join('')||'<tr><td colspan="4">Keine Termine</td></tr>';
    fristGuard(rows);
  }
  function fristGuard(rows){
    var today=new Date(); today.setHours(0,0,0,0);
    rows.forEach(function(f){
      if(!f.Datum) return; var d=new Date(f.Datum+'T00:00:00'); var diff=Math.round((d-today)/86400000);
      if(f.Typ==='Abgabefrist'&&(diff===14||diff===7||diff===3)){ if(window.provaPushNotify) window.provaPushNotify('Frist-Guard', (f.AZ||'')+' in '+diff+' Tagen'); }
      if(diff===0){ try{ if(!sessionStorage.getItem('frist_today_'+(f.AZ||f.Datum))) { alert('Termin heute: '+(f.Titel||f.Typ)); sessionStorage.setItem('frist_today_'+(f.AZ||f.Datum),'1'); } }catch(e){} }
    });
  }
  q('saveT').onclick=async function(){
    var body={fields:{Titel:q('tTitel').value.trim(),Typ:q('tTyp').value,Datum:q('tDatum').value,Uhrzeit:q('tZeit').value,AZ:q('tAz').value.trim(),Ort:q('tOrt').value.trim(),sv_email:sv()}};
    if(!body.fields.Titel||!body.fields.Datum){alert('Titel und Datum sind Pflicht');return;}
    await PROVA_AIRTABLE.fetchJson('POST','/v0/'+PROVA_AIRTABLE.BASE+'/'+PROVA_AIRTABLE.TABLE_TERMINE,body);
    localStorage.setItem('prova_letztes_az', body.fields.AZ||'');
    load();
  };
  load();
})();
</script>
</body></html>

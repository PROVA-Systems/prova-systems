<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termine & Fristen · PROVA</title>
<style>
:root{
  --bg:#0b1220;--bg2:#111827;--bg3:#161f30;--surface:#1c2537;--surface2:#222d42;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#eef0f6;--text2:#9aa5bc;--text3:#5a6680;
  --accent:#4f8ef7;--green:#10b981;--green-bg:rgba(16,185,129,0.1);--green-border:rgba(16,185,129,0.25);
  --warn:#f59e0b;--warn-bg:rgba(245,158,11,0.1);--warn-border:rgba(245,158,11,0.25);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);--red-border:rgba(239,68,68,0.25);
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,0.1);--purple-border:rgba(139,92,246,0.25);
  --sans:'Instrument Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;line-height:1.6;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-weight:800;font-size:18px;color:var(--text);text-decoration:none;letter-spacing:-0.02em;}
.logo span{color:var(--accent);}
.topnav{display:flex;gap:2px;}
.topnav a{padding:6px 12px;border-radius:6px;color:var(--text3);font-size:14px;font-weight:500;text-decoration:none;transition:all 0.15s;min-height:44px;display:inline-flex;align-items:center;}
.topnav a:hover{color:var(--text2);background:rgba(255,255,255,0.04);}
.topnav a.active{color:var(--accent);background:rgba(79,142,247,0.1);}
.paket-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;}
@media(max-width:700px){.topnav{display:none;}}
.main{max-width:1000px;margin:0 auto;padding:28px 20px 80px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap;}
.page-title{font-size:24px;font-weight:800;letter-spacing:-0.02em;}
.page-sub{font-size:13px;color:var(--text3);margin-top:3px;}
.btn-new{display:flex;align-items:center;gap:8px;padding:10px 18px;background:linear-gradient(135deg,#4f8ef7,#3a7be0);border:none;border-radius:10px;color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 12px rgba(79,142,247,0.25);}
.btn-new:hover{transform:translateY(-1px);}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.stat-num{font-size:26px;font-weight:800;letter-spacing:-0.02em;line-height:1;}
.stat-label{font-size:12px;color:var(--text3);margin-top:4px;}
.stat-card.red{border-color:var(--red-border);background:var(--red-bg);}
.stat-card.red .stat-num{color:var(--red);}
.stat-card.warn{border-color:var(--warn-border);background:var(--warn-bg);}
.stat-card.warn .stat-num{color:var(--warn);}
.stat-card.green{border-color:var(--green-border);background:var(--green-bg);}
.stat-card.green .stat-num{color:var(--green);}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr;}}
.tabs{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content;}
.tab{padding:8px 16px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;color:var(--text3);border:none;background:none;font-family:var(--sans);}
.tab.active{background:var(--surface2);color:var(--text);}
.tab:hover:not(.active){color:var(--text2);}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-sel{padding:8px 11px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:var(--sans);font-size:13px;cursor:pointer;outline:none;}
.filter-sel:focus{border-color:var(--accent);}
.search-inp{flex:1;min-width:160px;padding:8px 11px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;}
.search-inp:focus{border-color:var(--accent);}
.search-inp::placeholder{color:var(--text3);}
.termine-list{display:flex;flex-direction:column;gap:7px;}
.termin-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:grid;grid-template-columns:52px 1fr auto;gap:14px;align-items:center;transition:all 0.15s;cursor:pointer;}
.termin-card:hover{border-color:var(--border2);background:var(--surface2);}
.termin-card.overdue{border-color:var(--red-border);background:var(--red-bg);}
.termin-card.today{border-color:var(--warn-border);background:var(--warn-bg);}
.date-block{text-align:center;}
.date-day{font-size:22px;font-weight:800;line-height:1;letter-spacing:-0.02em;}
.date-month{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-top:2px;}
.termin-card.overdue .date-day{color:var(--red);}
.termin-card.today .date-day{color:var(--warn);}
.termin-type-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.typ-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.05em;}
.typ-Ortstermin{background:rgba(79,142,247,0.12);color:#4f8ef7;border:1px solid rgba(79,142,247,0.25);}
.typ-Frist{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25);}
.typ-Gerichtstermin{background:rgba(139,92,246,0.12);color:#8b5cf6;border:1px solid rgba(139,92,246,0.25);}
.typ-Abgabe{background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);}
.typ-Rueckfrage{background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.25);}
.termin-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px;}
.termin-meta{font-size:12px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap;}
.t-actions{display:flex;gap:5px;flex-shrink:0;}
.btn-ic{width:32px;height:32px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all 0.15s;}
.btn-ic:hover{color:var(--text);border-color:var(--accent);}
.btn-ic.del:hover{color:var(--red);border-color:var(--red-border);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty-title{font-size:17px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;padding:26px;}
.modal-title{font-size:19px;font-weight:700;margin-bottom:18px;}
.fg{margin-bottom:14px;}
.fl{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;}
.req{color:var(--red);}
.fi,.fs,.ft{width:100%;padding:10px 12px;background:var(--surface);border:2px solid var(--border2);border-radius:9px;color:var(--text);font-family:var(--sans);font-size:15px;outline:none;transition:border-color 0.2s;}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--accent);}
.ft{min-height:70px;resize:vertical;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.btn-save{flex:1;padding:12px;background:linear-gradient(135deg,#4f8ef7,#3a7be0);border:none;border-radius:9px;color:#fff;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;}
.btn-save:hover{opacity:0.9;}
.btn-cancel{padding:12px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;color:var(--text3);font-family:var(--sans);font-size:15px;cursor:pointer;}
.kal-wrap{display:none;}
.kal-wrap.active{display:block;}
.kal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.kal-nav{display:flex;align-items:center;gap:10px;}
.kal-month{font-size:17px;font-weight:700;}
.kal-btn{width:34px;height:34px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
.kal-btn:hover{border-color:var(--accent);color:var(--accent);}
.kal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.kal-day-label{text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);padding:7px 0;}
.kal-cell{min-height:76px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px;cursor:pointer;transition:all 0.15s;}
.kal-cell:hover{border-color:var(--border2);background:var(--surface2);}
.kal-cell.today{border-color:var(--accent);}
.kal-cell.other-month{opacity:0.3;}
.kal-num{font-size:12px;font-weight:600;margin-bottom:3px;}
.kal-cell.today .kal-num{color:var(--accent);}
.kal-dot{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kal-dot.Ortstermin{background:rgba(79,142,247,0.15);color:#4f8ef7;}
.kal-dot.Frist{background:rgba(239,68,68,0.15);color:#ef4444;}
.kal-dot.Gerichtstermin{background:rgba(139,92,246,0.15);color:#8b5cf6;}
.kal-dot.Abgabe{background:rgba(245,158,11,0.15);color:#f59e0b;}
.kal-dot.Rueckfrage{background:rgba(16,185,129,0.15);color:#10b981;}
@media(max-width:600px){.kal-cell{min-height:44px;}.kal-dot{display:none;}.fgrid{grid-template-columns:1fr;}}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;background:var(--surface2);border:1px solid var(--green-border);border-radius:9px;color:var(--green);font-size:14px;font-weight:500;z-index:999;transform:translateY(60px);opacity:0;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.err{border-color:var(--red-border);color:#fca5a5;}
.toast.w{border-color:var(--warn-border);color:#fde68a;}
</style>
</head>
<body>
<div class="topbar">
  <a href="app-starter.html" class="logo">PRO<span>VA</span></a>
  <nav class="topnav">
    <a href="app-starter.html">Neues Gutachten</a>
    <a href="archiv.html">Archiv</a>
    <a href="briefvorlagen.html">Briefvorlagen</a>
    <a href="termine.html" class="active">Termine</a>
    <a href="jveg.html">JVEG</a>
  </nav>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="paket-badge" id="topbarPaket"></span>
    <button style="background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;padding:6px;border-radius:6px;min-height:44px;" onclick="location.href='einstellungen.html'">&#9881;</button>
  </div>
</div>
<div class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Termine &amp; Fristen</div>
      <div class="page-sub" id="todayStr"></div>
    </div>
    <button class="btn-new" onclick="openModal()">+ Neuer Termin</button>
  </div>
  <div class="stats-row">
    <div class="stat-card red"><div class="stat-num" id="sUeberfaellig">0</div><div class="stat-label">&#220;berf&#228;llig</div></div>
    <div class="stat-card warn"><div class="stat-num" id="sHeute">0</div><div class="stat-label">Heute</div></div>
    <div class="stat-card warn"><div class="stat-num" id="sWoche">0</div><div class="stat-label">Diese Woche</div></div>
    <div class="stat-card green"><div class="stat-num" id="sGesamt">0</div><div class="stat-label">Gesamt offen</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('liste',this)">&#128203; Liste</button>
    <button class="tab" onclick="switchTab('kalender',this)">&#128197; Kalender</button>
  </div>
  <div class="toolbar">
    <input class="search-inp" id="searchInp" type="text" placeholder="&#128269; Suchen..." oninput="renderListe()">
    <select class="filter-sel" id="fTyp" onchange="renderListe()">
      <option value="">Alle Typen</option>
      <option value="Ortstermin">Ortstermin</option>
      <option value="Frist">Frist</option>
      <option value="Gerichtstermin">Gerichtstermin</option>
      <option value="Abgabe">Abgabe</option>
      <option value="Rueckfrage">R&#252;ckfrage</option>
    </select>
    <select class="filter-sel" id="fStatus" onchange="renderListe()">
      <option value="offen">Offen</option>
      <option value="alle">Alle</option>
      <option value="erledigt">Erledigt</option>
    </select>
  </div>
  <div id="listeView"><div class="termine-list" id="tListe"></div></div>
  <div class="kal-wrap" id="kalView">
    <div class="kal-header">
      <div class="kal-nav">
        <button class="kal-btn" onclick="kalNav(-1)">&#8249;</button>
        <div class="kal-month" id="kalTitle"></div>
        <button class="kal-btn" onclick="kalNav(1)">&#8250;</button>
      </div>
      <button class="kal-btn" style="width:auto;padding:0 10px;font-size:13px;" onclick="kalHeute()">Heute</button>
    </div>
    <div class="kal-grid" id="kalGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="mOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="mTitle">&#128197; Neuer Termin</div>
    <div class="fg"><label class="fl">Titel <span class="req">*</span></label><input class="fi" id="mTitel" type="text" placeholder="z.B. Ortstermin Mustermann, AZ 2026-042"></div>
    <div class="fgrid">
      <div class="fg"><label class="fl">Typ <span class="req">*</span></label>
        <select class="fs" id="mTyp">
          <option value="Ortstermin">&#128205; Ortstermin</option>
          <option value="Frist">&#9200; Frist</option>
          <option value="Gerichtstermin">&#9878; Gerichtstermin</option>
          <option value="Abgabe">&#128196; Abgabe</option>
          <option value="Rueckfrage">&#128172; R&#252;ckfrage</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Datum <span class="req">*</span></label><input class="fi" id="mDatum" type="date"></div>
    </div>
    <div class="fgrid">
      <div class="fg"><label class="fl">Uhrzeit</label><input class="fi" id="mUhrzeit" type="time"></div>
      <div class="fg"><label class="fl">Aktenzeichen</label><input class="fi" id="mAZ" type="text" placeholder="PROVA-2026-042"></div>
    </div>
    <div class="fg"><label class="fl">Auftraggeber</label><input class="fi" id="mAuftr" type="text" placeholder="Allianz, M&#252;ller GmbH..."></div>
    <div class="fg"><label class="fl">Ort / Adresse</label><input class="fi" id="mOrt" type="text" placeholder="Musterstr. 12, 50667 K&#246;ln"></div>
    <div class="fg"><label class="fl">Notizen</label><textarea class="ft" id="mNotiz" placeholder="Weitere Hinweise..."></textarea></div>
    <div class="fg"><label class="fl">Erinnerung</label>
      <select class="fs" id="mErinnerung">
        <option value="0">Keine</option>
        <option value="1" selected>1 Tag vorher</option>
        <option value="3">3 Tage vorher</option>
        <option value="7">1 Woche vorher</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveTermin()">Speichern</button>
      <button class="btn-cancel" onclick="document.getElementById('mOverlay').classList.remove('open')">Abbrechen</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SK='prova_termine_v2';
const WEBHOOK_S8='https://hook.eu1.make.com/lktuhugwcg5v37ib6bdaxjb1uiplnu8v';
let termine=[],editId=null,kalDate=new Date(),activeTab='liste';

(function(){
  const p=localStorage.getItem('prova_paket')||'Starter';
  const c={Starter:'#4f8ef7',Pro:'#f59e0b',Enterprise:'#a78bfa'}[p]||'#4f8ef7';
  const el=document.getElementById('topbarPaket');
  if(el){el.textContent=p;el.style.cssText='background:'+c+'18;color:'+c+';border:1px solid '+c+'33';}
  document.getElementById('todayStr').textContent=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('mDatum').value=new Date().toISOString().split('T')[0];
  load();renderAll();
})();

function load(){
  try{termine=JSON.parse(localStorage.getItem(SK)||'[]');}catch(e){termine=[];}
  if(!termine.length) termine=demo();
}
function save(){localStorage.setItem(SK,JSON.stringify(termine));}
function syncToS8(termin,aktion){
  try{
    const payload={
      aktion,
      termin_id:termin.id,
      titel:termin.titel,
      typ:termin.typ,
      datum:termin.datum,
      uhrzeit:termin.uhrzeit||'',
      az:termin.az||'',
      auftraggeber:termin.auftr||'',
      ort:termin.ort||'',
      notiz:termin.notiz||'',
      erinnerung_tage:termin.erinnerung||0,
      erledigt:termin.erledigt||false,
      sv_email:localStorage.getItem('prova_sv_email')||'',
      ts:new Date().toISOString()
    };
    fetch(WEBHOOK_S8,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      .catch(()=>{/* silent — localStorage ist primär */});
  }catch(e){}
}

function demo(){
  const t=new Date(),f=d=>d.toISOString().split('T')[0];
  const add=n=>{const d=new Date(t);d.setDate(d.getDate()+n);return f(d);};
  return [
    {id:'d1',titel:'Ortstermin Müller / Wasserschaden',typ:'Ortstermin',datum:add(2),uhrzeit:'10:00',az:'PROVA-2026-041',auftr:'Allianz',ort:'Gartenstr. 5, Köln',notiz:'Schlüssel beim Hausmeister',erinnerung:1,erledigt:false},
    {id:'d2',titel:'Gutachten-Abgabe Schmidt',typ:'Abgabe',datum:add(0),uhrzeit:'18:00',az:'PROVA-2026-038',auftr:'LVM',ort:'',notiz:'PDF + Rechnung',erinnerung:1,erledigt:false},
    {id:'d3',titel:'Gerichtstermin AG Köln',typ:'Gerichtstermin',datum:add(7),uhrzeit:'09:30',az:'PROVA-2026-029',auftr:'AG Köln',ort:'Luxemburger Str. 101',notiz:'3-fach kopiert',erinnerung:3,erledigt:false},
    {id:'d4',titel:'Frist: Stellungnahme Gegengutachten',typ:'Frist',datum:add(-2),uhrzeit:'',az:'PROVA-2026-031',auftr:'RAin Berger',ort:'',notiz:'',erinnerung:1,erledigt:false},
    {id:'d5',titel:'Rückfrage Feuchtemessung Weber',typ:'Rueckfrage',datum:add(4),uhrzeit:'',az:'PROVA-2026-043',auftr:'Privat Weber',ort:'',notiz:'Labor-Ergebnisse erwartet',erinnerung:1,erledigt:false},
  ];
}

function renderAll(){renderStats();if(activeTab==='liste')renderListe();else renderKalender();}

function renderStats(){
  const td=todayS(),we=new Date();we.setDate(we.getDate()+7);const ws=we.toISOString().split('T')[0];
  const o=termine.filter(t=>!t.erledigt);
  document.getElementById('sUeberfaellig').textContent=o.filter(t=>t.datum<td).length;
  document.getElementById('sHeute').textContent=o.filter(t=>t.datum===td).length;
  document.getElementById('sWoche').textContent=o.filter(t=>t.datum>td&&t.datum<=ws).length;
  document.getElementById('sGesamt').textContent=o.length;
}

function renderListe(){
  const q=document.getElementById('searchInp').value.toLowerCase();
  const ft=document.getElementById('fTyp').value;
  const fs=document.getElementById('fStatus').value;
  const td=todayS();
  let fl=termine.filter(t=>{
    if(fs==='offen'&&t.erledigt)return false;
    if(fs==='erledigt'&&!t.erledigt)return false;
    if(ft&&t.typ!==ft)return false;
    if(q&&![t.titel,t.az,t.auftr,t.ort].join(' ').toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{if(a.erledigt!==b.erledigt)return a.erledigt?1:-1;return a.datum.localeCompare(b.datum);});
  const c=document.getElementById('tListe');
  if(!fl.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">&#128197;</div><div class="empty-title">Keine Termine gefunden</div><div class="empty-sub">Erstellen Sie Ihren ersten Termin.</div></div>';return;}
  c.innerHTML=fl.map(t=>{
    const d=new Date(t.datum+'T12:00:00');
    const day=d.getDate(),mon=d.toLocaleDateString('de-DE',{month:'short'}).replace('.','');
    const ov=!t.erledigt&&t.datum<td,tod=t.datum===td;
    const cc=t.erledigt?'':ov?'overdue':tod?'today':'';
    const tcls='typ-'+t.typ;
    const dd=t.erledigt?'<span style="color:var(--green)">&#10003; Erledigt</span>':ov?'<span style="color:var(--red)">&#9888; '+Math.abs(diff(t.datum))+' Tage überfällig</span>':tod?'<span style="color:var(--warn)">&#9889; Heute</span>':'<span>In '+diff(t.datum)+' Tagen</span>';
    return '<div class="termin-card '+cc+'" onclick="editT(''+t.id+'')"><div class="date-block"><div class="date-day">'+String(day).padStart(2,'0')+'</div><div class="date-month">'+mon+'</div></div><div><div class="termin-type-row"><span class="typ-badge '+tcls+'">'+t.typ+'</span></div><div class="termin-title"'+(t.erledigt?' style="opacity:0.4;text-decoration:line-through"':'')+'>'+esc(t.titel)+'</div><div class="termin-meta">'+(t.uhrzeit?'<span>&#128336; '+t.uhrzeit+'</span>':'')+(t.az?'<span>&#128193; '+esc(t.az)+'</span>':'')+(t.auftr?'<span>&#128100; '+esc(t.auftr)+'</span>':'')+dd+'</div></div><div class="t-actions" onclick="event.stopPropagation()">'+(!t.erledigt?'<button class="btn-ic" onclick="togE(''+t.id+'')" title="Erledigt">&#10003;</button>':'')+'<button class="btn-ic" onclick="editT(''+t.id+'')" title="Bearbeiten">&#9998;</button><button class="btn-ic del" onclick="delT(''+t.id+'')" title="Löschen">&#128465;</button></div></div>';
  }).join('');
}

function renderKalender(){
  const yr=kalDate.getFullYear(),mo=kalDate.getMonth(),td=todayS();
  document.getElementById('kalTitle').textContent=kalDate.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  const days=['Mo','Di','Mi','Do','Fr','Sa','So'];
  let html=days.map(d=>'<div class="kal-day-label">'+d+'</div>').join('');
  const first=new Date(yr,mo,1);
  let sdow=first.getDay();sdow=sdow===0?6:sdow-1;
  const dim=new Date(yr,mo+1,0).getDate(),prev=new Date(yr,mo,0).getDate();
  const tmap={};termine.filter(t=>!t.erledigt).forEach(t=>{if(!tmap[t.datum])tmap[t.datum]=[];tmap[t.datum].push(t);});
  for(let i=sdow-1;i>=0;i--)html+='<div class="kal-cell other-month"><div class="kal-num">'+(prev-i)+'</div></div>';
  for(let d=1;d<=dim;d++){
    const ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const it=ds===td,dts=tmap[ds]||[];
    const dots=dts.slice(0,3).map(t=>'<div class="kal-dot '+t.typ+'">'+esc(t.titel.substring(0,16))+'</div>').join('');
    html+='<div class="kal-cell'+(it?' today':'')+(ds<td&&dts.length?' overdue':'')+'" onclick="openModalD(''+ds+'')" ><div class="kal-num">'+d+'</div>'+dots+(dts.length>3?'<div style="font-size:10px;color:var(--text3)">+'+(dts.length-3)+' mehr</div>':'')+'</div>';
  }
  const rem=(7-(sdow+dim)%7)%7;
  for(let d=1;d<=rem;d++)html+='<div class="kal-cell other-month"><div class="kal-num">'+d+'</div></div>';
  document.getElementById('kalGrid').innerHTML=html;
}

function kalNav(dir){kalDate.setMonth(kalDate.getMonth()+dir);renderKalender();}
function kalHeute(){kalDate=new Date();renderKalender();}

function switchTab(tab,el){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('listeView').style.display=tab==='liste'?'block':'none';
  const kv=document.getElementById('kalView');
  kv.classList.toggle('active',tab==='kalender');
  if(tab==='kalender')renderKalender();
}

function openModal(datum){
  editId=null;
  document.getElementById('mTitle').textContent='&#128197; Neuer Termin';
  document.getElementById('mTitel').value='';
  document.getElementById('mTyp').value='Ortstermin';
  document.getElementById('mDatum').value=datum||new Date().toISOString().split('T')[0];
  document.getElementById('mUhrzeit').value='';
  document.getElementById('mAZ').value=localStorage.getItem('prova_letztes_az')||'';
  document.getElementById('mAuftr').value='';
  document.getElementById('mOrt').value='';
  document.getElementById('mNotiz').value='';
  document.getElementById('mErinnerung').value='1';
  document.getElementById('mOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('mTitel').focus(),80);
}
function openModalD(d){openModal(d);}
function editT(id){
  const t=termine.find(x=>x.id===id);if(!t)return;editId=id;
  document.getElementById('mTitle').textContent='&#9998; Termin bearbeiten';
  document.getElementById('mTitel').value=t.titel;document.getElementById('mTyp').value=t.typ;
  document.getElementById('mDatum').value=t.datum;document.getElementById('mUhrzeit').value=t.uhrzeit||'';
  document.getElementById('mAZ').value=t.az||'';document.getElementById('mAuftr').value=t.auftr||'';
  document.getElementById('mOrt').value=t.ort||'';document.getElementById('mNotiz').value=t.notiz||'';
  document.getElementById('mErinnerung').value=String(t.erinnerung||1);
  document.getElementById('mOverlay').classList.add('open');
}
function closeModal(e){if(e&&e.target!==document.getElementById('mOverlay'))return;document.getElementById('mOverlay').classList.remove('open');}
function saveTermin(){
  const titel=document.getElementById('mTitel').value.trim();
  const datum=document.getElementById('mDatum').value;
  if(!titel){toast('Bitte Titel eingeben','err');return;}
  if(!datum){toast('Bitte Datum wählen','err');return;}
  const t={id:editId||'t'+Date.now(),titel,typ:document.getElementById('mTyp').value,datum,uhrzeit:document.getElementById('mUhrzeit').value,az:document.getElementById('mAZ').value.trim(),auftr:document.getElementById('mAuftr').value.trim(),ort:document.getElementById('mOrt').value.trim(),notiz:document.getElementById('mNotiz').value.trim(),erinnerung:parseInt(document.getElementById('mErinnerung').value)||0,erledigt:editId?(termine.find(x=>x.id===editId)?.erledigt||false):false};
  if(editId){const i=termine.findIndex(x=>x.id===editId);if(i>=0)termine[i]=t;}else termine.unshift(t);
  save();syncToS8(t,editId?'update':'create');document.getElementById('mOverlay').classList.remove('open');renderAll();
  toast(editId?'Gespeichert ✓':'Termin erstellt ✓');
}
function togE(id){const t=termine.find(x=>x.id===id);if(t){t.erledigt=!t.erledigt;save();syncToS8(t,'update');renderAll();toast(t.erledigt?'Erledigt ✓':'Wieder geöffnet');}}
function delT(id){const t=termine.find(x=>x.id===id);if(!confirm('Termin löschen?'))return;if(t)syncToS8(t,'delete');termine=termine.filter(t=>t.id!==id);save();renderAll();toast('Gelöscht','w');}
function todayS(){return new Date().toISOString().split('T')[0];}
function diff(datum){const t=new Date();t.setHours(0,0,0,0);const d=new Date(datum+'T00:00:00');return Math.round((d-t)/86400000);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type==='err'?' err':type==='w'?' w':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('mOverlay').classList.remove('open');if(e.key==='Enter'&&document.getElementById('mOverlay').classList.contains('open')&&e.target.tagName!=='TEXTAREA')saveTermin();});
</script>
</body>

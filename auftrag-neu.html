<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuer Auftrag · PROVA</title>

<!-- Sprint 06b Skeleton: 4-Phasen-Wizard (1A/1B/2/3), LocalStorage-Draft-only -->
<script src="/lib/prova-config.js"></script>
<script src="prova-notifications.js" defer></script>
<script src="prova-sanitize.js"></script>
<script src="theme.js"></script>
<script src="prova-layout.config.js"></script>
<link rel="stylesheet" href="mobile.css">
<link rel="stylesheet" href="prova-design.css">
<link rel="stylesheet" href="page-template.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="nav.js" defer></script>

<style>
:root {
  --primary: #1a3a6b;
  --accent: #3b82f6;
  --muted: #64748b;
  --bg: #0b0d11; --bg2: #111318; --bg3: #161a22;
  --surface: #1c2130; --surface2: #232a3a;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.11);
  --text: #eaecf4; --text2: #8b93ab; --text3: #4d5568;
  --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.55;
}
input, select, textarea { font-size: max(16px, 1em); }
.app-shell { display: flex; min-height: 100vh; }

/* ── Stepper ── */
.stepper {
  display: flex; gap: 8px; margin-bottom: 18px; padding: 14px 18px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
}
.step {
  flex: 1; padding: 8px 12px; border-radius: 8px;
  background: var(--bg3); border: 1px solid var(--border);
  font-size: 12px; color: var(--text3); cursor: default;
  display: flex; flex-direction: column; gap: 2px;
}
.step.active { background: rgba(59,130,246,0.10); border-color: var(--accent); color: var(--text); }
.step.done { background: rgba(16,185,129,0.10); border-color: var(--success); color: var(--text2); }
.step .step-num { font-weight: 700; font-size: 11px; letter-spacing: .05em; text-transform: uppercase; opacity: .7; }
.step .step-label { font-weight: 600; }

/* ── Form ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-grid.single { grid-template-columns: 1fr; }
@media (max-width: 700px) { .form-grid { grid-template-columns: 1fr; } }
.form-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text3); margin-bottom: 5px; display: block;
}
.form-label .req { color: var(--danger); margin-left: 4px; }
.form-label .help { color: var(--text3); font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 10px; margin-top: 2px; display: block; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 10px 12px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text); font-family: inherit; outline: none; transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { min-height: 80px; resize: vertical; }
.form-input.error, .form-select.error, .form-textarea.error { border-color: var(--danger); }

.section-hint {
  background: rgba(59,130,246,0.06);
  border-left: 3px solid var(--accent);
  padding: 10px 14px; border-radius: 6px; font-size: 12px;
  color: var(--text2); margin-bottom: 14px;
}
.section-warn {
  background: rgba(245,158,11,0.08);
  border-left: 3px solid var(--warning);
  padding: 10px 14px; border-radius: 6px; font-size: 12px;
  color: var(--text2); margin-bottom: 14px;
}

/* ── Action-Footer ── */
.action-footer {
  position: sticky; bottom: 0; background: var(--bg2);
  border-top: 1px solid var(--border2); padding: 14px 18px;
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
  margin-top: 18px;
}
.btn {
  padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
  border: 0; cursor: pointer; font-family: inherit;
}
.btn.primary { background: var(--accent); color: #fff; }
.btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn.secondary { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border2); }
.btn.danger { background: var(--danger); color: #fff; }

.draft-status {
  font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px;
}
.draft-status.saved { color: var(--success); }

.toast {
  position: fixed; bottom: 80px; right: 20px; padding: 12px 18px;
  border-radius: 8px; font-size: 13px; font-weight: 500;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3); z-index: 9999;
  display: none; max-width: 400px;
}
.toast.success { background: var(--success); color: #fff; }
.toast.error { background: var(--danger); color: #fff; }
.toast.info { background: var(--accent); color: #fff; }
.toast.warning { background: var(--warning); color: #fff; }

/* ── Kontakt-Picker (Phase 1A) ── */
.kontakt-picker-result {
  padding: 12px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; margin-top: 8px;
}
.kontakt-picker-result .name { font-weight: 600; color: var(--text); }
.kontakt-picker-result .meta { font-size: 12px; color: var(--text3); margin-top: 3px; }

.field-error {
  font-size: 11px; color: var(--danger); margin-top: 4px;
}
</style>
</head>
<body data-page="auftrag-neu">
<div class="app-shell" id="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="sb-overlay" id="sb-overlay" onclick="closeMobileSidebar()"></div>
  <div class="main-wrap" id="main-wrap">

    <header class="topbar">
      <div class="topbar-left">
        <button class="burger" onclick="openMobileSidebar()"><span></span><span></span><span></span></button>
        <div class="page-breadcrumb"><span>PROVA</span><span class="page-breadcrumb-sep">›</span><strong>Neuer Auftrag</strong></div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-hero">
        <h1 class="page-title">Neuer Auftrag</h1>
        <p class="page-subtitle">4 Phasen — Auftraggeber, Vorgangsdaten, Objekt, Schadensart. Eingaben werden lokal als Entwurf gespeichert.</p>
      </div>

      <!-- Stepper -->
      <div class="stepper" id="stepper">
        <div class="step active" data-phase="1a">
          <span class="step-num">1A</span>
          <span class="step-label">Auftraggeber</span>
        </div>
        <div class="step" data-phase="1b">
          <span class="step-num">1B</span>
          <span class="step-label">Vorgangsdaten</span>
        </div>
        <div class="step" data-phase="2">
          <span class="step-num">2</span>
          <span class="step-label">Objekt &amp; Beteiligte</span>
        </div>
        <div class="step" data-phase="3">
          <span class="step-num">3</span>
          <span class="step-label">Schadensart-Details</span>
        </div>
      </div>

      <!-- Phase-Container (JS rendert aktuelle Phase rein) -->
      <div class="page-card" id="phase-container">
        <div style="padding:40px 20px; text-align:center; color:var(--text3);">
          <div style="font-size:32px; margin-bottom:8px;">⏳</div>
          <div>Lade Wizard …</div>
        </div>
      </div>

      <!-- Action-Footer -->
      <div class="action-footer">
        <div class="draft-status" id="draft-status">
          <span id="draft-icon">💾</span>
          <span id="draft-text">Bereit</span>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn secondary" id="btn-discard" type="button">Verwerfen</button>
          <button class="btn secondary" id="btn-back" type="button" disabled>← Zurück</button>
          <button class="btn primary" id="btn-next" type="button">Weiter →</button>
        </div>
      </div>

    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="/auftrag-neu-logic.js"></script>
</body>
</html>

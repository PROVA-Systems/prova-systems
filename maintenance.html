<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PROVA — Wartungsarbeiten</title>
<meta name="robots" content="noindex">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b1220;color:#e8eaf0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Instrument Sans',system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;}
.wrap{max-width:520px;width:100%;}
.logo{font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:40px;opacity:.7;}
.logo span{color:#4f8ef7;}
.icon{font-size:64px;margin-bottom:16px;}
.title{font-size:24px;color:#e8eaf0;margin-bottom:8px;font-weight:700;letter-spacing:-.02em;}
.sub{font-size:14px;color:#aab4cb;margin-bottom:8px;line-height:1.65;}
.eta-box{
  display:inline-block;margin:20px 0 28px;padding:14px 24px;
  background:linear-gradient(135deg,rgba(79,142,247,0.08),rgba(79,142,247,0.02));
  border:1px solid rgba(79,142,247,0.25);border-radius:10px;
}
.eta-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aab4cb;margin-bottom:4px;}
.eta-time{font-size:18px;font-weight:600;color:#e8eaf0;font-variant-numeric:tabular-nums;}
.actions{margin-bottom:24px;}
.btn{
  display:inline-block;padding:11px 24px;background:transparent;
  border:1px solid rgba(79,142,247,0.4);border-radius:10px;
  color:#4f8ef7;font-size:13px;font-weight:600;text-decoration:none;
  transition:all .2s;cursor:pointer;font-family:inherit;
}
.btn:hover{background:rgba(79,142,247,0.08);}
.support{
  font-size:12px;color:#6b7a99;line-height:1.6;
  padding:12px 16px;background:rgba(255,255,255,.03);border-radius:10px;
}
.support a{color:#4f8ef7;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">PRO<span>VA</span></div>
  <div class="icon">🔧</div>
  <h1 class="title">Geplante Wartungsarbeiten</h1>
  <p class="sub">PROVA wird gerade aktualisiert.<br>Wir sind in Kuerze wieder fuer Sie da.</p>

  <div class="eta-box">
    <div class="eta-label">Geplant zurueck:</div>
    <div class="eta-time" id="eta">— wird gleich aktualisiert —</div>
  </div>

  <div class="actions">
    <button class="btn" onclick="window.location.reload()">↻ Erneut versuchen</button>
  </div>

  <div class="support">
    Bei dringenden Fragen → <a href="mailto:kontakt@prova-systems.de">kontakt@prova-systems.de</a><br>
    Status-Updates: <a href="/status.html">status.prova-systems.de</a>
  </div>
</div>

<script>
// ETA aus URL-Param oder default 30min
(function() {
  var params = new URLSearchParams(window.location.search);
  var eta = params.get('eta');
  var box = document.getElementById('eta');
  if (eta) {
    box.textContent = eta;
  } else {
    var future = new Date(Date.now() + 30 * 60 * 1000);
    var hh = String(future.getHours()).padStart(2, '0');
    var mm = String(future.getMinutes()).padStart(2, '0');
    box.textContent = 'ca. ' + hh + ':' + mm + ' Uhr';
  }
  // Auto-Reload alle 60s falls Marcel maintenance-Mode beendet
  setTimeout(function() { window.location.reload(); }, 60000);
})();
</script>
</body>
</html>

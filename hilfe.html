<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROVA Hilfe — Wissensdatenbank</title>
  <link rel="stylesheet" href="prova-nav.css">
  <style>
    :root{--bg:#0d0f14;--bg2:#13161d;--text:#e8eaf0;--text2:#9da3b4;--text3:#6b7280;--acc:#4f8ef7;--line:rgba(255,255,255,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text2);font-family:Inter,system-ui}
    .topbar{background:var(--bg2);border-bottom:1px solid var(--line);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:Fraunces,serif;font-size:18px;font-weight:700;color:#fff;text-decoration:none}.logo span{color:var(--acc)}
    .paket-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
    .burger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:4px;padding:8px}
    .burger span{display:block;width:20px;height:2px;background:var(--text2)}
    .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200}
    .drawer-overlay.open{display:block}
    .drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--line);z-index:201;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column}
    .drawer.open{transform:translateX(0)}
    .drawer-header{padding:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
    .drawer-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer}
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--bg2);border-top:1px solid var(--line);z-index:100}
    .main{max-width:1100px;margin:0 auto;padding:24px 16px 60px}
    h1{color:#fff;margin:0 0 12px}.sub{margin:0 0 14px;color:var(--text3)}
    .search{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:#0b1220;color:#fff}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 18px}
    .chip{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:#111827;color:#cbd5e1;cursor:pointer;font-size:13px}
    .chip.on{border-color:#3b82f6;background:#1e3a8a;color:#dbeafe}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    .article{border:1px solid var(--line);border-radius:12px;background:#111827;padding:14px}
    .cat{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#93c5fd;margin-bottom:6px}
    .title{font-weight:700;color:#fff;margin-bottom:8px}
    .article p,.article li{font-size:14px;line-height:1.6;color:#cbd5e1}
    .article ul{margin:0;padding-left:18px}
    .support{margin-top:22px;border:1px solid var(--line);background:#0f172a;border-radius:12px;padding:16px}
    .support a{color:#93c5fd;text-decoration:none;margin-right:14px}
    @media(min-width:920px){.grid{grid-template-columns:1fr 1fr}}
    @media(max-width:900px){.burger{display:flex}.bottom-nav{display:flex}body{padding-bottom:56px}}
  </style>
</head>
<body>
  <script src="prova-account-gate.js"></script>
  <script src="paket-guard.js"></script>
  <div class="topbar">
    <a class="logo" href="dashboard.html">PRO<span>VA</span></a>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="paket-badge" id="topbarPaket"></span>
      <button type="button" class="burger" onclick="toggleDrawer()" aria-label="Menü"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <a class="logo" href="dashboard.html">PRO<span>VA</span></a>
      <button type="button" class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div id="provaDrawerMount"></div>
  </div>
  <nav class="bottom-nav" id="provaBottomNav"></nav>
  <main class="main">
    <h1>Wissensdatenbank</h1>
    <p class="sub">Durchsuchbare Hilfe zu PROVA — alle Kernprozesse und häufige Fragen.</p>
    <input id="search" class="search" type="text" placeholder="Artikel suchen…">
    <div class="chips" id="chips"></div>
    <section class="grid" id="articles"></section>

    <section class="support">
      <h3 style="margin:0 0 8px;color:#fff;">Frage nicht beantwortet?</h3>
      <a href="#" onclick="alert('Support-Chat wird geöffnet.');return false;">Support-Chat öffnen</a>
      <a href="mailto:support@prova-systems.de">E-Mail: support@prova-systems.de</a>
    </section>
  </main>

  <script src="nav.js" defer></script>
  <script>
    function toggleDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('drawerOverlay');d.classList.toggle('open');o.classList.toggle('open');document.body.style.overflow=d.classList.contains('open')?'hidden':'';}
    function closeDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('drawerOverlay');d.classList.remove('open');o.classList.remove('open');document.body.style.overflow='';}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDrawer();});
    (function(){if(!window.PROVA)return;var c=PROVA.paketColor();var s='background:'+c+'18;color:'+c+';border:1px solid '+c+'33';var el=document.getElementById('topbarPaket');if(el){el.textContent=PROVA.paketLabel();el.setAttribute('style',s);}})();

    const DATA = [
      {c:'Erste Schritte',t:'Ihr erstes Gutachten in 15 Minuten',b:'Schritt 1: Neues Gutachten → app.html. Schritt 2: Ortstermin-Modus → Fotos + Diktat. Schritt 3: §6 Fachurteil → stellungnahme.html. Schritt 4: Freigabe + PDF → freigabe.html. Schritt 5: JVEG-Rechnung → jveg.html → rechnungen.html.'},
      {c:'Erste Schritte',t:'Profil und SMTP einrichten',b:'Einstellungen öffnen, Profilfelder vollständig pflegen und SMTP für Briefversand konfigurieren.'},
      {c:'Gutachten',t:'Unterschied: Standard / Gericht / Schiedsgutachten',b:'Standard für reguläre Fälle, Gericht für Beweisfragen und Fristen, Schiedsgutachten für außergerichtliche Einigung.'},
      {c:'Gutachten',t:'§411 ZPO Ergänzungsgutachten — wann und wie',b:'Bei ergänzenden Beweisfragen oder Nachforderungen des Gerichts strukturiert über den Ergänzungs-Workflow.'},
      {c:'Gutachten',t:'Beweissicherung im Eilfall',b:'Eilfall-Prozess mit schneller Erfassung, Dokumentation und rechtssicherer Struktur.'},
      {c:'Gutachten',t:'Vorlage auswählen — welche wofür',b:'Vorlagen je Schadensart und Auftragstyp wählen, danach bei Bedarf in der Freigabe verfeinern.'},
      {c:'Abrechnung',t:'JVEG-Rechnung erstellen — Schritt für Schritt',b:'Leistungsdaten erfassen, JVEG-Werte prüfen, Rechnung erzeugen und in rechnungen.html nachverfolgen.'},
      {c:'Abrechnung',t:'Telefonberatung und Kurzberatung abrechnen',b:'Separate Positionen mit Zeitbezug nutzen, saubere Dokumentation für Nachvollziehbarkeit führen.'},
      {c:'Abrechnung',t:'Mahnwesen — wann welche Mahnstufe',b:'Mahnstufen gemäß Fälligkeit/Verzug nutzen und automatisch protokollieren.'},
      {c:'Abrechnung',t:'Verzugszinsen nach §288 BGB berechnen',b:'Verzugsbeginn und Zinssatz korrekt hinterlegen, automatisierte Berechnung verwenden.'},
      {c:'Gericht',t:'Gerichtsauftrag annehmen — Checkliste',b:'Auftrag, Frist, Beweisfragen, Zuständigkeit und Unterlagen vor Start vollständig prüfen.'},
      {c:'Gericht',t:'§407a ZPO Erklärung — was PROVA macht, was der SV macht',b:'PROVA unterstützt bei Struktur und Entwurf. Die fachliche Bewertung bleibt immer beim SV.'},
      {c:'Gericht',t:'Frist §411 ZPO — 8 Wochen berechnen',b:'Fristen direkt im Kalender/Termine anlegen, inklusive Erinnerungen und Frist-Guard.'},
      {c:'Gericht',t:'Kostenvorschuss beantragen',b:'Gerichtsvorlage verwenden, Kostenrahmen nachvollziehbar darstellen und fristgerecht einreichen.'},
      {c:'KI',t:'Was die KI macht — und was nicht (§407a)',b:'KI erstellt Entwürfe, erkennt Muster und strukturiert. Keine eigenständige Sachverständigenmeinung.'},
      {c:'KI',t:'Konjunktiv II in §5 — warum und wie',b:'Unsicherheiten sauber formulieren, damit Befund/Bewertung trennscharf und gerichtsfest bleiben.'},
      {c:'KI',t:'Foto-KI nutzen (Team-Paket)',b:'Fotos hochladen, Analyse prüfen, Hinweise in den Entwurf übernehmen.'},
      {c:'KI',t:'KI-Credits — was sind sie, wie viele habe ich',b:'Credits sind KI-Nutzungskontingente je Paket; Verbrauch entsteht bei KI-Analysen und Assistenzfunktionen.'},
      {c:'Datenschutz',t:'Meine Daten herunterladen (Art. 15 DSGVO)',b:'In Einstellungen unter Datenschutz & Löschung den JSON-Export starten.'},
      {c:'Datenschutz',t:'Konto löschen (Art. 17 DSGVO)',b:'In Einstellungen Löschprozess starten, LÖSCHEN bestätigen. Danach Logout und Bestätigung per Prozesskette.'},
      {c:'Datenschutz',t:'DSGVO-Einwilligung Mandanten einholen',b:'Einwilligungsvorlagen nutzen und in der Akte dokumentieren.'},
      {c:'Technisches',t:'Offline arbeiten — Ortstermin ohne Internet',b:'Fotos und Notizen lokal erfassen, Synchronisation nach Wiederverbindung.'},
      {c:'Technisches',t:'PROVA als App installieren (PWA)',b:'Im Browser „App installieren“ wählen, für schnellen Zugriff auf Tablet/Smartphone.'},
      {c:'Technisches',t:'Browser-Empfehlung',b:'Aktuelle Versionen von Chrome oder Edge für beste Stabilität.'},
      {c:'Technisches',t:'Daten importieren aus Excel / Bauexpert',b:'Import-Assistent nutzen und Felder vor dem finalen Import zuordnen.'}
    ];

    const cats=['Alle','Erste Schritte','Gutachten','Abrechnung','Gericht','KI','Datenschutz','Technisches'];
    let active='Alle';
    const chips=document.getElementById('chips');
    const list=document.getElementById('articles');
    const q=document.getElementById('search');

    function renderChips(){chips.innerHTML=cats.map(c=>`<button class="chip ${c===active?'on':''}" data-c="${c}">${c}</button>`).join('');chips.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{active=b.dataset.c;renderChips();render();});}
    function render(){
      const t=(q.value||'').toLowerCase().trim();
      const rows=DATA.filter(a=>(active==='Alle'||a.c===active)&&(!t||(a.t+' '+a.b+' '+a.c).toLowerCase().includes(t)));
      list.innerHTML=rows.map(a=>`<article class="article"><div class="cat">${a.c}</div><div class="title">${a.t}</div><p>${a.b}</p></article>`).join('')||'<div class="article"><p>Keine Treffer.</p></div>';
    }
    q.addEventListener('input',render);
    renderChips();render();
  </script>
</body>
</html>

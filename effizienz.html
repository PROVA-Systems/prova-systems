<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>PROVA — SV-Effizienz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Instrument+Sans:wght@400;500;600&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0d0f14;--bg2:#13161d;--surface:#1e2330;
      --border:rgba(255,255,255,0.07);--text:#e8eaf0;--text2:#9da3b4;--text3:#6b7280;
      --accent:#4f8ef7;--success:#10B981;--warning:#F59E0B;
      --display:'Fraunces',serif;--sans:'Instrument Sans',sans-serif;
      --nav-h:52px;--radius-lg:.875rem;
      --glass-border:rgba(255,255,255,0.08);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Montserrat',system-ui,sans-serif;font-size:14px;line-height:1.6;color:var(--text2);background:var(--bg);min-height:100vh;}
    a{text-decoration:none;color:inherit;}
    .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .topbar-left{display:flex;align-items:center;gap:16px;}
    .topbar-right{display:flex;align-items:center;gap:8px;}
    .logo{font-family:var(--display);font-weight:700;font-size:18px;color:var(--text);} .logo span{color:var(--accent);}
    .topnav{display:flex;gap:2px;flex-wrap:wrap;}
    .topnav a{padding:6px 11px;border-radius:6px;color:var(--text3);font-size:13px;font-family:var(--sans);font-weight:500;min-height:44px;display:inline-flex;align-items:center;}
    .topnav a:hover{color:var(--text2);background:rgba(255,255,255,0.04);}
    .topnav a.active{color:var(--accent);background:rgba(79,142,247,0.1);}
    .paket-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
    .settings-link{font-size:16px;color:var(--text3);padding:6px 8px;border-radius:6px;min-height:44px;display:inline-flex;align-items:center;}
    .burger{display:none;} @media(max-width:900px){.topnav a{font-size:12px;padding:5px 8px;}.paket-badge{display:none!important;}}
    .main{max-width:1200px;margin:0 auto;padding:24px;}
    .page-title{font-family:var(--display);font-size:26px;font-weight:700;color:var(--text);margin:18px 0 8px;}
    .subtle{color:var(--text3);font-size:13px;margin-bottom:20px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
    .card{background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);border-radius:var(--radius-lg);padding:16px;border-top:3px solid rgba(79,142,247,0.55);}
    .card h3{font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px;}
    .card .val{font-size:22px;font-weight:900;color:#fff;}
    .card .hint{font-size:12px;color:var(--text3);margin-top:8px;line-height:1.5;}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
    th{text-align:left;color:var(--text3);font-size:11px;padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.08);}
    td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.05);}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <a href="app-starter.html" class="logo">PRO<span>VA</span></a>
      <nav class="topnav">
        <a href="dashboard.html">Dashboard</a>
        <a href="archiv.html">Archiv</a>
        <a href="rechnungen.html">Rechnungen</a>
        <a href="effizienz.html" class="active">Effizienz</a>
        <a href="jveg.html">JVEG</a>
      </nav>
    </div>
    <div class="topbar-right">
      <span class="paket-badge" id="topbarPaket"></span>
      <a href="einstellungen.html" class="settings-link">⚙</a>
    </div>
  </div>
  <main class="main">
    <div class="page-title">SV-Effizienz-Dashboard</div>
    <p class="subtle">Aus Archiv-Cache, Zeiterfassung und Rechnungen (lokal). Für Airtable-Auswertungen Daten in Make verknüpfen.</p>
    <div class="grid" id="effizienz-grid"></div>
  </main>
  <script src="prova-notifications.js" defer></script>
  <script>
  (function(){
    var p=localStorage.getItem('prova_paket')||'Starter';
    var c={Starter:'#4f8ef7',Pro:'#f59e0b',Enterprise:'#a78bfa'}[p]||'#4f8ef7';
    var el=document.getElementById('topbarPaket');
    if(el){el.textContent=p;el.setAttribute('style','background:'+c+'18;color:'+c+';border:1px solid '+c+'33');}

    function num(n){return typeof n==='number'&&isFinite(n)?n:null;}

    var archiv = [];
    try {
      var c0 = JSON.parse(localStorage.getItem('prova_archiv_cache_v1')||'{}');
      archiv = Array.isArray(c0.data) ? c0.data : [];
    } catch(e){}

    var byArt = {};
    var zeitSum = 0, zeitN = 0;
    archiv.forEach(function(rec){
      var f = rec.fields || rec || {};
      var art = f.Schadenart || f.schadenart || 'Sonstiges';
      var sek = num(f.Erstellungszeit_Sekunden) || num(f.erstellungszeit_sekunden);
      if (!byArt[art]) byArt[art] = { sum:0, n:0 };
      if (sek != null) {
        byArt[art].sum += sek;
        byArt[art].n += 1;
        zeitSum += sek;
        zeitN += 1;
      }
    });

    var artRows = Object.keys(byArt).map(function(k){
      var b = byArt[k];
      var avgMin = b.n ? Math.round(b.sum / b.n / 60) : 0;
      return { art: k, avg: avgMin };
    }).sort(function(a,b){return b.avg - a.avg;});

    var rechnungen = [];
    try { rechnungen = JSON.parse(localStorage.getItem('prova_rechnungen_local')||'[]'); } catch(e){}
    var umsatz = 0, offen = 0;
    rechnungen.forEach(function(r){
      var n = Number(r.netto)||0;
      if (r.status !== 'bezahlt') offen += n + (Number(r.mwst)||0);
      umsatz += n;
    });
    var stunden = zeitN ? (zeitSum / 3600) : 0;
    var honorarH = stunden > 0 ? (umsatz / stunden) : 0;

    var termine = [];
    try { termine = JSON.parse(localStorage.getItem('prova_termine_v2')||'[]'); } catch(e){}
    var now = new Date();
    var startW = new Date(now); startW.setDate(now.getDate() - now.getDay() + 1);
    var startP = new Date(startW); startP.setDate(startW.getDate() - 7);
    function countBusy(t0, t1) {
      return termine.filter(function(t){
        if (!t || !t.datum || t.erledigt) return false;
        var d = new Date(t.datum + 'T12:00:00');
        return d >= t0 && d < t1;
      }).length;
    }
    var w1 = countBusy(startW, new Date(startW.getTime() + 7*86400000));
    var w0 = countBusy(startP, startW);

    var agMap = {};
    rechnungen.forEach(function(r){
      var name = r.empfaenger_name || '—';
      agMap[name] = (agMap[name]||0) + (Number(r.netto)||0);
    });
    var topAg = Object.keys(agMap).map(function(k){ return { name:k, sum:agMap[k] }; }).sort(function(a,b){return b.sum-a.sum;}).slice(0,5);

    var grid = document.getElementById('effizienz-grid');
    function card(title, val, hint) {
      var d = document.createElement('div');
      d.className = 'card';
      d.innerHTML = '<h3>'+title+'</h3><div class="val">'+val+'</div><div class="hint">'+(hint||'')+'</div>';
      return d;
    }
    grid.appendChild(card('Ø Bearbeitungszeit pro Gutachtentyp', artRows[0] ? (artRows[0].avg + ' Min · ' + artRows[0].art) : '—', 'Gewichtet aus Archiv-Einträgen mit Erstellungszeit_Sekunden.'));
    grid.appendChild(card('Honorar / Stunde (netto)', honorarH ? (honorarH.toFixed(0) + ' €') : '—', 'Umsatz netto ÷ Summe erfasster Stunden (Archiv).'));
    grid.appendChild(card('Auslastung Termine', 'Woche ' + w1 + ' vs. Vorwoche ' + w0, 'Anzahl Termine im jeweiligen 7-Tage-Fenster.'));
    grid.appendChild(card('Offene Forderungen', offen.toFixed(2).replace('.', ',') + ' €', 'Summe aus prova_rechnungen_local (nicht bezahlt).'));

    var tcard = document.createElement('div');
    tcard.className = 'card';
    tcard.style.gridColumn = '1 / -1';
    var thtml = '<h3>Top-Auftraggeber nach Umsatz (netto)</h3><table><thead><tr><th>Auftraggeber</th><th>Umsatz</th></tr></thead><tbody>';
    if (!topAg.length) thtml += '<tr><td colspan="2">—</td></tr>';
    else topAg.forEach(function(x){ thtml += '<tr><td>'+escapeHtml(x.name)+'</td><td>'+x.sum.toFixed(2).replace('.',',')+' €</td></tr>'; });
    thtml += '</tbody></table><div class="hint">Quelle: lokal gespeicherte Rechnungen.</div>';
    tcard.innerHTML = thtml;
    grid.appendChild(tcard);

    var t2 = document.createElement('div');
    t2.className = 'card';
    t2.style.gridColumn = '1 / -1';
    var h2 = '<h3>Ø Zeit je Schadensart (Min.)</h3><table><thead><tr><th>Typ</th><th>Min</th></tr></thead><tbody>';
    if (!artRows.length) h2 += '<tr><td colspan="2">Keine Zeiten im Archiv-Cache.</td></tr>';
    else artRows.forEach(function(x){ h2 += '<tr><td>'+escapeHtml(x.art)+'</td><td>'+x.avg+'</td></tr>'; });
    h2 += '</tbody></table>';
    t2.innerHTML = h2;
    grid.appendChild(t2);

    function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  })();
  </script>
</body>
</html>

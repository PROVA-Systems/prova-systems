<!DOCTYPE html>
<html lang="de">
<head>
<script>
  window.__PROVA_ENV = 'production';
  window.onerror = function(msg, src, line, col, err) {
    if (!navigator.onLine) return;
    fetch('/.netlify/functions/error-log', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        msg: String(msg).slice(0,500),
        src: src, line: line,
        page: window.location.pathname,
        user: localStorage.getItem('prova_sv_email')||'unbekannt',
        ua: navigator.userAgent.slice(0,100),
        ts: new Date().toISOString()
      })
    }).catch(function(){});
  };
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>PROVA — SV-Effizienz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Instrument+Sans:wght@400;500;600&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0d0f14;--bg2:#13161d;--surface:#1e2330;
      --border:rgba(255,255,255,0.07);--text:#e8eaf0;--text2:#9da3b4;--text3:#6b7280;
      --accent:#4f8ef7;--success:#10B981;--warning:#F59E0B;
      --display:'Fraunces',serif;--sans:'Instrument Sans',sans-serif;
      --nav-h:52px;--radius-lg:.875rem;
      --glass-border:rgba(255,255,255,0.08);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Montserrat',system-ui,sans-serif;font-size:14px;line-height:1.6;color:var(--text2);background:var(--bg);min-height:100vh;}
    a{text-decoration:none;color:inherit;}
    .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .topbar-left{display:flex;align-items:center;gap:16px;}
    .topbar-right{display:flex;align-items:center;gap:8px;}
    .logo{font-family:var(--display);font-weight:700;font-size:18px;color:var(--text);} .logo span{color:var(--accent);}
    .topnav{display:flex;gap:2px;flex-wrap:wrap;}
    .topnav a{padding:6px 11px;border-radius:6px;color:var(--text3);font-size:13px;font-family:var(--sans);font-weight:500;min-height:44px;display:inline-flex;align-items:center;}
    .topnav a:hover{color:var(--text2);background:rgba(255,255,255,0.04);}
    .topnav a.active{color:var(--accent);background:rgba(79,142,247,0.1);}
    .paket-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
    .settings-link{font-size:16px;color:var(--text3);padding:6px 8px;border-radius:6px;min-height:44px;display:inline-flex;align-items:center;}
    .burger{display:none;} @media(max-width:900px){.topnav a{font-size:12px;padding:5px 8px;}.paket-badge{display:none!important;}}
    .main{max-width:1200px;margin:0 auto;padding:24px;}
    .page-title{font-family:var(--display);font-size:26px;font-weight:700;color:var(--text);margin:18px 0 8px;}
    .subtle{color:var(--text3);font-size:13px;margin-bottom:20px;}
    .filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
    .filter-btn{padding:8px 14px;border-radius:999px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:var(--text2);font-weight:700;font-size:12px;cursor:pointer;}
    .filter-btn.active{background:rgba(79,142,247,0.22);border-color:rgba(79,142,247,0.4);color:#fff;}
    .bar-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12px;}
    .bar-fill{height:8px;border-radius:4px;background:rgba(79,142,247,0.55);min-width:4px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
    .card{background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);border-radius:var(--radius-lg);padding:16px;border-top:3px solid rgba(79,142,247,0.55);}
    .card h3{font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px;}
    .card .val{font-size:22px;font-weight:900;color:#fff;}
    .card .hint{font-size:12px;color:var(--text3);margin-top:8px;line-height:1.5;}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
    th{text-align:left;color:var(--text3);font-size:11px;padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.08);}
    td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.05);}
    .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;}.drawer-overlay.open{display:block;}
    .drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);z-index:201;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;}
    .drawer.open{transform:translateX(0);}.drawer-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .drawer-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;}
    .burger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:4px;padding:6px;}
    .burger span{display:block;width:20px;height:2px;background:var(--text2);}
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--bg2);border-top:1px solid var(--border);z-index:100;justify-content:space-around;align-items:stretch;}
    @media(max-width:900px){.topnav{display:none;}.burger{display:flex;}.bottom-nav{display:flex;}body{padding-bottom:56px;}}
  </style>
  <link rel="stylesheet" href="prova-nav.css">
</head>
<body>
  <script src="prova-account-gate.js"></script>
  <script src="paket-guard.js"></script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>if(typeof netlifyIdentity!=='undefined')netlifyIdentity.init();</script>
  <script src="prova-auth-api.js"></script>
<script src="prova-sv-airtable.js"></script>
  <script src="prova-airtable-api.js"></script>
  <div class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="logo">PRO<span>VA</span></a>
      <nav class="topnav">
        <a href="dashboard.html">Zentrale</a>
        <a href="rechnungen.html">Rechnungen</a>
        <a href="effizienz.html" class="active">Effizienz</a>
        <a href="einstellungen.html">Mehr</a>
      </nav>
    </div>
    <div class="topbar-right">
      <span class="paket-badge" id="topbarPaket"></span>
      <a href="einstellungen.html" class="settings-link">⚙</a>
      <button type="button" class="burger" onclick="toggleDrawer()" aria-label="Menü"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <a href="dashboard.html" class="logo">PRO<span>VA</span></a>
      <button type="button" class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div id="provaDrawerMount"></div>
  </div>
  <nav class="bottom-nav" id="provaBottomNav"></nav>
  <script>
  function toggleDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('drawerOverlay');if(!d)return;d.classList.toggle('open');o.classList.toggle('open');document.body.style.overflow=d.classList.contains('open')?'hidden':'';}
  function closeDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('drawerOverlay');if(d)d.classList.remove('open');if(o)o.classList.remove('open');document.body.style.overflow='';}
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDrawer();});
  </script>
  <script src="nav.js" defer></script>
  <main class="main">
    <div class="page-title">SV-Effizienz-Dashboard</div>
    <p class="subtle">KPIs aus Airtable (<code>SCHADENSFAELLE</code>: Zeiterfassung_Min / Erstellungszeit_Sekunden, Gutachtentyp; <code>RECHNUNGEN</code>: Betrag_Netto, Status).</p>
    <div class="filter-row" id="eff-filter">
      <button type="button" class="filter-btn active" data-range="week">Diese Woche</button>
      <button type="button" class="filter-btn" data-range="month">Dieser Monat</button>
      <button type="button" class="filter-btn" data-range="year">Dieses Jahr</button>
    </div>
    <div class="grid" id="effizienz-grid"><div class="card"><h3>Laden…</h3><div class="hint">Airtable</div></div></div>
  </main>
  <script src="effizienz-logic.js"></script>
  <script src="prova-notifications.js" defer></script>
  <script>
  (function(){
    if(!window.PROVA)return;
    if (window.PaketGuard && PaketGuard.blockiereSeite('effizienz')) return;
    var c=PROVA.paketColor();
    var el=document.getElementById('topbarPaket');
    if(el){el.textContent=PROVA.paketLabel();el.setAttribute('style','background:'+c+'18;color:'+c+';border:1px solid '+c+'33');}

    var grid = document.getElementById('effizienz-grid');
    var api = window.EffizienzAPI;
    function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function card(title, val, hint) {
      var d = document.createElement('div');
      d.className = 'card';
      d.innerHTML = '<h3>'+title+'</h3><div class="val">'+val+'</div><div class="hint">'+(hint||'')+'</div>';
      return d;
    }
    function render(d) {
      grid.innerHTML = '';
      var typ0 = d.typRows && d.typRows[0];
      grid.appendChild(card('Ø Bearbeitungszeit (Typ)', typ0 ? (typ0.avg + ' Min · ' + typ0.typ) : '—', 'Aus Zeiterfassung_Min bzw. Erstellungszeit_Sekunden / 60.'));
      grid.appendChild(card('Honorar / Stunde (netto)', d.honorarH ? (d.honorarH.toFixed(0) + ' €') : '—', 'Summe Rechnungs-Netto ÷ Stunden (Zeiterfassung).'));
      grid.appendChild(card('Offene Forderungen', d.offen.toFixed(2).replace('.', ',') + ' €', 'Rechnungen ohne Bezahlt-Status.'));
      grid.appendChild(card('Datensätze', d.faelleCount + ' Fälle / ' + d.rechnCount + ' Rechn.', 'Im gewählten Zeitraum (gefiltert).'));

      var maxBar = 0;
      (d.typRows||[]).forEach(function(x){ if(x.avg>maxBar) maxBar=x.avg; });
      var chart = document.createElement('div');
      chart.className = 'card';
      chart.style.gridColumn = '1 / -1';
      var ch = '<h3>Bearbeitungszeit nach Typ (Balken)</h3>';
      if (!d.typRows || !d.typRows.length) ch += '<div class="hint">Keine Zeiterfassung in Airtable.</div>';
      else d.typRows.slice(0,8).forEach(function(x){
        var w = maxBar ? Math.round((x.avg/maxBar)*100) : 0;
        ch += '<div class="bar-row"><span style="min-width:120px;">'+escapeHtml(x.typ)+'</span><div class="bar-fill" style="width:'+w+'%;max-width:100%"></div><span>'+x.avg+' min</span></div>';
      });
      chart.innerHTML = ch;
      grid.appendChild(chart);

      var tcard = document.createElement('div');
      tcard.className = 'card';
      tcard.style.gridColumn = '1 / -1';
      var thtml = '<h3>Auftraggeber-Ranking (Rechnungen netto)</h3><table><thead><tr><th>Auftraggeber</th><th>Umsatz</th></tr></thead><tbody>';
      if (!d.topAg || !d.topAg.length) thtml += '<tr><td colspan="2">—</td></tr>';
      else d.topAg.forEach(function(x){ thtml += '<tr><td>'+escapeHtml(x.name)+'</td><td>'+x.sum.toFixed(2).replace('.',',')+' €</td></tr>'; });
      thtml += '</tbody></table>';
      tcard.innerHTML = thtml;
      grid.appendChild(tcard);
    }
    function load(range) {
      grid.innerHTML = '<div class="card"><h3>Laden…</h3></div>';
      api.loadDashboard(range).then(render).catch(function(e){
        grid.innerHTML = '<div class="card"><h3>Fehler</h3><div class="hint">' + escapeHtml(e.message||String(e)) + '</div></div>';
      });
    }
    document.getElementById('eff-filter').addEventListener('click', function(ev){
      var b = ev.target.closest('.filter-btn');
      if (!b) return;
      document.querySelectorAll('#eff-filter .filter-btn').forEach(function(x){ x.classList.remove('active'); });
      b.classList.add('active');
      load(b.getAttribute('data-range') || 'week');
    });
    load('week');
  })();
  </script>
</body>
</html>
